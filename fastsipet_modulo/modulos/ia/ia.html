<!-- ia.html: Interfaz inicial para el módulo IA de SIPET -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo IA - SIPET</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f6f8fb;
            color: #0f172a;
        }
        .ia-agent {
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #dbe3ef;
            border-radius: 14px;
            padding: 16px;
            display: grid;
            gap: 12px;
        }
        .ia-agent-head {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ia-agent-head img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid #cbd5e1;
        }
        .ia-agent-head h1 {
            margin: 0;
            font-size: 24px;
        }
        .ia-agent-head p {
            margin: 2px 0 0;
            color: #64748b;
        }
    </style>
</head>
<body>
    <section class="ia-agent">
        <header class="ia-agent-head">
            <img src="/templates/imagenes/lobo.jpg" alt="AVAN">
            <div>
                <h1>AVAN</h1>
                <p>Agente de chat IA de SIPET</p>
            </div>
        </header>
        <p>Bienvenido al módulo de IA. Aquí se implementarán las funcionalidades de asistencia, analítica y reportes inteligentes según el documento funcional.</p>
    </section>
</body>
</html>
