  <dialog id="pa-modal-act" class="modal">
    <div class="modal-box w-full max-w-2xl">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button>
      </form>
      <h3 id="pa-modal-act-titulo" class="font-bold text-lg mb-4">Nueva actividad</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Control del catálogo</span></div>
          <select id="pa-f-control_id" class="select select-bordered w-full">
            <option value="">— Sin vincular —</option>
          </select>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Descripción de la actividad</span></div>
          <textarea id="pa-f-descripcion" rows="2" class="textarea textarea-bordered w-full" placeholder="¿Qué se hará?"></textarea>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Responsable</span></div>
          <input type="text" id="pa-f-responsable" maxlength="150" class="input input-bordered w-full" placeholder="Nombre o puesto">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Inicio programado</span></div>
          <input type="date" id="pa-f-fecha_inicio_programada" class="input input-bordered w-full">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Fin programado</span></div>
          <input type="date" id="pa-f-fecha_fin_programada" class="input input-bordered w-full">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Inicio real</span></div>
          <input type="date" id="pa-f-fecha_inicio_real" class="input input-bordered w-full">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Fin real</span></div>
          <input type="date" id="pa-f-fecha_fin_real" class="input input-bordered w-full">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Estado</span></div>
          <select id="pa-f-estado" class="select select-bordered w-full">
            <option selected>Programado</option>
            <option>En proceso</option>
            <option>Completado</option>
            <option>Diferido</option>
            <option>Cancelado</option>
          </select>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Observaciones</span></div>
          <textarea id="pa-f-observaciones" rows="2" class="textarea textarea-bordered w-full" placeholder="Notas adicionales"></textarea>
        </label>
      </div>
      <div id="pa-act-error" class="alert alert-error text-sm mt-3" style="display:none;"></div>
      <div class="modal-action">
        <button type="button" id="pa-btn-cancel-act" class="btn btn-ghost">Cancelar</button>
        <button type="button" id="pa-btn-save-act" class="btn btn-primary gap-2">
          <span id="pa-act-spinner" class="loading loading-spinner loading-xs" style="display:none;"></span>
          Guardar
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>cerrar</button></form>
  </dialog>
