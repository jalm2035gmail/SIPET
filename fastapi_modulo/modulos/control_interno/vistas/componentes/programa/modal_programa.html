  <dialog id="pa-modal-prog" class="modal">
    <div class="modal-box w-full max-w-lg">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button>
      </form>
      <h3 id="pa-modal-prog-titulo" class="font-bold text-lg mb-4">Nuevo programa</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Año <span class="text-error">*</span></span></div>
          <input type="number" id="pa-f-anio" min="2020" max="2050" class="input input-bordered w-full" placeholder="2026">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Estado</span></div>
          <select id="pa-f-estado" class="select select-bordered w-full">
            <option selected>Borrador</option>
            <option>Aprobado</option>
            <option>En ejecución</option>
            <option>Cerrado</option>
          </select>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Nombre <span class="text-error">*</span></span></div>
          <input type="text" id="pa-f-nombre" maxlength="200" class="input input-bordered w-full" placeholder="Ej. Programa de control interno 2026">
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Descripción</span></div>
          <textarea id="pa-f-descripcion" rows="2" class="textarea textarea-bordered w-full" placeholder="Alcance y objetivos del programa"></textarea>
        </label>
      </div>
      <div id="pa-prog-error" class="alert alert-error text-sm mt-3" style="display:none;"></div>
      <div class="modal-action">
        <button type="button" id="pa-btn-cancel-prog" class="btn btn-ghost">Cancelar</button>
        <button type="button" id="pa-btn-save-prog" class="btn btn-primary gap-2">
          <span id="pa-prog-spinner" class="loading loading-spinner loading-xs" style="display:none;"></span>
          Guardar
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>cerrar</button></form>
  </dialog>
