        <button type="button" id="hz-btn-filtrar" class="btn btn-sm btn-neutral self-end">Filtrar</button>
        <button type="button" id="hz-btn-limpiar" class="btn btn-sm btn-ghost self-end">Limpiar</button>
      </div>
