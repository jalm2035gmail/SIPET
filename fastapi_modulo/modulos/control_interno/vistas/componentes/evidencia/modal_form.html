  <dialog id="ev-modal" class="modal">
    <div class="modal-box w-full max-w-2xl">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button>
      </form>
      <h3 id="ev-modal-titulo" class="font-bold text-lg mb-4">Nueva evidencia</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Título <span class="text-error">*</span></span></div>
          <input type="text" id="ev-f-titulo" maxlength="200" class="input input-bordered w-full" placeholder="Ej. Acta de revisión de cartera - Marzo 2026">
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Tipo <span class="text-error">*</span></span></div>
          <select id="ev-f-tipo" class="select select-bordered w-full">
            <option selected>Documento</option>
            <option>Fotografía</option>
            <option>Correo electrónico</option>
            <option>Acta</option>
            <option>Captura de pantalla</option>
            <option>Otro</option>
          </select>
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Fecha de la evidencia</span></div>
          <input type="date" id="ev-f-fecha_evidencia" class="input input-bordered w-full">
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Control vinculado</span></div>
          <select id="ev-f-control_id" class="select select-bordered w-full">
            <option value="">— Sin vincular —</option>
          </select>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Actividad del programa</span></div>
          <select id="ev-f-actividad_id" class="select select-bordered w-full">
            <option value="">— Sin vincular —</option>
          </select>
        </label>
        <label class="form-control w-full">
          <div class="label py-1"><span class="label-text font-semibold">Resultado de evaluación <span class="text-error">*</span></span></div>
          <select id="ev-f-resultado_evaluacion" class="select select-bordered w-full">
            <option selected>Por evaluar</option>
            <option>Cumple</option>
            <option>Cumple parcialmente</option>
            <option>No cumple</option>
          </select>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Descripción</span></div>
          <textarea id="ev-f-descripcion" rows="2" class="textarea textarea-bordered w-full" placeholder="Detalle de la evidencia"></textarea>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1"><span class="label-text font-semibold">Observaciones</span></div>
          <textarea id="ev-f-observaciones" rows="2" class="textarea textarea-bordered w-full" placeholder="Notas adicionales, hallazgos preliminares…"></textarea>
        </label>
        <label class="form-control w-full sm:col-span-2">
          <div class="label py-1">
            <span class="label-text font-semibold">Archivo adjunto</span>
            <span class="label-text-alt text-MAIN-content/50">Max. 25 MB - PDF, imagen, Office, etc.</span>
          </div>
          <input type="file" id="ev-f-archivo" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.gif,.backendp,.eml,.msg,.txt,.zip" class="file-input file-input-bordered w-full">
          <div id="ev-archivo-actual" class="mt-1 text-xs text-MAIN-content/50" style="display:none;"></div>
        </label>
      </div>
      <div id="ev-form-error" class="alert alert-error text-sm mt-3" style="display:none;"></div>
      <div id="ev-upload-progress" class="mt-3" style="display:none;">
        <div class="text-xs mb-1 text-MAIN-content/60">Subiendo archivo…</div>
        <progress class="progress progress-primary w-full"></progress>
      </div>
      <div class="modal-action">
        <button type="button" id="ev-btn-cancelar" class="btn btn-ghost">Cancelar</button>
        <button type="button" id="ev-btn-guardar" class="btn btn-primary gap-2">
          <span id="ev-spinner" class="loading loading-spinner loading-xs" style="display:none;"></span>
          Guardar
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>cerrar</button></form>
  </dialog>
