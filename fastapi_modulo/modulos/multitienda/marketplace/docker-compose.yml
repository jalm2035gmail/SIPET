version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend/public
    command: npm run dev
    volumes:
      - ./frontend/public:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
