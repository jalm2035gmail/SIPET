<section id="empleados-module" class="w-full space-y-4">
  <div class="titulo bg-base-200 rounded-box border border-base-300 p-4 sm:p-6">
    <div class="w-full flex flex-col md:flex-row items-center gap-10">
      <img
        src="/templates/icon/usuarios.svg"
        alt="Icono colaboradores"
        width="96"
        height="96"
        class="shrink-0 rounded-box border border-base-300 bg-base-100 p-3 object-contain"
      />
      <div class="w-full grid gap-2 content-center">
        <div class="block w-full text-3xl sm:text-4xl lg:text-5xl font-bold leading-tight text-[color:var(--sidebar-bottom)]">Colaboradores</div>
        <div class="block w-full text-base sm:text-lg text-base-content/70">Gestión de colaboradores, roles y permisos.</div>
      </div>
    </div>
  </div>

  <div class="view-buttons page-view-buttons">
    <button class="view-pill boton_vista" type="button" data-view="form" data-tooltip="Formulario" aria-label="Formulario">
      <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/formulario.svg')"></span>
      <span class="view-pill-label boton_vista-label">Formulario</span>
    </button>
    <button class="view-pill boton_vista active" type="button" data-view="list" data-tooltip="Lista" aria-label="Lista">
      <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/grid.svg')"></span>
      <span class="view-pill-label boton_vista-label">Lista</span>
    </button>
    <button class="view-pill boton_vista" type="button" data-view="kanban" data-tooltip="Kanban" aria-label="Kanban">
      <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/kanban.svg')"></span>
      <span class="view-pill-label boton_vista-label">Kanban</span>
    </button>
    <button class="view-pill boton_vista" type="button" data-view="organigrama" data-tooltip="Organigrama" aria-label="Organigrama">
      <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/organigrama.svg')"></span>
      <span class="view-pill-label boton_vista-label">Organigrama</span>
    </button>
    <button class="view-pill boton_vista" type="button" id="empleados-search-btn" data-tooltip="Buscar" aria-label="Buscar">
      <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/buscar.svg')"></span>
      <span class="view-pill-label boton_vista-label">Buscar</span>
    </button>
    <button class="view-pill boton_vista" type="button" id="empleados-new-btn" data-tooltip="Nuevo colaborador" aria-label="Nuevo colaborador">
      <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/nuevo.svg')"></span>
      <span class="view-pill-label boton_vista-label">Nuevo</span>
    </button>
  </div>

  <div id="empleados-view"></div>
</section>

<script>
(function () {
  var mount = document.getElementById('empleados-view');
  var viewButtons = Array.from(document.querySelectorAll('#empleados-module .view-buttons .view-pill[data-view]'));
  var searchBtn = document.getElementById('empleados-search-btn');
  var newBtn = document.getElementById('empleados-new-btn');
  if (!mount) return;

  var colaboradores = [];
  var puestosLaborales = [];
  var currentView = 'list';
  var searchTerm = '';
  var selectedColaboradorKey = '';
  var currentFormTab = 'cv';
  var isMainEditMode = false;
  var orgLibPromise = null;
  var colabOrgChart = null;
  var orgExpandedColaboradorId = '';
  var CV_CONTACT_FIELDS = [
    { key: 'nombre_completo', label: 'Nombre completo', placeholder: 'Ej. Juan Pérez García' },
    { key: 'telefono', label: 'Teléfono', placeholder: '+52 555 000 0000' },
    { key: 'correo_electronico', label: 'Correo electrónico', placeholder: 'correo@ejemplo.com' },
    { key: 'direccion', label: 'Dirección personal', placeholder: 'Calle, ciudad, estado' },
    { key: 'linkedin', label: 'Perfil de LinkedIn', placeholder: 'https://linkedin.com/in/...' },
    { key: 'portfolio', label: 'Portafolio o sitio web', placeholder: 'https://...' }
  ];
  var CV_EXPERIENCIA_FIELDS = [
    { key: 'cargo', label: 'Cargo' },
    { key: 'empresa', label: 'Empresa' },
    { key: 'inicio_mes', label: 'Mes inicio' },
    { key: 'inicio_anio', label: 'Año inicio' },
    { key: 'fin_mes', label: 'Mes fin' },
    { key: 'fin_anio', label: 'Año fin' },
    { key: 'logros', label: 'Logros', multiline: true }
  ];
  var CV_EDUCACION_FIELDS = [
    { key: 'titulo', label: 'Título' },
    { key: 'institucion', label: 'Institución' },
    { key: 'inicio_mes', label: 'Mes inicio' },
    { key: 'inicio_anio', label: 'Año inicio' },
    { key: 'fin_mes', label: 'Mes fin' },
    { key: 'fin_anio', label: 'Año fin' }
  ];
  var CV_SKILL_FIELDS = [
    { key: 'nombre', label: 'Nombre' },
    { key: 'nivel', label: 'Nivel' }
  ];
  var CV_IDIOMA_FIELDS = [
    { key: 'nombre', label: 'Idioma' },
    { key: 'nivel', label: 'Nivel' }
  ];
  var CV_FORMACION_FIELDS = [
    { key: 'nombre', label: 'Nombre' },
    { key: 'entidad', label: 'Entidad' },
    { key: 'mes', label: 'Mes' },
    { key: 'anio', label: 'Año' },
    { key: 'descripcion', label: 'Descripción', multiline: true }
  ];
  var CV_LOGROS_FIELDS = [
    { key: 'titulo', label: 'Título' },
    { key: 'entidad', label: 'Entidad' },
    { key: 'mes', label: 'Mes' },
    { key: 'anio', label: 'Año' },
    { key: 'descripcion', label: 'Descripción', multiline: true }
  ];
  var CV_VOLUNTARIADO_FIELDS = [
    { key: 'organizacion', label: 'Organización' },
    { key: 'rol', label: 'Rol' },
    { key: 'inicio_mes', label: 'Mes inicio' },
    { key: 'inicio_anio', label: 'Año inicio' },
    { key: 'fin_mes', label: 'Mes fin' },
    { key: 'fin_anio', label: 'Año fin' },
    { key: 'descripcion', label: 'Descripción', multiline: true }
  ];
  var CV_INFO_ADICIONAL_FIELDS = [
    { key: 'carnet_conducir', label: 'Carnet de conducir', type: 'boolean' },
    { key: 'tipo_carnet', label: 'Tipo de carnet' },
    { key: 'vehiculo_propio', label: 'Vehículo propio', type: 'boolean' },
    { key: 'disponibilidad_viaje', label: 'Disponibilidad de viaje' },
    { key: 'disponibilidad_traslado', label: 'Disponibilidad de traslado' },
    { key: 'notas', label: 'Notas', multiline: true }
  ];
  var ACCESS_APP_OPTIONS = ['Mi tablero', 'Conversaciones', 'BSC', 'Organización', 'Estrategia y táctica', 'Datos financieros', 'Control y seguimiento', 'KPIs', 'Reportes', 'Empresa', 'Intelicoop', 'Brújula', 'CRM', 'Auditoria', 'ActivoFijo', 'Multiempresa'];
  var ACCESS_LEVEL_OPTIONS = [
    { key: 'full_access', label: 'Acceso total' },
    { key: 'read_only', label: 'Solo lectura' },
    { key: 'department_only', label: 'Solo departamento' },
    { key: 'user_only', label: 'Solo usuario' },
    { key: 'special_permissions', label: 'Permisos especiales' }
  ];
  var ACCESS_ROLE_OPTIONS = [
    { value: 'administrador', label: 'Administrador' },
    { value: 'autoridades', label: 'Autoridades' },
    { value: 'departamento', label: 'Departamento' },
    { value: 'usuario', label: 'Usuario' }
  ];
  var ACCESS_POA_OPTIONS = [
    { value: 'mis_tareas', label: 'Mis tareas (sin vista Gantt)' },
    { value: 'todas_tareas', label: 'Todas las tareas (todas las vistas)' }
  ];
  var ACCESS_WEB_ROLE_OPTIONS = [
    { value: 'editor', label: 'Editor (puede cambiar contenido)' },
    { value: 'designer', label: 'Diseñador (puede cambiar estructura)' }
  ];

  function esc(v) {
    if (v === null || v === undefined) return '';
    return String(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setActiveViewButton(view) {
    viewButtons.forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-view') === view);
    });
  }

  function renderSimpleList(items, emptyText) {
    var list = Array.isArray(items) ? items : [];
    if (!list.length) return '<p class="text-sm text-base-content/60">' + esc(emptyText || 'Sin registros.') + '</p>';
    return '<ul class="list-disc pl-5 grid gap-1 text-sm text-base-content/80">' +
      list.map(function (item) { return '<li>' + esc(item) + '</li>'; }).join('') +
      '</ul>';
  }

  function normalizeAccessRole(value) {
    var raw = String(value || '').trim().toLowerCase();
    if (raw === 'superadministrador' || raw === 'superadmin' || raw === 'admin' || raw === 'administrador') return 'administrador';
    if (raw === 'autoridad' || raw === 'autoridades') return 'autoridades';
    if (raw === 'departamento') return 'departamento';
    return 'usuario';
  }

  function normalizePoaAccess(value) {
    var raw = String(value || '').trim().toLowerCase();
    if (raw === 'todas_tareas' || raw === 'todas' || raw === 'all') return 'todas_tareas';
    return 'mis_tareas';
  }

  function renderAccessRadioGroup(name, options, selectedValue, dataAttrName) {
    var dataAttr = dataAttrName ? (' ' + dataAttrName + '="1"') : '';
    return '<div class="grid gap-2">' +
      options.map(function (opt) {
        var checked = String(selectedValue || '') === String(opt.value || '');
        return '<label class="label justify-start gap-3 cursor-default p-0 min-h-0">' +
          '<input type="radio" class="radio radio-sm" name="' + esc(name) + '" value="' + esc(opt.value || '') + '"' + dataAttr + ' ' + (checked ? 'checked ' : '') + '>' +
          '<span class="label-text text-base-content font-semibold">' + esc(opt.label || '') + '</span>' +
        '</label>';
      }).join('') +
      '</div>';
  }

  function renderAccessCheckboxGroup(options, selectedValues, dataAttrName) {
    var dataAttr = dataAttrName ? (' ' + dataAttrName + '="1"') : '';
    var selected = Array.isArray(selectedValues) ? selectedValues.map(function (v) { return String(v || '').trim().toLowerCase(); }) : [];
    return '<div class="grid gap-2">' +
      options.map(function (opt) {
        var checked = selected.indexOf(String(opt || '').trim().toLowerCase()) !== -1;
        return '<label class="label justify-start gap-3 cursor-default p-0 min-h-0">' +
          '<input type="checkbox" class="checkbox checkbox-sm" value="' + esc(opt || '') + '"' + dataAttr + ' ' + (checked ? 'checked ' : '') + '>' +
          '<span class="label-text text-base-content font-semibold">' + esc(opt) + '</span>' +
        '</label>';
      }).join('') +
      '</div>';
  }

  function normalizeAccessMatrix(appAccessLevels, fallbackAppAccess) {
    var normalized = {};
    ACCESS_APP_OPTIONS.forEach(function (appName) {
      normalized[appName] = {
        full_access: false,
        read_only: false,
        department_only: false,
        user_only: false,
        special_permissions: false
      };
      var rawEntry = appAccessLevels && typeof appAccessLevels === 'object' ? appAccessLevels[appName] : null;
      if (rawEntry && typeof rawEntry === 'object') {
        ACCESS_LEVEL_OPTIONS.forEach(function (level) {
          normalized[appName][level.key] = Boolean(rawEntry[level.key]);
        });
      }
    });
    if (Array.isArray(fallbackAppAccess)) {
      fallbackAppAccess.forEach(function (appName) {
        var key = String(appName || '').trim();
        if (!normalized[key]) return;
        var alreadyChecked = ACCESS_LEVEL_OPTIONS.some(function (level) { return normalized[key][level.key]; });
        if (!alreadyChecked) normalized[key].full_access = true;
      });
    }
    return normalized;
  }

  function collectAccessMatrix() {
    var matrix = normalizeAccessMatrix(null, []);
    Array.from(mount.querySelectorAll('input[type="checkbox"][data-access-app-level="1"]')).forEach(function (el) {
      var menuName = String(el.getAttribute('data-menu-name') || '').trim();
      var levelKey = String(el.getAttribute('data-level-key') || '').trim();
      if (!menuName || !levelKey || !matrix[menuName]) return;
      if (!(levelKey in matrix[menuName])) return;
      matrix[menuName][levelKey] = Boolean(el.checked);
    });
    return matrix;
  }

  function deriveAppAccessFromMatrix(matrix) {
    return ACCESS_APP_OPTIONS.filter(function (appName) {
      var entry = matrix && typeof matrix === 'object' ? matrix[appName] : null;
      if (!entry || typeof entry !== 'object') return false;
      return ACCESS_LEVEL_OPTIONS.some(function (level) { return Boolean(entry[level.key]); });
    });
  }

  function renderAccessMatrix(options, selectedMatrix) {
    var matrix = normalizeAccessMatrix(selectedMatrix, []);
    return '' +
      '<div class="overflow-x-auto">' +
        '<table class="table table-sm w-full border border-base-300 rounded-box">' +
          '<thead>' +
            '<tr>' +
              '<th class="min-w-[220px]">Nombre del menu</th>' +
              ACCESS_LEVEL_OPTIONS.map(function (level) {
                return '<th class="text-center min-w-[120px]">' + esc(level.label) + '</th>';
              }).join('') +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            options.map(function (appName) {
              return '<tr>' +
                '<td class="font-semibold text-base-content">' + esc(appName) + '</td>' +
                ACCESS_LEVEL_OPTIONS.map(function (level) {
                  var checked = matrix[appName] && matrix[appName][level.key];
                  return '<td class="text-center">' +
                    '<input type="checkbox" class="checkbox checkbox-sm" data-access-app-level="1" data-menu-name="' + esc(appName) + '" data-level-key="' + esc(level.key) + '" ' + (checked ? 'checked ' : '') + '>' +
                  '</td>';
                }).join('') +
              '</tr>';
            }).join('') +
          '</tbody>' +
        '</table>' +
      '</div>';
  }

  function renderAccessWebRoles(options, selectedValues, dataAttrName) {
    var dataAttr = dataAttrName ? (' ' + dataAttrName + '="1"') : '';
    var selected = Array.isArray(selectedValues) ? selectedValues.map(function (v) { return String(v || '').trim().toLowerCase(); }) : [];
    return '<div class="grid gap-2">' +
      options.map(function (opt) {
        var checked = selected.indexOf(String(opt.value || '').trim().toLowerCase()) !== -1;
        return '<label class="label justify-start gap-3 cursor-default p-0 min-h-0">' +
          '<input type="checkbox" class="checkbox checkbox-sm" value="' + esc(opt.value || '') + '"' + dataAttr + ' ' + (checked ? 'checked ' : '') + '>' +
          '<span class="label-text text-base-content font-semibold">' + esc(opt.label || '') + '</span>' +
        '</label>';
      }).join('') +
      '</div>';
  }

  function collectCheckedValues(selector) {
    return Array.from(mount.querySelectorAll(selector))
      .filter(function (el) { return !!el && !!el.checked; })
      .map(function (el) { return String(el.value || '').trim(); })
      .filter(function (v) { return !!v; });
  }

  function collectAccessSettings(current) {
    if (!mount.querySelector('[data-access-role="1"]') && !mount.querySelector('[data-access-poa="1"]') && !mount.querySelector('[data-access-app-level="1"]')) {
      return {
        rol: String(current.rol || current.role || 'usuario').trim(),
        poa_access_level: String(current.poa_access_level || 'mis_tareas').trim(),
        app_access_levels: normalizeAccessMatrix(current.app_access_levels, current.app_access),
        app_access: Array.isArray(current.app_access) ? current.app_access : [],
        menu_blocks: Array.isArray(current.menu_blocks) ? current.menu_blocks : [],
        web_roles: Array.isArray(current.web_roles) ? current.web_roles : []
      };
    }
    var roleEl = mount.querySelector('input[name="acceso-rol"][data-access-role="1"]:checked');
    var poaEl = mount.querySelector('input[name="acceso-poa"][data-access-poa="1"]:checked');
    var appAccessLevels = collectAccessMatrix();
    return {
      rol: roleEl ? String(roleEl.value || '').trim() : normalizeAccessRole(current.rol || current.role || ''),
      poa_access_level: poaEl ? String(poaEl.value || '').trim() : normalizePoaAccess(current.poa_access_level || ''),
      app_access_levels: appAccessLevels,
      app_access: deriveAppAccessFromMatrix(appAccessLevels),
      menu_blocks: collectCheckedValues('input[type="checkbox"][data-access-menu="1"]'),
      web_roles: collectCheckedValues('input[type="checkbox"][data-access-web-role="1"]')
    };
  }

  function renderCvValueList(items, emptyText) {
    var list = Array.isArray(items) ? items : [];
    if (!list.length) return '<p class="text-sm text-base-content/60">' + esc(emptyText || 'Sin registros.') + '</p>';
    return '<ul class="cv-value-list">' +
      list.map(function (item) {
        return '<li class="cv-value-item">' + esc(item) + '</li>';
      }).join('') +
      '</ul>';
  }

  function renderCvRecordList(items, labels, orderedKeys, emptyValueText) {
    var list = Array.isArray(items) ? items.filter(function (row) { return row && typeof row === 'object'; }) : [];
    if (!list.length) list = [{}];
    return '<div class="cv-record-list">' +
      list.map(function (row, index) {
        return '' +
          '<div class="cv-record-card">' +
            '<div class="cv-record-title">Registro ' + esc(String(index + 1)) + '</div>' +
            renderLabelValueList(row, labels, '', orderedKeys, emptyValueText || 'Sin dato') +
          '</div>';
      }).join('') +
      '</div>';
  }

  function renderCvFieldCell(field, value, group, index) {
    var safeValue = value === null || value === undefined ? '' : String(value);
    var baseAttrs = ' data-cv-group="' + esc(group) + '" data-cv-key="' + esc(field.key) + '"';
    if (index !== null && index !== undefined) baseAttrs += ' data-cv-index="' + esc(String(index)) + '"';
    var control = '';
    if (field.type === 'boolean') {
      var boolValue = String(safeValue || '').toLowerCase();
      var yesSelected = (boolValue === 'true' || boolValue === '1' || boolValue === 'si' || boolValue === 'sí');
      control = '' +
        '<select class="cv-field-input"' + baseAttrs + '>' +
          '<option value="false"' + (yesSelected ? '' : ' selected') + '>No</option>' +
          '<option value="true"' + (yesSelected ? ' selected' : '') + '>Sí</option>' +
        '</select>';
    } else if (field.multiline) {
      control = '<textarea class="cv-field-input cv-field-textarea"' + baseAttrs + ' placeholder="' + esc(field.placeholder || '') + '">' + esc(safeValue) + '</textarea>';
    } else {
      control = '<input class="cv-field-input" type="text"' + baseAttrs + ' placeholder="' + esc(field.placeholder || '') + '" value="' + esc(safeValue) + '">';
    }
    return '' +
      '<li class="cv-field-item">' +
        '<span class="cv-field-label">' + esc(field.label) + '</span>' +
        control +
      '</li>';
  }

  function renderCvEditableGrid(values, fields, group, fallbackValue) {
    var source = values && typeof values === 'object' ? values : {};
    return '<ul class="cv-field-grid">' +
      fields.map(function (field) {
        var raw = source[field.key];
        var normalized = raw === null || raw === undefined || raw === '' ? (fallbackValue || '') : raw;
        return renderCvFieldCell(field, normalized, group, null);
      }).join('') +
      '</ul>';
  }

  function renderCvRecordEditor(records, fields, group) {
    var list = Array.isArray(records) ? records.filter(function (row) { return row && typeof row === 'object'; }) : [];
    if (!list.length) list = [{}];
    return '<div class="cv-record-list">' +
      '<div class="cv-record-actions">' +
        '<button type="button" class="btn btn-outline btn-xs" data-cv-add="' + esc(group) + '">Agregar registro</button>' +
      '</div>' +
      list.map(function (row, index) {
        return '' +
          '<div class="cv-record-card">' +
            '<div class="cv-record-header">' +
              '<div class="cv-record-title">Registro ' + esc(String(index + 1)) + '</div>' +
              '<button type="button" class="btn btn-ghost btn-xs text-error" data-cv-remove="' + esc(group) + '" data-cv-remove-index="' + esc(String(index)) + '">Eliminar</button>' +
            '</div>' +
            '<ul class="cv-field-grid">' +
              fields.map(function (field) {
                return renderCvFieldCell(field, row[field.key] || '', group, index);
              }).join('') +
            '</ul>' +
          '</div>';
      }).join('') +
      '</div>';
  }

  function parseBooleanLike(value) {
    var raw = String(value || '').trim().toLowerCase();
    return raw === 'true' || raw === '1' || raw === 'si' || raw === 'sí';
  }

  function collectCvGrid(group, fields) {
    var out = {};
    fields.forEach(function (field) {
      var selector = '[data-cv-group="' + group + '"][data-cv-key="' + field.key + '"]:not([data-cv-index])';
      var el = mount.querySelector(selector);
      if (!el) {
        out[field.key] = field.type === 'boolean' ? false : '';
        return;
      }
      var val = 'value' in el ? el.value : '';
      out[field.key] = field.type === 'boolean' ? parseBooleanLike(val) : String(val || '').trim();
    });
    return out;
  }

  function collectCvRecords(group, fields) {
    var all = Array.from(mount.querySelectorAll('[data-cv-group="' + group + '"][data-cv-index]'));
    var indexes = Array.from(new Set(all.map(function (el) { return String(el.getAttribute('data-cv-index') || '').trim(); })))
      .filter(function (idx) { return idx !== ''; })
      .sort(function (a, b) { return Number(a) - Number(b); });
    return indexes.map(function (idx) {
      var row = {};
      fields.forEach(function (field) {
        var selector = '[data-cv-group="' + group + '"][data-cv-key="' + field.key + '"][data-cv-index="' + idx + '"]';
        var el = mount.querySelector(selector);
        var val = el && 'value' in el ? el.value : '';
        row[field.key] = field.type === 'boolean' ? parseBooleanLike(val) : String(val || '').trim();
      });
      return row;
    }).filter(function (row) {
      return fields.some(function (field) {
        var value = row[field.key];
        return field.type === 'boolean' ? Boolean(value) : String(value || '').trim() !== '';
      });
    });
  }

  function upsertColaborador(updated) {
    var key = getColaboradorKey(updated);
    var index = colaboradores.findIndex(function (emp) { return getColaboradorKey(emp) === key; });
    if (index >= 0) {
      colaboradores[index] = Object.assign({}, colaboradores[index], updated);
      return colaboradores[index];
    }
    var created = Object.assign({}, updated);
    colaboradores.unshift(created);
    return created;
  }

  function getPuestoOptions(selectedValue) {
    var selected = String(selectedValue || '').trim();
    var options = [];
    var seen = {};
    puestosLaborales.forEach(function (item) {
      var nombre = String((item && item.nombre) || item || '').trim();
      var key = nombre.toLowerCase();
      if (!nombre || seen[key]) return;
      seen[key] = true;
      options.push(nombre);
    });
    options.sort(function (a, b) { return a.localeCompare(b, 'es'); });
    if (selected) {
      var selectedKey = selected.toLowerCase();
      if (!seen[selectedKey]) options.unshift(selected);
    }
    return options;
  }

  function renderPuestoSelect(selectedValue) {
    var selected = String(selectedValue || '').trim();
    var options = getPuestoOptions(selected);
    var html = '<option value="">— Seleccionar puesto —</option>';
    options.forEach(function (name) {
      var isSelected = selected && name === selected;
      html += '<option value="' + esc(name) + '"' + (isSelected ? ' selected' : '') + '>' + esc(name) + '</option>';
    });
    return html;
  }

  function parsePercentValue(raw) {
    if (raw === null || raw === undefined) return 0;
    var txt = String(raw).trim().replace('%', '');
    var num = parseFloat(txt);
    if (Number.isNaN(num)) return 0;
    if (num < 0) return 0;
    if (num > 100) return 100;
    return Math.round(num);
  }

  function getEmpleadoSkillPercentMap(current) {
    var out = {};
    var cv = current && typeof current === 'object' && current.cv_habilidades && typeof current.cv_habilidades === 'object'
      ? current.cv_habilidades
      : {};
    var all = []
      .concat(Array.isArray(cv.tecnicas) ? cv.tecnicas : [])
      .concat(Array.isArray(cv.blandas) ? cv.blandas : []);
    all.forEach(function (item) {
      if (!item || typeof item !== 'object') return;
      var nombre = String(item.nombre || '').trim();
      if (!nombre) return;
      out[nombre.toLowerCase()] = parsePercentValue(item.nivel);
    });
    return out;
  }

  function getPuestoByNombre(nombrePuesto) {
    var target = String(nombrePuesto || '').trim().toLowerCase();
    if (!target) return null;
    return puestosLaborales.find(function (p) {
      return String((p && p.nombre) || '').trim().toLowerCase() === target;
    }) || null;
  }

  function getPuestoDerivedFields(nombrePuesto, fallbackCurrent) {
    var puesto = getPuestoByNombre(nombrePuesto);
    var fallback = fallbackCurrent && typeof fallbackCurrent === 'object' ? fallbackCurrent : {};
    return {
      area: puesto ? String((puesto && puesto.area) || '').trim() : String(fallback.departamento || '').trim(),
      nivel: puesto ? String((puesto && puesto.nivel) || '').trim() : String(fallback.nivel_organizacional || fallback.coach || '').trim()
    };
  }

  function buildHabilidadesRows(current) {
    var puesto = getPuestoByNombre(current && current.puesto);
    if (!puesto || !Array.isArray(puesto.habilidades_requeridas)) return [];
    var empleadoMap = getEmpleadoSkillPercentMap(current || {});
    return puesto.habilidades_requeridas
      .map(function (hab) {
        var nombre = String((hab && hab.nombre) || '').trim();
        if (!nombre) return null;
        var requerido = parsePercentValue(
          (hab && (hab.requerido || hab.porcentaje_requerido || hab.minimo || hab.nivel_requerido)) || 0
        );
        var colaborador = parsePercentValue(empleadoMap[nombre.toLowerCase()] || 0);
        var brecha = colaborador - requerido;
        return {
          nombre: nombre,
          requerido: requerido,
          colaborador: colaborador,
          brecha: brecha
        };
      })
      .filter(Boolean)
      .sort(function (a, b) { return a.nombre.localeCompare(b.nombre, 'es'); });
  }

  function renderHabilidadesMatrix(current) {
    var puestoNombre = String((current && current.puesto) || '').trim();
    if (!puestoNombre) {
      return '<p class="text-sm text-base-content/60">Sin puesto asignado.</p>';
    }
    var rows = buildHabilidadesRows(current);
    if (!rows.length) {
      return '<p class="text-sm text-base-content/60">El puesto no tiene habilidades requeridas registradas.</p>';
    }
    var body = rows.map(function (row) {
      var brechaClass = row.brecha < 0 ? 'text-error font-semibold' : 'text-success font-semibold';
      return '<tr>' +
        '<td>' + esc(row.nombre) + '</td>' +
        '<td>' + esc(String(row.requerido)) + '%</td>' +
        '<td>' + esc(String(row.colaborador)) + '%</td>' +
        '<td class="' + brechaClass + '">' + esc(String(row.brecha)) + '%</td>' +
      '</tr>';
    }).join('');
    return '' +
      '<div class="rounded-box border border-base-300 bg-base-100 p-3">' +
        '<p class="text-sm text-base-content/70 mb-2"><strong>Puesto:</strong> ' + esc(puestoNombre) + '</p>' +
        '<div class="overflow-x-auto rounded-box border border-base-300">' +
          '<table class="table table-zebra table-sm md:table-md">' +
            '<thead><tr><th>Habilidad</th><th>% requerido</th><th>% colaborador</th><th>Brecha</th></tr></thead>' +
            '<tbody>' + body + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';
  }

      web_roles: Array.isArray(accessSettings.web_roles) ? accessSettings.web_roles : (Array.isArray(current.web_roles) ? current.web_roles : []),
      identidad_mision: String(current.identidad_mision || '').trim(),

      cv_contacto: cvContacto,
      cv_perfil_profesional: perfilEl && 'value' in perfilEl ? String(perfilEl.value || '').trim() : '',
      cv_experiencia: collectCvRecords('cv_experiencia', CV_EXPERIENCIA_FIELDS),
      cv_educacion: collectCvRecords('cv_educacion', CV_EDUCACION_FIELDS),
      cv_habilidades: {

      },

      cv_formacion: collectCvRecords('cv_formacion', CV_FORMACION_FIELDS),
      cv_logros: collectCvRecords('cv_logros', CV_LOGROS_FIELDS),
      cv_voluntariado: collectCvRecords('cv_voluntariado', CV_VOLUNTARIADO_FIELDS),

  function buildMainSavePayload(current) {

    var nombreEl = mount.querySelector('[data-col-identidad-nombre]');

  function bindPhotoActions(current) {
    var fileInput = mount.querySelector('[data-col-photo-input]');
    var editBtn = mount.querySelector('[data-col-photo-edit]');
    var delBtn = mount.querySelector('[data-col-photo-del]');
    if (!(fileInput instanceof HTMLInputElement) || !(editBtn instanceof HTMLButtonElement) || !(delBtn instanceof HTMLButtonElement)) return;

    function setBusy(isBusy) {
      editBtn.disabled = isBusy;
      delBtn.disabled = isBusy;
    }

    editBtn.addEventListener('click', function () {
      fileInput.click();
    });

    fileInput.addEventListener('change', function () {
      var file = fileInput.files && fileInput.files[0];
      if (!file) return;
      setBusy(true);
      var formData = new FormData();
      formData.append('file', file);
      fetch('/api/colaboradores/foto', {
        method: 'POST',
        headers: { Accept: 'application/json' },
        body: formData
      })
        .then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); })
        .then(function (uploadResult) {
          if (!uploadResult.ok || !uploadResult.json || uploadResult.json.success === false) {
            throw new Error((uploadResult.json && (uploadResult.json.error || uploadResult.json.detail)) || 'No se pudo subir la foto');
          }
          var imageUrl = String((uploadResult.json && uploadResult.json.url) || '').trim();
          if (!imageUrl) throw new Error('No se recibió URL de imagen');
          return saveColaboradorImage(current, imageUrl);
        })
        .then(function (saveResult) {
          if (!saveResult.ok || !saveResult.json || saveResult.json.success === false) {
            throw new Error((saveResult.json && (saveResult.json.error || saveResult.json.detail)) || 'No se pudo guardar la foto del colaborador');
          }
          var updated = (saveResult.json && saveResult.json.data) ? saveResult.json.data : Object.assign({}, current, { imagen: saveResult.imageUrl });
          upsertColaborador(updated);
          selectedColaboradorKey = getColaboradorKey(updated);
          renderForm(updated);
        })
        .catch(function (error) {
          window.alert(error && error.message ? error.message : 'No se pudo subir la foto');
        })
        .finally(function () {
          setBusy(false);
          fileInput.value = '';
        });
    });

    delBtn.addEventListener('click', function () {
      if (!String(current.imagen || '').trim()) return;
      setBusy(true);
      saveColaboradorImage(current, '')
        .then(function (saveResult) {
          if (!saveResult.ok || !saveResult.json || saveResult.json.success === false) {
            throw new Error((saveResult.json && (saveResult.json.error || saveResult.json.detail)) || 'No se pudo eliminar la foto del colaborador');
          }
          var updated = (saveResult.json && saveResult.json.data) ? saveResult.json.data : Object.assign({}, current, { imagen: '' });
          upsertColaborador(updated);
          selectedColaboradorKey = getColaboradorKey(updated);
          renderForm(updated);
        })
        .catch(function (error) {
          window.alert(error && error.message ? error.message : 'No se pudo eliminar la foto');
        })
        .finally(function () {
          setBusy(false);
        });
    });
  }

  function bindMainActions(current) {
    var editBtn = mount.querySelector('[data-col-main-edit]');
    var saveBtn = mount.querySelector('[data-col-main-save]');
    var delBtn = mount.querySelector('[data-col-main-del]');
    if (!(saveBtn instanceof HTMLButtonElement)) return;

    if (editBtn instanceof HTMLButtonElement) {
      editBtn.addEventListener('click', function () {
        isMainEditMode = true;
        currentFormTab = 'identidad';
        renderForm(current);
      });
    }

    saveBtn.addEventListener('click', function () {
      if (!isMainEditMode) return;
      var payload = buildMainSavePayload(current);
      if (!payload.nombre) {
        window.alert('El nombre es obligatorio.');
        return;
      }
      if (!payload.usuario) {
        window.alert('El usuario es obligatorio.');
        return;
      }
      if (!current || !current.id) {
        if (!payload.contrasena) {
          window.alert('La contraseña es obligatoria para crear colaborador.');
          return;
        }
        if (String(payload.contrasena).length < 8) {
          window.alert('La contraseña debe tener al menos 8 caracteres.');
          return;
        }
      }
      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando...';
      fetch('/api/colaboradores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); })
        .then(function (result) {
          if (!result.ok || !result.json || result.json.success === false) {
            throw new Error((result.json && (result.json.error || result.json.detail)) || 'No se pudo guardar');
          }
          if (result.json && result.json.data) {
            current = upsertColaborador(result.json.data);
            selectedColaboradorKey = getColaboradorKey(current);
          }
          isMainEditMode = false;
          renderForm(current);
        })
        .catch(function (error) {
          window.alert(error && error.message ? error.message : 'No se pudo guardar');
        })
        .finally(function () {
          saveBtn.disabled = false;
          saveBtn.textContent = current && current.id ? 'Guardar' : 'Crear';
        });
    });

    if (delBtn instanceof HTMLButtonElement) {
      delBtn.addEventListener('click', function () {
        var id = current && current.id;
        if (!id) return;
        if (!window.confirm('¿Eliminar este colaborador?')) return;
        delBtn.disabled = true;
        delBtn.textContent = 'Eliminando...';
        fetch('/api/colaboradores/' + encodeURIComponent(String(id)), {
          method: 'DELETE',
          headers: { Accept: 'application/json' }
        })
          .then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); })
          .then(function (result) {
            if (!result.ok || !result.json || result.json.success === false) {
              throw new Error((result.json && (result.json.error || result.json.detail)) || 'No se pudo eliminar');
            }
            var currentKey = getColaboradorKey(current);
            colaboradores = colaboradores.filter(function (emp) { return getColaboradorKey(emp) !== currentKey; });
            selectedColaboradorKey = '';
            isMainEditMode = false;
            render('list');
          })
          .catch(function (error) {
            window.alert(error && error.message ? error.message : 'No se pudo eliminar');
          })
          .finally(function () {
            delBtn.disabled = false;
            delBtn.textContent = 'Eliminar';
          });
      });
    }
  }

  function getCvRecordMeta(group, draft) {
    if (!draft || typeof draft !== 'object') return null;
    if (group === 'cv_experiencia') return { list: draft.cv_experiencia, fields: CV_EXPERIENCIA_FIELDS };
    if (group === 'cv_educacion') return { list: draft.cv_educacion, fields: CV_EDUCACION_FIELDS };
    if (group === 'cv_habilidades_tecnicas') return { list: draft.cv_habilidades && draft.cv_habilidades.tecnicas, fields: CV_SKILL_FIELDS };
    if (group === 'cv_habilidades_blandas') return { list: draft.cv_habilidades && draft.cv_habilidades.blandas, fields: CV_SKILL_FIELDS };
    if (group === 'cv_idiomas') return { list: draft.cv_idiomas, fields: CV_IDIOMA_FIELDS };
    if (group === 'cv_formacion') return { list: draft.cv_formacion, fields: CV_FORMACION_FIELDS };
    if (group === 'cv_logros') return { list: draft.cv_logros, fields: CV_LOGROS_FIELDS };
    if (group === 'cv_voluntariado') return { list: draft.cv_voluntariado, fields: CV_VOLUNTARIADO_FIELDS };
    return null;
  }

  function createEmptyCvRecord(fields) {
    var row = {};
    (fields || []).forEach(function (field) {
      row[field.key] = field.type === 'boolean' ? false : '';
    });
    return row;
  }

  function bindCvRecordActions(current) {
    Array.from(mount.querySelectorAll('[data-cv-add]')).forEach(function (btn) {
      btn.addEventListener('click', function () {
        var group = String(btn.getAttribute('data-cv-add') || '').trim();
        if (!group) return;
        var draft = buildCvSavePayload(current);
        var meta = getCvRecordMeta(group, draft);
        if (!meta || !Array.isArray(meta.list)) return;
        meta.list.push(createEmptyCvRecord(meta.fields));
        currentFormTab = 'cv';
        renderForm(draft);
      });
    });
    Array.from(mount.querySelectorAll('[data-cv-remove]')).forEach(function (btn) {
      btn.addEventListener('click', function () {
        var group = String(btn.getAttribute('data-cv-remove') || '').trim();
        var index = Number(btn.getAttribute('data-cv-remove-index'));
        if (!group || Number.isNaN(index)) return;
        var draft = buildCvSavePayload(current);
        var meta = getCvRecordMeta(group, draft);
        if (!meta || !Array.isArray(meta.list) || !meta.list.length) return;
        if (index >= 0 && index < meta.list.length) meta.list.splice(index, 1);
        if (!meta.list.length) meta.list.push(createEmptyCvRecord(meta.fields));
        currentFormTab = 'cv';
        renderForm(draft);
      });
    });
  }

  function normalizeCvList(raw, pickers) {
    var rows = Array.isArray(raw) ? raw : [];
    return rows.map(function (row) {
      if (!row || typeof row !== 'object') return '';
      var parts = [];
      (pickers || []).forEach(function (key) {
        var val = String(row[key] || '').trim();
        if (val) parts.push(val);
      });
      return parts.join(' · ');
    }).filter(function (txt) { return !!txt; });
  }

  function normalizeMixedList(raw, pickers) {
    var rows = Array.isArray(raw) ? raw : [];
    return rows.map(function (row) {
      if (row === null || row === undefined) return '';
      if (typeof row === 'string' || typeof row === 'number') return String(row).trim();
      if (typeof row !== 'object') return '';
      var parts = [];
      (pickers || []).forEach(function (key) {
        var val = String(row[key] || '').trim();
        if (val) parts.push(val);
      });
      if (!parts.length) {
        Object.keys(row).forEach(function (key) {
          var val = row[key];
          if (val === null || val === undefined || typeof val === 'object') return;
          var txt = String(val).trim();
          if (txt) parts.push(txt);
        });
      }
      return parts.join(' · ');
    }).filter(function (txt) { return !!txt; });
  }

  function renderLabelValueList(values, labels, emptyText, orderedKeys, emptyValueText) {
    var rows = [];
    var fallbackValue = String(emptyValueText || 'Sin dato');
    if (values && typeof values === 'object' && Array.isArray(orderedKeys) && orderedKeys.length) {
      orderedKeys.forEach(function (key) {
        var raw = values[key];
        var valueText = '';
        if (raw !== null && raw !== undefined && raw !== '') {
          valueText = typeof raw === 'boolean' ? (raw ? 'Sí' : 'No') : String(raw).trim();
        }
        rows.push({
          label: (labels && labels[key]) ? labels[key] : key,
          value: valueText || fallbackValue
        });
      });
    } else if (values && typeof values === 'object') {
      Object.keys(values).forEach(function (key) {
        var raw = values[key];
        if (raw === null || raw === undefined || raw === '') return;
        var valueText = typeof raw === 'boolean' ? (raw ? 'Sí' : 'No') : String(raw).trim();
        if (!valueText) return;
        rows.push({
          label: (labels && labels[key]) ? labels[key] : key,
          value: valueText
        });
      });
    }
    if (!rows.length) return '<p class="text-sm text-base-content/60">' + esc(emptyText || 'Sin registros.') + '</p>';
    return '<ul class="cv-field-grid">' +
      rows.map(function (row) {
        return '' +
          '<li class="cv-field-item">' +
            '<span class="cv-field-label">' + esc(row.label) + '</span>' +

      }).join('') +

  }

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      if (document.querySelector('script[src="' + src + '"]')) {
        resolve();
        return;
      }
      var script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = function () { resolve(); };
      script.onerror = function () { reject(new Error('No se pudo cargar ' + src)); };
      document.head.appendChild(script);
    });
  }

    var result = await orgLibPromise;

                  '<label class="form-control w-full"><div class="label"><span class="label-text font-semibold">Departamento</span></div><input class="input input-bordered w-full" type="text" placeholder="Departamento" value="' + esc(current.departamento || '') + '"></label>' +
                  '<label class="form-control w-full"><div class="label"><span class="label-text font-semibold">Estado</span></div><input class="input input-bordered w-full" type="text" placeholder="Activo" value="' + esc(current.estado || '') + '"></label>' +
                '</div>' +
              '</div>' +
              '<div class="' + (isFuncionesPuesto ? '' : 'hidden') + '" data-panel="funciones-puesto">' +
                '<div class="grid gap-2">' +
                  '<p class="text-sm text-base-content/80"><strong>Puesto:</strong> ' + esc(current.puesto || 'N/D') + '</p>' +
                  '<p class="text-sm text-base-content/80"><strong>Rol:</strong> ' + esc(current.rol || 'N/D') + '</p>' +
                  '<p class="text-sm text-base-content/60">Sin funciones del puesto configuradas.</p>' +
                '</div>' +
              '</div>' +
              '<div class="' + (isKpis ? '' : 'hidden') + '" data-panel="kpis">' +
                '<p class="text-sm text-base-content/60">Sin KPIs registrados.</p>' +
              '</div>' +
              '<div class="' + (isNotas ? '' : 'hidden') + '" data-panel="notas">' +
                '<p class="text-sm text-base-content/60">Sin notas registradas.</p>' +
              '</div>' +
              '<div class="' + (isCapacitacion ? '' : 'hidden') + '" data-panel="capacitacion">' +
                '<div class="grid gap-4">' +
                  '<div><h4 class="font-semibold text-base-content mb-2">Capacitaciones</h4>' + renderSimpleList(formacion, 'Sin capacitaciones registradas.') + '</div>' +
                  '<div><h4 class="font-semibold text-base-content mb-2">Logros</h4>' + renderSimpleList(logros, 'Sin logros registrados.') + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="' + (isActivoFijo ? '' : 'hidden') + '" data-panel="activo-fijo">' +
                '<p class="text-sm text-base-content/60">Sin activos fijos asignados.</p>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</article>';
    Array.from(mount.querySelectorAll('[data-col-tab][data-tab]')).forEach(function (btn) {
      btn.addEventListener('click', function () {
        currentFormTab = btn.getAttribute('data-tab') || 'cv';
        renderForm();
      });
    });
    bindCvSave(current);
    bindAccessSave(current);
    bindPhotoActions(current);
    bindPasswordToggle();
    bindPuestoAutofill(current);
    bindMainActions(current);
    bindCvRecordActions(current);
    if (isNewRecord) clearNewDraftAutofill();
  }

  function renderList() {
    var rowsHtml = '';
    var visibles = getVisibleColaboradores();
    if (!Array.isArray(visibles) || !visibles.length) {
      rowsHtml = '<tr><td colspan="6" class="text-base-content/60">Sin registros.</td></tr>';
    } else {
      rowsHtml = visibles.map(function (emp) {
        return '<tr data-colab-open-form-row data-colab-key="' + esc(getColaboradorKey(emp)) + '" class="cursor-pointer hover">' +
          '<td>' + esc(emp.nombre || '') + '</td>' +
          '<td>' + esc(emp.usuario || '') + '</td>' +
          '<td>' + esc(emp.correo || '') + '</td>' +
          '<td>' + esc(emp.rol || '') + '</td>' +
          '<td>' + esc(emp.departamento || '') + '</td>' +
          '<td>' + esc(emp.estado || '') + '</td>' +
        '</tr>';
      }).join('');
    }
    mount.innerHTML = '' +
      '<article class="card bg-base-100 border border-base-300 shadow-sm">' +
        '<div class="card-body gap-4">' +
          '<h3 class="card-title">Lista de colaboradores</h3>' +
          '<div class="overflow-x-auto rounded-box border border-base-300">' +
            '<table class="table table-zebra w-full text-sm">' +
              '<thead><tr><th>Nombre</th><th>Usuario</th><th>Correo</th><th>Rol</th><th>Departamento</th><th>Estado</th></tr></thead>' +
              '<tbody>' + rowsHtml + '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
      '</article>';
  }

  function renderKanban() {
    var groups = { Activo: [], Inactivo: [], Otro: [] };
    getVisibleColaboradores().forEach(function (emp) {
      var st = String(emp.estado || '').trim().toLowerCase();
      if (st === 'activo') groups.Activo.push(emp);
      else if (st === 'inactivo') groups.Inactivo.push(emp);
      else groups.Otro.push(emp);
    });
    var lanes = Object.keys(groups).map(function (key) {
      var cards = groups[key].length
        ? groups[key].map(function (emp) {
            return '<article class="rounded-box border border-base-300 bg-base-100 p-3 grid gap-1">' +
              '<strong class="text-base-content">' + esc(emp.nombre || '') + '</strong>' +
              '<p class="text-sm text-base-content/80">' + esc(emp.usuario || '') + '</p>' +
              '<p class="text-sm text-base-content/80">' + esc(emp.departamento || '') + '</p>' +
            '</article>';
          }).join('')
        : '<p class="text-sm text-base-content/60">Sin registros.</p>';
      return '<div class="rounded-box border border-base-300 bg-base-200 p-3 grid gap-2">' +
        '<h4 class="font-semibold text-base-content">' + esc(key) + '</h4>' +
        cards +
      '</div>';
    }).join('');
    mount.innerHTML = '' +
      '<article class="card bg-base-100 border border-base-300 shadow-sm">' +
        '<div class="card-body gap-4">' +
          '<h3 class="card-title">Kanban de colaboradores</h3>' +
          '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">' + lanes + '</div>' +
        '</div>' +
      '</article>';
  }

  function getOrgPathToRoot(id, mapById) {
    var path = [];
    var current = mapById[id];
    var guard = 0;
    while (current && guard < 200) {
      path.push(current.id);
      if (!current.parentId) break;
      current = mapById[current.parentId];
      guard += 1;
    }
    return path;
  }

  async function renderOrganigrama() {
    mount.innerHTML = '' +
      '<article class="card bg-base-100 border border-base-300 shadow-sm">' +
        '<div class="card-body gap-4">' +
          '<h3 class="card-title">Organigrama de colaboradores</h3>' +
          '<div data-colab-org-chart class="w-full min-h-[640px] overflow-auto rounded-box border border-base-300 bg-base-200 p-3">' +
            '<p class="text-sm text-base-content/70">Cargando organigrama...</p>' +
          '</div>' +
        '</div>' +
      '</article>';
    var orgChartEl = mount.querySelector('[data-colab-org-chart]');
    if (!(orgChartEl instanceof HTMLElement)) return;

    try {
      var response = await fetch('/api/colaboradores/organigrama', { headers: { Accept: 'application/json' } });
      var payload = await response.json().catch(function () { return {}; });
      if (!response.ok || !payload || payload.success === false) {
        throw new Error((payload && (payload.error || payload.detail)) || 'No se pudo cargar el organigrama');
      }
      var data = Array.isArray(payload.data) ? payload.data.filter(matchesColaboradorSearch) : [];
      if (!data.length) {
        orgChartEl.innerHTML = '<p class="text-sm text-base-content/70">Sin datos para organigrama.</p>';
        return;
      }

      var libOk = await ensureOrgLibrary();
      if (!libOk) {
        orgChartEl.innerHTML = '<p class="text-sm text-base-content/70">No se pudo cargar la librería de organigrama.</p>';
        return;
      }

      var byId = {};
      data.forEach(function (row) {
        var rowId = String(row.id || '').trim();
        if (rowId) byId[rowId] = row;
      });

      var nodes = data.map(function (row) {
        var rowId = String(row.id || '').trim() || Math.random().toString(36).slice(2);
        var bossId = row.jefe_inmediato_id !== null && row.jefe_inmediato_id !== undefined
          ? String(row.jefe_inmediato_id).trim()
          : '';
        return {
          id: rowId,
          parentId: bossId && byId[bossId] ? bossId : '',
          name: String(row.nombre || 'Colaborador'),
          role: String(row.rol || 'usuario'),
          user: String(row.usuario || ''),
          department: String(row.departamento || 'Sin departamento'),
          position: String(row.puesto || 'Sin puesto'),
          manager: String(row.jefe || 'Sin jefe inmediato'),
          image: String(row.imagen || '').trim(),
          status: String(row.estado || 'Activo')
        };
      });

      var roots = nodes.filter(function (n) { return !n.parentId; });
      if (roots.length > 1) {
        nodes.push({
          id: '__ROOT__',
          parentId: '',
          name: 'Colaboradores',
          role: '',
          user: '',
          department: '',
          position: '',
          manager: '',
          image: '',
          status: 'Activo'
        });
        nodes = nodes.map(function (n) {
          if (!n.parentId && n.id !== '__ROOT__') n.parentId = '__ROOT__';
          return n;
        });
      }

      var nodeMap = {};
      nodes.forEach(function (node) { nodeMap[node.id] = node; });
      var baseRootId = nodeMap.__ROOT__ ? '__ROOT__' : (roots[0] ? roots[0].id : '');
      if (!orgExpandedColaboradorId) orgExpandedColaboradorId = baseRootId;
      var expandedPath = new Set(getOrgPathToRoot(orgExpandedColaboradorId, nodeMap));
      nodes = nodes.map(function (node) {
        node._expanded = expandedPath.has(node.id);
        return node;
      });

      orgChartEl.innerHTML = '';
      colabOrgChart = new window.d3.OrgChart()
        .container(orgChartEl)
        .data(nodes)
        .nodeWidth(function () { return 340; })
        .nodeHeight(function () { return 162; })
        .childrenMargin(function () { return 48; })
        .compact(true)
        .initialExpandLevel(0)
        .setActiveNodeCentered(true)
        .nodeButtonWidth(function () { return 36; })
        .nodeButtonHeight(function () { return 36; })
        .nodeButtonX(function () { return -18; })
        .nodeButtonY(function () { return -18; })
        .buttonContent(function (ctx) {
          var node = ctx && ctx.node ? ctx.node : null;
          var expanded = !!(node && node.children);
          var sign = expanded ? '−' : '+';
          var count = Number(node && node.data ? node.data._directSubordinates || 0 : 0);
          return '<div style="width:36px;height:36px;border-radius:9999px;background:#0f172a;color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;border:2px solid #fff;box-shadow:0 4px 10px rgba(15,23,42,.22);">' + sign + (count > 0 ? '<span style="font-size:10px;margin-left:2px;">' + count + '</span>' : '') + '</div>';
        })
        .nodeContent(function (d) {
          var item = d && d.data ? d.data : {};
          var imageHtml = item.image
            ? '<img src="' + esc(item.image) + '" alt="' + esc(item.name || 'Colaborador') + '" style="width:100%;height:100%;object-fit:cover;display:block;">'
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:800;color:#ffffff;">' + esc((item.name || '?').charAt(0).toUpperCase()) + '</div>';
          return ''
            + '<div style="display:grid;grid-template-columns:92px 1fr;height:158px;border:1px solid #dbe2ea;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 6px 14px rgba(15,23,42,.12);font-family:inherit;">'
            +   '<div style="background:#0f172a;display:flex;align-items:center;justify-content:center;overflow:hidden;">' + imageHtml + '</div>'
            +   '<div style="padding:12px;display:grid;gap:5px;align-content:start;">'
            +     '<div style="font-size:22px;font-weight:800;color:#0f172a;line-height:1.08;">' + esc(item.name || 'Colaborador') + '</div>'
            +     '<div style="font-size:14px;color:#334155;"><strong>Puesto:</strong> ' + esc(item.position || 'Sin puesto') + '</div>'
            +     '<div style="font-size:14px;color:#334155;"><strong>Departamento:</strong> ' + esc(item.department || 'Sin departamento') + '</div>'
            +     '<div style="font-size:14px;color:#334155;"><strong>Usuario:</strong> ' + esc(item.user || '—') + '</div>'
            +   '</div>'
            + '</div>';
        })
        .onNodeClick(function (d) {
          var clickedId = d && d.data ? d.data.id : '';
          if (!clickedId) return;
          orgExpandedColaboradorId = orgExpandedColaboradorId === clickedId ? baseRootId : clickedId;
          renderOrganigrama();
        })
        .render();
    } catch (error) {
      orgChartEl.innerHTML = '<p class="text-sm text-error">' + esc(error && error.message ? error.message : 'No se pudo cargar el organigrama.') + '</p>';
    }
  }

  function render(view) {
    currentView = ['form', 'list', 'kanban', 'organigrama'].indexOf(view) >= 0 ? view : 'list';
    setActiveViewButton(currentView);
    if (currentView === 'form') return renderForm();
    if (currentView === 'kanban') return renderKanban();
    if (currentView === 'organigrama') return renderOrganigrama();
    return renderList();
  }

  document.addEventListener('backend-view-change', function (event) {
    var view = event && event.detail ? event.detail.view : '';
    if (!view) return;
    render(view);
  });

  viewButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      render(btn.getAttribute('data-view') || 'list');
    });
  });

  mount.addEventListener('click', function (event) {
    var target = event.target;
    if (!(target instanceof HTMLElement)) return;
    var row = target.closest('[data-colab-open-form-row]');
    if (!(row instanceof HTMLElement)) return;
    openFormByKey(row.getAttribute('data-colab-key') || '');
  });

  if (searchBtn) {
    searchBtn.addEventListener('click', function () {
      var value = window.prompt('Buscar colaborador (nombre, usuario, correo, rol o departamento):', searchTerm || '');
      if (value === null) return;
      searchTerm = String(value || '').trim();
      render(currentView || 'list');
    });
  }

  if (newBtn) {
    newBtn.addEventListener('click', function () {
      selectedColaboradorKey = '';
      currentFormTab = 'identidad';
      isMainEditMode = true;
      renderForm(createNewColaboradorDraft());
      currentView = 'form';
      setActiveViewButton('form');
    });
  }

  Promise.all([
    fetch('/api/colaboradores', { headers: { Accept: 'application/json' } }).then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); }),
    fetch('/api/puestos-laborales', { headers: { Accept: 'application/json' } }).then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); })
  ])
    .then(function (results) {
      var colabResult = results[0];
      var puestosResult = results[1];
      if (!colabResult.ok || !colabResult.json || colabResult.json.success === false) throw new Error('No se pudieron cargar colaboradores');
      colaboradores = Array.isArray(colabResult.json.data) ? colabResult.json.data : [];
      puestosLaborales = (puestosResult && puestosResult.ok && puestosResult.json && puestosResult.json.success !== false && Array.isArray(puestosResult.json.data))
        ? puestosResult.json.data
        : [];
      render('list');
    })
    .catch(function () {
      colaboradores = [];
      puestosLaborales = [];
      render('list');
    });
})();
</script>
