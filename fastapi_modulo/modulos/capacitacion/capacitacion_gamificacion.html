<style>
  .gam-shell {
    padding: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #0f172a;
    box-sizing: border-box;
  }
  .gam-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .gam-title    { font-size: 22px; font-weight: 700; margin: 0; }
  .gam-subtitle { font-size: 14px; color: #64748b; margin: 4px 0 0; }

  /* ── Perfil del usuario ── */
  .gam-profile-card {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    border-radius: 20px;
    padding: 24px 28px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }
  .gam-profile-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
  }
  .gam-level-badge {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.2));
  }
  .gam-profile-info { flex: 1; }
  .gam-profile-name { font-size: 20px; font-weight: 800; }
  .gam-level-name   { font-size: 14px; opacity: .9; margin-top: 2px; }
  .gam-pts          { font-size: 30px; font-weight: 800; margin-top: 8px; }
  .gam-pts-label    { font-size: 12px; opacity: .8; }
  .gam-lvl-bar-wrap { margin-top: 10px; }
  .gam-lvl-bar-bg   { height: 8px; border-radius: 4px; background: rgba(255,255,255,.25); overflow: hidden; }
  .gam-lvl-bar-fill { height: 100%; border-radius: 4px; background: #fff; transition: width .6s ease; }
  .gam-lvl-info     { font-size: 11px; opacity: .8; margin-top: 4px; }

  /* ── Layout 2 columnas ── */
  .gam-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 20px;
  }
  @media (max-width: 760px) { .gam-row { grid-template-columns: 1fr; } }

  /* Card genérica */
  .gam-card {
    background: #fff;
    border: 1px solid rgba(15,23,42,.08);
    border-radius: 16px;
    padding: 20px 22px;
  }
  .gam-card-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e293b;
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Insignias ── */
  .gam-badges-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
  }
  .gam-badge-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    border-radius: 12px;
    border: 1.5px solid #f1f5f9;
    text-align: center;
    transition: border-color .15s, transform .15s;
    cursor: default;
  }
  .gam-badge-item.earned {
    border-color: var(--badge-color, #6366f1);
    background: color-mix(in srgb, var(--badge-color, #6366f1) 8%, #fff);
  }
  .gam-badge-item:hover { transform: translateY(-2px); }
  .gam-badge-item.locked { opacity: .35; filter: grayscale(1); }
  .gam-badge-emoji  { font-size: 28px; line-height: 1; }
  .gam-badge-name   { font-size: 10px; font-weight: 600; color: #334155; line-height: 1.2; }
  .gam-badge-date   { font-size: 9px; color: #94a3b8; }

  /* ── Ranking ── */
  .gam-rank-list { list-style: none; padding: 0; margin: 0; }
  .gam-rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f8fafc;
    font-size: 13px;
  }
  .gam-rank-item:last-child { border-bottom: none; }
  .gam-rank-pos {
    min-width: 28px;
    font-weight: 800;
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
  }
  .gam-rank-pos.top1 { color: #f59e0b; font-size: 18px; }
  .gam-rank-pos.top2 { color: #94a3b8; font-size: 16px; }
  .gam-rank-pos.top3 { color: #b45309; font-size: 16px; }
  .gam-rank-name { flex: 1; font-weight: 600; color: #1e293b; }
  .gam-rank-level{ font-size: 11px; color: #64748b; }
  .gam-rank-pts  { font-weight: 800; color: #4f46e5; min-width: 50px; text-align: right; }
  .gam-rank-badges{ font-size: 11px; color: #94a3b8; min-width: 40px; text-align: right; }
  .gam-rank-me .gam-rank-name { color: #4f46e5; }
  .gam-rank-me { background: #f5f3ff; border-radius: 8px; padding-left: 8px; padding-right: 8px; }

  /* ── Historial de actividad ── */
  .gam-activity-list { list-style: none; padding: 0; margin: 0; }
  .gam-activity-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f8fafc;
    font-size: 13px;
  }
  .gam-activity-item:last-child { border-bottom: none; }
  .gam-activity-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: #f1f5f9;
  }
  .gam-activity-motivo { flex: 1; color: #334155; }
  .gam-activity-pts    { font-weight: 700; color: #16a34a; }
  .gam-activity-fecha  { font-size: 11px; color: #94a3b8; }

  /* Botones */
  .gam-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity .15s;
  }
  .gam-btn:hover { opacity: .85; }
  .gam-btn.is-outline { background: transparent; color: #475569; border: 1.5px solid #cbd5e1; }

  /* Status */
  .gam-loading {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2.5px solid #e2e8f0;
    border-top-color: #4f46e5;
    border-radius: 50%;
    animation: gam-spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes gam-spin { to { transform: rotate(360deg); } }
  .gam-status { text-align: center; padding: 32px; color: #64748b; font-size: 14px; }
</style>

<div id="gam-root" class="gam-shell"
     data-js-url="/api/capacitacion/assets/capacitacion_gamificacion.js?v=20260309">

  <!-- Header -->
  <div class="gam-header">
    <div>
      <h2 class="gam-title">🎮 Gamificación</h2>
      <p class="gam-subtitle">Puntos, insignias, niveles y ranking de aprendizaje.</p>
    </div>
    <a href="/capacitacion" class="gam-btn is-outline">← Catálogo</a>
  </div>

  <!-- Perfil -->
  <div id="gam-profile" class="gam-profile-card">
    <div class="gam-status"><span class="gam-loading"></span> Cargando perfil…</div>
  </div>

  <!-- Fila: insignias + ranking -->
  <div class="gam-row">

    <!-- Mis insignias -->
    <div class="gam-card">
      <p class="gam-card-title">🏅 Mis insignias</p>
      <div id="gam-badges" class="gam-badges-grid">
        <div class="gam-status" style="grid-column:1/-1;"><span class="gam-loading"></span></div>
      </div>
    </div>

    <!-- Ranking -->
    <div class="gam-card">
      <p class="gam-card-title">🏆 Ranking de la organización</p>
      <ul id="gam-ranking" class="gam-rank-list">
        <li class="gam-status"><span class="gam-loading"></span> Cargando…</li>
      </ul>
    </div>

  </div>

  <!-- Historial de actividad -->
  <div class="gam-card">
    <p class="gam-card-title">📋 Actividad reciente</p>
    <ul id="gam-activity" class="gam-activity-list">
      <li class="gam-status"><span class="gam-loading"></span> Cargando…</li>
    </ul>
  </div>

</div>

<script>
(function () {
  var root  = document.getElementById('gam-root');
  var jsUrl = root && root.getAttribute('data-js-url');
  if (jsUrl) {
    var s = document.createElement('script');
    s.src = jsUrl;
    document.body.appendChild(s);
  }
})();
</script>
