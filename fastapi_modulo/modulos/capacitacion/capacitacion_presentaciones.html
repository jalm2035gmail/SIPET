<style>
  .pres-shell {
    padding: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #0f172a;
    box-sizing: border-box;
  }
  .pres-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .pres-title    { font-size: 22px; font-weight: 700; margin: 0; }
  .pres-subtitle { font-size: 14px; color: #64748b; margin: 4px 0 0; }

  .pres-toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    align-items: center;
  }
  .pres-filter-select {
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 14px;
    color: #374151;
    background: #fff;
    cursor: pointer;
  }
  .pres-btn-new {
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pres-btn-new:hover { background: #4338ca; }

  .pres-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .pres-card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e2e8f0;
    overflow: hidden;
    transition: box-shadow .15s;
    cursor: pointer;
  }
  .pres-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.10); }

  .pres-card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .pres-card-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .pres-card-body { padding: 14px 16px 10px; }
  .pres-card-name { font-size: 15px; font-weight: 600; margin: 0 0 4px; color: #1e293b; }
  .pres-card-meta { font-size: 12px; color: #64748b; margin: 0; }

  .pres-card-footer {
    padding: 8px 16px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .pres-badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px;
  }
  .pres-badge.borrador { background: #fef3c7; color: #92400e; }
  .pres-badge.publicado { background: #d1fae5; color: #065f46; }

  .pres-card-actions { margin-left: auto; display: flex; gap: 6px; }
  .pres-action-btn {
    background: none; border: 1px solid #e2e8f0; border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer; color: #374151;
    transition: background .12s;
  }
  .pres-action-btn:hover { background: #f1f5f9; }
  .pres-action-btn.danger { color: #dc2626; border-color: #fca5a5; }
  .pres-action-btn.danger:hover { background: #fef2f2; }

  .pres-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: #94a3b8;
  }
  .pres-empty-icon { font-size: 48px; margin-bottom: 12px; }
  .pres-empty-msg  { font-size: 15px; }

  /* Modal crear */
  .pres-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .pres-modal-overlay.hidden { display: none; }
  .pres-modal {
    background: #fff; border-radius: 16px; padding: 28px 32px;
    width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .pres-modal h3 { margin: 0 0 18px; font-size: 18px; font-weight: 700; }
  .pres-modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #374151; }
  .pres-modal input, .pres-modal textarea {
    width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0;
    border-radius: 8px; padding: 8px 12px; font-size: 14px; margin-bottom: 14px;
  }
  .pres-modal textarea { height: 80px; resize: vertical; }
  .pres-modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .pres-modal-btns button {
    border: none; border-radius: 8px; padding: 9px 20px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-cancel { background: #f1f5f9; color: #374151; }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-create { background: #4f46e5; color: #fff; }
  .btn-create:hover { background: #4338ca; }

  #pres-toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 99999;
    background: #1e293b; color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: 14px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  #pres-toast.show { opacity: 1; }
</style>

<div id="pres-root" class="pres-shell"
     data-js-url="/api/capacitacion/assets/capacitacion_presentaciones.js?v=20260309">

  <div class="pres-header">
    <div>
      <h1 class="pres-title">Presentaciones</h1>
      <p class="pres-subtitle">Crea y gestiona presentaciones interactivas tipo Genially</p>
    </div>
  </div>

  <div class="pres-toolbar">
    <select id="pres-filter-estado" class="pres-filter-select">
      <option value="">Todos los estados</option>
      <option value="borrador">Borrador</option>
      <option value="publicado">Publicado</option>
    </select>
    <button id="pres-btn-new" class="pres-btn-new">
      <span>+</span> Nueva presentación
    </button>
  </div>

  <div id="pres-grid" class="pres-grid">
    <div class="pres-empty">
      <div class="pres-empty-icon">⏳</div>
      <div class="pres-empty-msg">Cargando...</div>
    </div>
  </div>

</div>

<!-- Modal crear -->
<div id="pres-modal" class="pres-modal-overlay hidden">
  <div class="pres-modal">
    <h3>Nueva presentación</h3>
    <label for="pres-new-titulo">Título</label>
    <input id="pres-new-titulo" type="text" placeholder="Ej. Inducción corporativa" />
    <label for="pres-new-desc">Descripción (opcional)</label>
    <textarea id="pres-new-desc" placeholder="Breve descripción..."></textarea>
    <div class="pres-modal-btns">
      <button class="btn-cancel" id="pres-modal-cancel">Cancelar</button>
      <button class="btn-create" id="pres-modal-create">Crear</button>
    </div>
  </div>
</div>

<div id="pres-toast"></div>

<script>
(function () {
  var root  = document.getElementById('pres-root');
  var jsUrl = root && root.getAttribute('data-js-url');
  if (jsUrl) {
    var s = document.createElement('script');
    s.src = jsUrl;
    document.body.appendChild(s);
  }
})();
</script>
