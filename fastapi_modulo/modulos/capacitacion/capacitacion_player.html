<style>
  .cp-shell {
    padding: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #0f172a;
    box-sizing: border-box;
  }
  /* Back / breadcrumb */
  .cp-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #475569;
    text-decoration: none;
    margin-bottom: 16px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
  }
  .cp-back:hover { color: #0f172a; }
  /* Progress header */
  .cp-progress-header {
    background: #fff;
    border: 1px solid rgba(15,23,42,.08);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .cp-progress-title { font-size: 18px; font-weight: 700; margin: 0; flex: 1; min-width: 200px; }
  .cp-progress-meta  { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .cp-progress-bar-wrap { flex: 1; min-width: 180px; }
  .cp-progress-bar { height: 8px; border-radius: 6px; background: #e2e8f0; overflow: hidden; }
  .cp-progress-fill { height: 100%; border-radius: 6px; background: #16a34a; transition: width .4s; }
  .cp-progress-pct { font-size: 13px; font-weight: 600; color: #16a34a; margin-top: 4px; }
  /* Layout */
  .cp-layout {
    display: grid;
    grid-template-columns: 280px minmax(0,1fr);
    gap: 18px;
    align-items: start;
  }
  /* Sidebar lecciones */
  .cp-sidebar {
    background: #fff;
    border: 1px solid rgba(15,23,42,.08);
    border-radius: 16px;
    overflow: hidden;
    position: sticky;
    top: 16px;
  }
  .cp-sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(15,23,42,.08);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #475569;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cp-sidebar-count {
    background: #f1f5f9;
    color: #475569;
    border-radius: 999px;
    font-size: 11px;
    padding: 2px 8px;
  }
  .cp-lesson-list { list-style: none; margin: 0; padding: 8px 0; }
  .cp-lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
    font-size: 13px;
    color: #334155;
  }
  .cp-lesson-item:hover { background: #f8fafc; }
  .cp-lesson-item.is-active { background: #f0fdf4; border-left-color: #16a34a; color: #0f172a; font-weight: 600; }
  .cp-lesson-item.is-done   { color: #15803d; }
  .cp-lesson-check {
    flex: 0 0 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: background .2s, border-color .2s;
  }
  .cp-lesson-item.is-done .cp-lesson-check {
    background: #16a34a;
    border-color: #16a34a;
    color: #fff;
  }
  .cp-lesson-item.is-active .cp-lesson-check {
    border-color: #16a34a;
  }
  .cp-lesson-title { flex: 1; line-height: 1.3; }
  .cp-lesson-type-icon { flex: 0 0 16px; font-size: 14px; }
  .cp-lesson-dur { font-size: 11px; color: #94a3b8; white-space: nowrap; }
  /* Info card en sidebar */
  .cp-info-card {
    border-top: 1px solid rgba(15,23,42,.08);
    padding: 14px 16px;
    font-size: 12px;
    color: #475569;
    display: grid;
    gap: 6px;
  }
  .cp-info-row { display: flex; justify-content: space-between; gap: 8px; }
  .cp-info-label { color: #94a3b8; }
  .cp-info-value { font-weight: 600; color: #0f172a; text-align: right; }
  /* Player area */
  .cp-player {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .cp-player-card {
    background: #fff;
    border: 1px solid rgba(15,23,42,.08);
    border-radius: 16px;
    overflow: hidden;
  }
  .cp-player-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(15,23,42,.06);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .cp-player-lesson-title { font-size: 17px; font-weight: 700; margin: 0; line-height: 1.3; }
  .cp-player-lesson-meta  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
  .cp-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .cp-badge.texto      { background:#e0f2fe; color:#0369a1; }
  .cp-badge.video      { background:#ede9fe; color:#6d28d9; }
  .cp-badge.documento  { background:#fef9c3; color:#a16207; }
  .cp-badge.enlace     { background:#dcfce7; color:#15803d; }
  .cp-badge.completada { background:#dcfce7; color:#15803d; }
  .cp-badge.pendiente  { background:#f1f5f9; color:#64748b; }
  .cp-player-content { padding: 20px; min-height: 220px; }
  /* Video embed */
  .cp-video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 10px;
    background: #0f172a;
  }
  .cp-video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  /* PDF embed */
  .cp-pdf-wrap { width: 100%; height: 500px; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; }
  .cp-pdf-wrap embed { width: 100%; height: 100%; }
  /* Texto enriquecido */
  .cp-text-content { line-height: 1.7; font-size: 14px; color: #0f172a; }
  .cp-text-content p { margin: 0 0 12px; }
  /* Enlace externo */
  .cp-link-content { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 32px 20px; text-align: center; }
  .cp-link-content a { display: inline-flex; align-items: center; gap: 8px; background: #0f172a; color: #fff; border-radius: 12px; padding: 10px 20px; font-size: 14px; text-decoration: none; }
  .cp-link-content a:hover { opacity: .88; }
  /* Footer actions */
  .cp-player-footer {
    padding: 14px 20px;
    border-top: 1px solid rgba(15,23,42,.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .cp-btn {
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .cp-btn:disabled { opacity: .45; cursor: not-allowed; }
  .cp-btn:hover:not(:disabled) { opacity: .85; }
  .cp-btn.is-primary  { background: #0f172a; color: #fff; }
  .cp-btn.is-green    { background: #16a34a; color: #fff; }
  .cp-btn.is-outline  { background: transparent; border: 1px solid #0f172a; color: #0f172a; }
  .cp-btn.is-ghost    { background: transparent; color: #475569; }
  .cp-btn.is-eval     { background: #7c3aed; color: #fff; }
  .cp-btn.is-sm       { padding: 5px 12px; font-size: 12px; }
  /* Evaluación banner */
  .cp-eval-banner {
    background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 100%);
    color: #fff;
    border-radius: 16px;
    padding: 24px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .cp-eval-banner h3 { margin: 0 0 6px; font-size: 17px; }
  .cp-eval-banner p  { margin: 0; font-size: 13px; opacity: .85; }
  .cp-eval-banner .cp-btn.is-eval { background: #fff; color: #3730a3; font-weight: 700; }
  /* Empty / status */
  .cp-status-msg { color: #64748b; font-size: 14px; padding: 8px 0; }
  .cp-loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(2px);
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: #475569;
  }
  /* Responsive */
  @media (max-width: 800px) {
    .cp-layout { grid-template-columns: 1fr; }
    .cp-sidebar { position: static; }
  }
</style>

<div class="cp-shell" id="cp-root"
  data-js-url="/api/capacitacion/assets/capacitacion_player.js?v=20260309"
  data-curso-id="">

  <button class="cp-back" type="button" onclick="window.location.href='/capacitacion'">
    ← Volver al catálogo
  </button>

  <!-- Progress header -->
  <div class="cp-progress-header" id="cp-progress-header">
    <div style="flex:1;">
      <p class="cp-progress-title" id="cp-curso-title">Cargando…</p>
      <div class="cp-progress-meta" id="cp-curso-meta"></div>
    </div>
    <div class="cp-progress-bar-wrap" style="max-width:260px;">
      <div class="cp-progress-bar"><div class="cp-progress-fill" id="cp-progress-fill" style="width:0%"></div></div>
      <div class="cp-progress-pct" id="cp-progress-pct">0%</div>
    </div>
  </div>

  <div id="cp-main-status" class="cp-status-msg"></div>

  <!-- Layout: sidebar + player -->
  <div class="cp-layout" id="cp-layout" style="display:none;">

    <!-- Sidebar -->
    <aside class="cp-sidebar">
      <div class="cp-sidebar-header">
        Lecciones
        <span class="cp-sidebar-count" id="cp-lesson-count">0</span>
      </div>
      <ul class="cp-lesson-list" id="cp-lesson-list"></ul>
      <!-- Info del curso -->
      <div class="cp-info-card" id="cp-course-info"></div>
    </aside>

    <!-- Player -->
    <div class="cp-player">
      <!-- Carta de lección activa -->
      <div class="cp-player-card" id="cp-player-card">
        <div class="cp-player-header">
          <div>
            <h2 class="cp-player-lesson-title" id="cp-lesson-title">Selecciona una lección</h2>
            <div class="cp-player-lesson-meta" id="cp-lesson-meta"></div>
          </div>
          <div id="cp-lesson-done-badge"></div>
        </div>
        <div class="cp-player-content" id="cp-player-content">
          <p class="cp-status-msg">Selecciona una lección del índice para comenzar.</p>
        </div>
        <div class="cp-player-footer" id="cp-player-footer" style="display:none;">
          <button class="cp-btn is-ghost" type="button" id="cp-btn-prev">← Anterior</button>
          <button class="cp-btn is-green" type="button" id="cp-btn-complete">✓ Marcar como completada</button>
          <button class="cp-btn is-ghost" type="button" id="cp-btn-next">Siguiente →</button>
        </div>
      </div>
      <!-- Banner evaluación (visible cuando corresponde) -->
      <div class="cp-eval-banner" id="cp-eval-banner" style="display:none;">
        <div>
          <h3>¡Lecciones completadas!</h3>
          <p id="cp-eval-banner-desc">Ahora puedes presentar la evaluación final.</p>
        </div>
        <button class="cp-btn is-eval" type="button" id="cp-btn-go-eval">Presentar evaluación →</button>
      </div>
    </div>

  </div><!-- /cp-layout -->

</div><!-- /cp-shell -->

<script>
  (function () {
    // Inyectar curso_id desde la URL en el elemento raíz
    var root = document.getElementById('cp-root');
    if (!root) return;
    var m = window.location.pathname.match(/\/capacitacion\/curso\/(\d+)/);
    if (m) root.setAttribute('data-curso-id', m[1]);
    var jsUrl = root.getAttribute('data-js-url');
    if (!jsUrl) return;
    var s = document.createElement('script');
    s.src = jsUrl;
    document.body.appendChild(s);
  })();
</script>
