<style>
  /* ── Reset / Base ── */
  .ped-shell {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
    font-family: 'Inter', system-ui, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    box-sizing: border-box;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  .ped-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 52px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    flex-shrink: 0;
    flex-wrap: nowrap;
    overflow-x: auto;
  }
  #ped-pres-title {
    font-size: 15px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: #0f172a;
    min-width: 120px;
    max-width: 220px;
  }
  .ped-sep { width: 1px; height: 28px; background: #e2e8f0; flex-shrink: 0; }
  .ped-tool-btn {
    border: 1px solid #e2e8f0;
    background: #fff;
    border-radius: 7px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    color: #374151;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .ped-tool-btn:hover { background: #f1f5f9; }
  .ped-tool-btn.primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .ped-tool-btn.primary:hover { background: #4338ca; }
  .ped-tool-btn.success { background: #059669; color: #fff; border-color: #059669; }
  .ped-tool-btn.success:hover { background: #047857; }

  /* ── Main workspace ── */
  .ped-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Slide panel (left) ── */
  .ped-slide-panel {
    width: 170px;
    flex-shrink: 0;
    background: #f1f5f9;
    border-right: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .ped-slide-panel-header {
    padding: 10px 12px 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #64748b;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ped-slide-mini-btn {
    background: none; border: none; font-size: 16px;
    cursor: pointer; color: #64748b; padding: 0 3px;
  }
  .ped-slide-mini-btn:hover { color: #4f46e5; }
  #ped-slide-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 8px;
  }
  .ped-slide-thumb {
    position: relative;
    border-radius: 6px;
    border: 2px solid transparent;
    background: #fff;
    margin-bottom: 6px;
    cursor: pointer;
    aspect-ratio: 16/9;
    overflow: hidden;
    transition: border-color .12s;
  }
  .ped-slide-thumb:hover { border-color: #a5b4fc; }
  .ped-slide-thumb.active { border-color: #4f46e5; }
  .ped-slide-thumb-num {
    position: absolute;
    bottom: 3px; right: 5px;
    font-size: 10px;
    color: #94a3b8;
    font-weight: 600;
  }
  .ped-slide-thumb canvas {
    width: 100%; height: 100%; display: block; pointer-events: none;
  }

  /* ── Canvas area (center) ── */
  .ped-canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    background: #e2e8f0;
    padding: 24px;
  }
  #ped-canvas {
    position: relative;
    width: 900px;
    height: 506px;
    background: #ffffff;
    flex-shrink: 0;
    box-shadow: 0 4px 32px rgba(0,0,0,.18);
    overflow: hidden;
    user-select: none;
  }

  /* ── Elements on canvas ── */
  .ped-element {
    position: absolute;
    cursor: move;
    box-sizing: border-box;
  }
  .ped-element.selected {
    outline: 2px solid #4f46e5;
    z-index: 9998 !important;
  }
  /* Resize handles */
  .ped-handle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #4f46e5;
    border: 1.5px solid #fff;
    border-radius: 2px;
    z-index: 9999;
    box-sizing: border-box;
  }
  .ped-handle-nw { top:-4px;  left:-4px;  cursor: nw-resize; }
  .ped-handle-n  { top:-4px;  left:50%;  transform:translateX(-50%); cursor: n-resize; }
  .ped-handle-ne { top:-4px;  right:-4px; cursor: ne-resize; }
  .ped-handle-w  { top:50%;   left:-4px;  transform:translateY(-50%); cursor: w-resize; }
  .ped-handle-e  { top:50%;   right:-4px; transform:translateY(-50%); cursor: e-resize; }
  .ped-handle-sw { bottom:-4px; left:-4px; cursor: sw-resize; }
  .ped-handle-s  { bottom:-4px; left:50%; transform:translateX(-50%); cursor: s-resize; }
  .ped-handle-se { bottom:-4px; right:-4px; cursor: se-resize; }

  /* Element inner styles */
  .ped-el-texto, .ped-el-boton, .ped-el-forma, .ped-el-imagen, .ped-el-embed {
    width: 100%;
    height: 100%;
    overflow: hidden;
    box-sizing: border-box;
  }
  .ped-el-imagen img { width: 100%; height: 100%; display: block; }
  .ped-el-embed iframe { width: 100%; height: 100%; border: none; display: block; pointer-events: none; }
  .ped-element.selected .ped-el-embed iframe { pointer-events: none; }

  /* ── Props panel (right) ── */
  .ped-props-panel {
    width: 230px;
    flex-shrink: 0;
    background: #fff;
    border-left: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .ped-props-header {
    padding: 10px 14px 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #64748b;
    border-bottom: 1px solid #f1f5f9;
    flex-shrink: 0;
  }
  #ped-props {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
  }
  .ped-prop-row {
    margin-bottom: 11px;
  }
  .ped-prop-row label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .ped-prop-row input[type=text],
  .ped-prop-row input[type=number],
  .ped-prop-row input[type=url],
  .ped-prop-row textarea,
  .ped-prop-row select {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 13px;
    color: #0f172a;
    background: #f8fafc;
  }
  .ped-prop-row textarea { height: 60px; resize: vertical; }
  .ped-prop-row input[type=checkbox] { cursor: pointer; }
  .ped-prop-row input[type=color] {
    width: 32px; height: 28px; padding: 2px; border-radius: 4px; cursor: pointer; border: 1px solid #e2e8f0;
  }
  .ped-prop-inline {
    display: flex; gap: 6px; align-items: center;
  }
  .ped-props-empty {
    color: #94a3b8; font-size: 13px; text-align: center; padding: 24px 0;
  }
  .ped-prop-del-btn {
    width: 100%; border: none; border-radius: 7px;
    background: #fef2f2; color: #dc2626; font-size: 13px;
    font-weight: 600; padding: 7px; cursor: pointer; margin-top: 6px;
  }
  .ped-prop-del-btn:hover { background: #fee2e2; }

  /* Slide bg controls in props */
  .ped-slide-bg-section {
    padding-top: 4px;
  }

  /* Toast */
  #ped-toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 99999;
    background: #1e293b; color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: 14px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  #ped-toast.show { opacity: 1; }
  #ped-toast.error { background: #dc2626; }
</style>

<div id="ped-root" class="ped-shell"
     data-js-url="/api/capacitacion/assets/capacitacion_editor.js?v=20260309"
     data-pres-id="__PRES_ID__">

  <!-- Toolbar -->
  <div class="ped-toolbar">
    <input id="ped-pres-title" type="text" value="Cargando..." title="Título de la presentación" />
    <div class="ped-sep"></div>

    <button id="ped-btn-add-texto" class="ped-tool-btn" title="Añadir texto">T Texto</button>
    <button id="ped-btn-add-imagen" class="ped-tool-btn" title="Añadir imagen">🖼 Imagen</button>
    <button id="ped-btn-add-boton" class="ped-tool-btn" title="Añadir botón">🔲 Botón</button>
    <button id="ped-btn-add-forma" class="ped-tool-btn" title="Añadir forma">⬛ Forma</button>
    <button id="ped-btn-add-embed" class="ped-tool-btn" title="Añadir video/embed">▶ Video</button>

    <div class="ped-sep"></div>
    <button id="ped-btn-preview" class="ped-tool-btn" title="Previsualizar">👁 Ver</button>
    <button id="ped-btn-publish" class="ped-tool-btn" title="Publicar / despublicar">📣 Publicar</button>
    <button id="ped-btn-save" class="ped-tool-btn success" title="Guardar (Ctrl+S)">💾 Guardar</button>
    <button id="ped-btn-back" class="ped-tool-btn" title="Volver al catálogo" style="margin-left:auto;">← Volver</button>
  </div>

  <!-- Workspace -->
  <div class="ped-workspace">

    <!-- Panel de diapositivas -->
    <div class="ped-slide-panel">
      <div class="ped-slide-panel-header">
        <span>Diapositivas</span>
        <div style="display:flex;gap:2px;">
          <button id="ped-btn-slide-up"  class="ped-slide-mini-btn" title="Subir">↑</button>
          <button id="ped-btn-slide-dn"  class="ped-slide-mini-btn" title="Bajar">↓</button>
          <button id="ped-btn-dup-slide" class="ped-slide-mini-btn" title="Duplicar">⧉</button>
          <button id="ped-btn-del-slide" class="ped-slide-mini-btn" title="Eliminar">🗑</button>
          <button id="ped-btn-add-slide" class="ped-slide-mini-btn" title="Nueva">＋</button>
        </div>
      </div>
      <div id="ped-slide-list"></div>
    </div>

    <!-- Canvas -->
    <div class="ped-canvas-area">
      <div id="ped-canvas"></div>
    </div>

    <!-- Panel de propiedades -->
    <div class="ped-props-panel">
      <div class="ped-props-header">Propiedades</div>
      <div id="ped-props">
        <div class="ped-props-empty">Selecciona un elemento o la diapositiva</div>
      </div>
    </div>

  </div>
</div>

<div id="ped-toast"></div>

<script>
(function () {
  var root  = document.getElementById('ped-root');
  var jsUrl = root && root.getAttribute('data-js-url');
  if (jsUrl) {
    var s = document.createElement('script');
    s.src = jsUrl;
    document.body.appendChild(s);
  }
})();
</script>
