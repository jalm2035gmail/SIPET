<section class="cap-hero">
  <div class="cap-hero-head">
    <div class="cap-hero-logo" aria-hidden="true">
      <svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg" width="54" height="54">
        <rect width="54" height="54" rx="14" fill="#0f172a"/>
        <path d="M12 36l15-22 15 22" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="27" cy="20" r="5" stroke="#fff" stroke-width="2.5"/>
        <rect x="19" y="38" width="16" height="3" rx="1.5" fill="#fff"/>
      </svg>
    </div>
    <div class="cap-hero-copy">
      <h1>Capacitación</h1>
      <p>Cursos, evaluaciones y certificados para colaboradores.</p>
    </div>
  </div>
  <div class="cap-kpi-grid" id="cap-kpis">
    <article class="cap-kpi-card">
      <span class="cap-kpi-label">Cursos publicados</span>
      <strong class="cap-kpi-value" id="cap-kpi-cursos">—</strong>
    </article>
    <article class="cap-kpi-card">
      <span class="cap-kpi-label">Mis inscripciones</span>
      <strong class="cap-kpi-value" id="cap-kpi-inscritos">—</strong>
    </article>
    <article class="cap-kpi-card">
      <span class="cap-kpi-label">En progreso</span>
      <strong class="cap-kpi-value" id="cap-kpi-progreso">—</strong>
    </article>
    <article class="cap-kpi-card">
      <span class="cap-kpi-label">Completados</span>
      <strong class="cap-kpi-value is-green" id="cap-kpi-completados">—</strong>
    </article>
  </div>
</section>
