<style>
  .ev-shell {
    padding: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #0f172a;
    box-sizing: border-box;
    max-width: 860px;
    margin: 0 auto;
  }
  /* Back */
  .ev-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #475569;
    text-decoration: none;
    margin-bottom: 20px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
  }
  .ev-back:hover { color: #0f172a; }

  /* Cards genéricas */
  .ev-card {
    background: #fff;
    border: 1px solid rgba(15,23,42,.08);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 18px;
  }

  /* ── Pantalla instrucciones ── */
  .ev-title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
  }
  .ev-subtitle {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 20px;
  }
  .ev-instruction-text {
    font-size: 14px;
    color: #334155;
    line-height: 1.65;
    white-space: pre-line;
    margin-bottom: 24px;
    background: #f8fafc;
    border-radius: 10px;
    padding: 16px 18px;
    border-left: 3px solid #6366f1;
  }
  .ev-meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .ev-meta-item {
    background: #f8fafc;
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .ev-meta-value {
    font-size: 24px;
    font-weight: 800;
    color: #1e293b;
  }
  .ev-meta-label {
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-top: 2px;
  }
  .ev-meta-item.warning .ev-meta-value { color: #d97706; }
  .ev-meta-item.success .ev-meta-value { color: #16a34a; }
  .ev-meta-item.info    .ev-meta-value { color: #6366f1; }

  /* ── Pantalla preguntas ── */
  .ev-q-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .ev-q-counter {
    font-size: 13px;
    font-weight: 600;
    color: #475569;
  }
  .ev-timer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 700;
    color: #0f172a;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 5px 12px;
  }
  .ev-timer.warning { color: #d97706; border-color: #fbbf24; background: #fffbeb; }
  .ev-timer.danger  { color: #dc2626; border-color: #fca5a5; background: #fef2f2; }
  .ev-progress-bar {
    height: 6px;
    border-radius: 4px;
    background: #e2e8f0;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .ev-progress-fill {
    height: 100%;
    background: #6366f1;
    border-radius: 4px;
    transition: width .35s;
  }
  .ev-q-enunciado {
    font-size: 16px;
    font-weight: 600;
    color: #0f172a;
    line-height: 1.6;
    margin: 0 0 20px;
  }
  .ev-q-tipo-tag {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    color: #6366f1;
    background: #eef2ff;
    border-radius: 6px;
    padding: 3px 8px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .ev-options-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ev-option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    font-size: 14px;
    color: #334155;
    line-height: 1.5;
  }
  .ev-option:hover { border-color: #a5b4fc; background: #f8f8ff; }
  .ev-option.is-selected { border-color: #6366f1; background: #eef2ff; color: #1e293b; font-weight: 500; }
  .ev-option input[type=radio] { margin-top: 2px; flex-shrink: 0; accent-color: #6366f1; }
  .ev-textarea {
    width: 100%;
    min-height: 110px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: #334155;
    font-family: inherit;
    resize: vertical;
    box-sizing: border-box;
    outline: none;
    transition: border-color .15s;
  }
  .ev-textarea:focus { border-color: #6366f1; }
  .ev-q-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .ev-q-dot {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .ev-q-dot.is-answered { border-color: #6366f1; background: #eef2ff; color: #4f46e5; }
  .ev-q-dot.is-current  { border-color: #4f46e5; background: #4f46e5; color: #fff; }

  /* ── Footer de preguntas ── */
  .ev-q-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  /* ── Botones ── */
  .ev-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    border-radius: 9px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    text-decoration: none;
  }
  .ev-btn:disabled { opacity: .45; cursor: not-allowed; }
  .ev-btn:not(:disabled):hover { opacity: .88; transform: translateY(-1px); }
  .ev-btn.is-primary { background: #4f46e5; color: #fff; }
  .ev-btn.is-success { background: #16a34a; color: #fff; }
  .ev-btn.is-danger  { background: #dc2626; color: #fff; }
  .ev-btn.is-outline { background: transparent; color: #475569; border: 1.5px solid #cbd5e1; }
  .ev-btn.is-large   { padding: 13px 28px; font-size: 15px; border-radius: 12px; }
  .ev-btn.is-full    { width: 100%; justify-content: center; }

  /* ── Pantalla resultados ── */
  .ev-result-hero {
    text-align: center;
    padding: 32px 20px 24px;
  }
  .ev-score-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    border: 6px solid currentColor;
  }
  .ev-score-circle.aprobado { color: #16a34a; background: #f0fdf4; }
  .ev-score-circle.reprobado { color: #dc2626; background: #fef2f2; }
  .ev-score-num {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }
  .ev-score-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    opacity: .75;
  }
  .ev-result-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 50px;
    margin-bottom: 10px;
  }
  .ev-result-badge.aprobado { background: #dcfce7; color: #15803d; }
  .ev-result-badge.reprobado { background: #fee2e2; color: #b91c1c; }
  .ev-result-msg {
    font-size: 14px;
    color: #475569;
    margin: 0 0 6px;
  }
  .ev-cert-banner {
    background: linear-gradient(135deg, #312e81 0%, #4f46e5 100%);
    color: #fff;
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .ev-cert-banner h4 { margin: 0 0 4px; font-size: 15px; font-weight: 700; }
  .ev-cert-banner p  { margin: 0; font-size: 13px; opacity: .85; }
  .ev-result-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  /* ── Badges ── */
  .ev-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .ev-badge.opcion_multiple { background: #dbeafe; color: #1d4ed8; }
  .ev-badge.verdadero_falso { background: #d1fae5; color: #065f46; }
  .ev-badge.texto_libre     { background: #fef3c7; color: #92400e; }

  /* ── Status / loading ── */
  .ev-status {
    text-align: center;
    padding: 40px 20px;
    color: #64748b;
    font-size: 14px;
  }
  .ev-loading {
    display: inline-block;
    width: 20px; height: 20px;
    border: 3px solid #e2e8f0;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: ev-spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes ev-spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 640px) {
    .ev-card { padding: 18px 16px; }
    .ev-q-dots { gap: 4px; }
    .ev-q-dot { width: 26px; height: 26px; font-size: 11px; }
  }
</style>

<div id="ev-root" class="ev-shell"
     data-js-url="/capacitacion/assets/js/capacitacion_eval.js?v=20260309">

  <!-- Botón volver -->
  <button class="ev-back" onclick="window.history.back()">← Regresar</button>

  <!-- Estado de carga inicial -->
  <div id="ev-main-status" class="ev-status">
    <span class="ev-loading"></span> Cargando evaluación…
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Pantalla 1 — Instrucciones
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="ev-screen-instructions" style="display:none;">
    <div class="ev-card">
      <p id="ev-instr-curso-nombre" style="font-size:13px;color:#6366f1;font-weight:600;margin:0 0 4px;"></p>
      <h2 id="ev-instr-title" class="ev-title"></h2>
      <p id="ev-instr-subtitle" class="ev-subtitle"></p>

      <div id="ev-instr-text-wrap" style="display:none;">
        <p id="ev-instr-text" class="ev-instruction-text"></p>
      </div>

      <div class="ev-meta-grid">
        <div class="ev-meta-item warning">
          <div id="ev-meta-puntaje" class="ev-meta-value">—</div>
          <div class="ev-meta-label">Puntaje mínimo</div>
        </div>
        <div class="ev-meta-item info">
          <div id="ev-meta-intentos" class="ev-meta-value">—</div>
          <div class="ev-meta-label">Intentos permitidos</div>
        </div>
        <div class="ev-meta-item">
          <div id="ev-meta-tiempo" class="ev-meta-value">—</div>
          <div class="ev-meta-label">Tiempo límite</div>
        </div>
        <div class="ev-meta-item success">
          <div id="ev-meta-preguntas" class="ev-meta-value">—</div>
          <div class="ev-meta-label">Preguntas</div>
        </div>
      </div>

      <button id="ev-btn-iniciar" class="ev-btn is-primary is-large is-full">
        Iniciar evaluación
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Pantalla 2 — Preguntas
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="ev-screen-questions" style="display:none;">

    <!-- Header: contador + timer -->
    <div class="ev-q-header">
      <span id="ev-q-counter" class="ev-q-counter">Pregunta 1 de 10</span>
      <div id="ev-timer" class="ev-timer" style="display:none;">
        ⏱ <span id="ev-timer-text">30:00</span>
      </div>
    </div>

    <!-- Barra de progreso -->
    <div class="ev-progress-bar">
      <div id="ev-q-progress-fill" class="ev-progress-fill" style="width:0%"></div>
    </div>

    <!-- Mapa de preguntas (dots) -->
    <div id="ev-q-dots" class="ev-q-dots"></div>

    <!-- Tarjeta de la pregunta activa -->
    <div class="ev-card" style="margin-bottom:0;">
      <div id="ev-q-badge-wrap"></div>
      <p id="ev-q-enunciado" class="ev-q-enunciado"></p>
      <div id="ev-q-body"></div>
    </div>

    <!-- Footer: nav + enviar -->
    <div class="ev-q-footer">
      <button id="ev-btn-prev-q" class="ev-btn is-outline" disabled>← Anterior</button>
      <button id="ev-btn-next-q" class="ev-btn is-primary">Siguiente →</button>
      <button id="ev-btn-enviar" class="ev-btn is-success" style="display:none;">
        ✓ Enviar evaluación
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Pantalla 3 — Resultados
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="ev-screen-results" style="display:none;">
    <div class="ev-card">
      <div class="ev-result-hero">
        <div id="ev-score-circle" class="ev-score-circle aprobado">
          <span id="ev-score-num" class="ev-score-num">0%</span>
          <span class="ev-score-label">Puntaje</span>
        </div>
        <div id="ev-result-badge" class="ev-result-badge aprobado">✓ Aprobado</div>
        <p id="ev-result-msg" class="ev-result-msg"></p>
        <p id="ev-result-min-msg" style="font-size:13px;color:#94a3b8;margin:0;"></p>
      </div>

      <!-- Banner certificado -->
      <div id="ev-cert-banner" class="ev-cert-banner" style="display:none;">
        <div>
          <h4>🎓 ¡Certificado emitido!</h4>
          <p id="ev-cert-folio-text">Folio: —</p>
        </div>
        <a id="ev-cert-link" href="/capacitacion/mis-certificados" class="ev-btn" style="background:#fff;color:#4f46e5;font-weight:700;">
          Ver certificado
        </a>
      </div>

      <!-- Mensaje intentos restantes -->
      <div id="ev-reintentar-wrap" style="display:none;margin-top:16px;">
        <div style="background:#fef3c7;border-radius:12px;padding:14px 18px;font-size:14px;color:#78350f;">
          <strong>Puedes reintentar.</strong> <span id="ev-reintentar-msg"></span>

      <!-- Revisión de respuestas -->
      <div id="ev-review-section" style="margin-top:24px;"></div>

      <div class="ev-result-actions">
        <button id="ev-btn-reintentar" class="ev-btn is-primary" style="display:none;">
          Reintentar evaluación
        </button>
        <a href="/capacitacion" class="ev-btn is-outline">← Volver al catálogo</a>
        <a id="ev-btn-volver-curso" href="#" class="ev-btn is-outline">Ver curso</a>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  var root = document.getElementById('ev-root');
  // Extraer eval_id de la URL: /capacitacion/evaluacion/123
  var pathMatch = window.location.pathname.match(/\/capacitacion\/evaluacion\/(\d+)/);
  var evalId = pathMatch ? parseInt(pathMatch[1], 10) : 0;
  // Extraer insc_id de query: ?insc=456
  var inscId = 0;
  var qm = window.location.search.match(/[?&]insc=(\d+)/);
  if (qm) inscId = parseInt(qm[1], 10);
  if (root) {
    root.setAttribute('data-eval-id', evalId);
    root.setAttribute('data-insc-id', inscId);
  }
  var jsUrl = root && root.getAttribute('data-js-url');
  if (jsUrl) {
    var s = document.createElement('script');
    s.src = jsUrl;
    document.body.appendChild(s);
  }
})();
</script>
