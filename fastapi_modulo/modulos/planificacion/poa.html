<!-- poa.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>POA</title>
</head>
<body>
    <main class="p-4 grid gap-4 max-w-3xl">
    <h1 class="text-2xl font-bold text-base-content">POA</h1>
    <div class="grid gap-2">
        <label for="actividad-input" class="label-text font-semibold">Actividad/Eje:</label>
        <div class="flex flex-col sm:flex-row gap-2">
            <input id="actividad-input" type="text" class="input input-bordered w-full">
            <button id="sugerir-ia-btn" type="button" class="btn btn-primary">Sugerir con IA</button>
        </div>
    </div>
    <div id="sugerencia-ia" class="text-success font-semibold min-h-6"></div>
    <div id="acciones-ia" class="hidden flex flex-wrap gap-2">
        <button id="aplicar-ia-btn" type="button" class="btn btn-success btn-sm">Aplicar</button>
        <button id="editar-ia-btn" type="button" class="btn btn-outline btn-sm">Editar</button>
        <button id="descartar-ia-btn" type="button" class="btn btn-outline btn-error btn-sm">Descartar</button>
    </div>
    </main>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('sugerir-ia-btn');
        const input = document.getElementById('actividad-input');
        const sugerenciaDiv = document.getElementById('sugerencia-ia');
        const accionesDiv = document.getElementById('acciones-ia');
        const aplicarBtn = document.getElementById('aplicar-ia-btn');
        const editarBtn = document.getElementById('editar-ia-btn');
        const descartarBtn = document.getElementById('descartar-ia-btn');
        let sugerenciaActual = '';
        if (btn) {
            btn.addEventListener('click', async function() {
                btn.disabled = true;
                btn.textContent = 'Sugiriendo...';
                sugerenciaDiv.textContent = '';
                accionesDiv.classList.add('hidden');
                try {
                    const resp = await fetch('/api/ia/suggest/objective-text', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: input.value || 'Sugerir actividad o eje para el POA' })
                    });
                    const data = await resp.json();
                    if (data && data.suggestion) {
                        sugerenciaActual = data.suggestion;
                        sugerenciaDiv.textContent = sugerenciaActual;
                        accionesDiv.classList.remove('hidden');
                    } else {
                        sugerenciaDiv.textContent = 'No se recibió sugerencia.';
                    }
                } catch (e) {
                    sugerenciaDiv.textContent = 'Error al obtener sugerencia.';
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Sugerir con IA';
                }
            });
        }
        if (aplicarBtn) {
            aplicarBtn.addEventListener('click', function() {
                if (sugerenciaActual) {
                    input.value = sugerenciaActual;
                    sugerenciaDiv.textContent = 'Sugerencia aplicada.';
                    accionesDiv.classList.add('hidden');
                }
            });
        }
        if (editarBtn) {
            editarBtn.addEventListener('click', function() {
                if (sugerenciaActual) {
                    input.value = sugerenciaActual;
                    sugerenciaDiv.textContent = 'Puedes editar la sugerencia en el campo.';
                    accionesDiv.classList.add('hidden');
                }
            });
        }
        if (descartarBtn) {
            descartarBtn.addEventListener('click', function() {
                sugerenciaDiv.textContent = 'Sugerencia descartada.';
                accionesDiv.classList.add('hidden');
            });
        }
    });
    </script>
</body>
</html>
