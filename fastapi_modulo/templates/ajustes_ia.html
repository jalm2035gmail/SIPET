<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ajustes de IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <main class="ia-wrap">
        <section class="ia-card">
            <header class="ia-head">
                <span class="ia-head-icon" aria-hidden="true">
                    <img src="/templates/icon/ia.svg" alt="">
                </span>
                <div>
                    <h1>Ajustes de Inteligencia Artificial (IA)</h1>
                    <p>Configura proveedor, modelo y parámetros de conexión.</p>
                </div>
            </header>

            <form method="post" class="ia-form">
                <div class="ia-field">
                    <label for="ai_provider">Proveedor IA</label>
                    <input type="text" id="ai_provider" name="ai_provider" placeholder="chatgpt, deepseek, etc." value="{{ ai_provider | default('') }}">
                </div>
                <div class="ia-field">
                    <label for="ai_api_key">API Key</label>
                    <input type="password" id="ai_api_key" name="ai_api_key" value="{{ ai_api_key | default('') }}">
                </div>
                <div class="ia-field">
                    <label for="ai_MAIN_url">MAIN URL</label>
                    <input type="text" id="ai_MAIN_url" name="ai_MAIN_url" value="{{ ai_MAIN_url | default('') }}">
                </div>
                <div class="ia-field">
                    <label for="ai_model">Modelo</label>
                    <input type="text" id="ai_model" name="ai_model" value="{{ ai_model | default('') }}">
                </div>
                <div class="ia-field">
                    <label for="ai_timeout">Timeout (segundos)</label>
                    <input type="number" id="ai_timeout" name="ai_timeout" min="1" max="120" value="{{ ai_timeout | default(30) }}">
                </div>

                <div class="ia-actions">
                    <button type="submit" class="ia-btn">Guardar</button>
                    <p class="ia-help">Estos datos permiten conectar SIPET con el proveedor de IA seleccionado.</p>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
