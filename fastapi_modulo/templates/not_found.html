<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="{{ app_favicon_url | default('/templates/icon/icon.png') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ app_favicon_url | default('/templates/icon/icon.png') }}">
    <link rel="stylesheet" href="/static/dist/output.css?v={{ asset_version | default('dev', true) }}">
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--color-base-100);
        color: var(--color-base-content);
    }
    .company-logo-box {
        position: fixed; top: 20px; left: 24px;
        display: inline-flex; align-items: center;
        text-decoration: none; z-index: 10;
    }
    .company-logo-box img {
        width: 48px; height: 48px; object-fit: contain; border-radius: 10px;
    }
    .not-found-layout {
        display: flex; align-items: center; justify-content: center;
        gap: 64px; min-height: 100vh; padding: 80px 40px;
        flex-wrap: wrap;
    }
    .not-found-copy {
        display: flex; flex-direction: column; gap: 16px; max-width: 440px;
    }
    .not-found-kicker {
        font-size: .75rem; font-weight: 800; letter-spacing: .18em;
        text-transform: uppercase; color: var(--color-error);
    }
    .not-found-main-text { font-size: 1.6rem; font-weight: 700; line-height: 1.3; }
    .highlight { color: var(--color-primary); }
    .not-found-subtext {
        font-size: .95rem; color: var(--color-base-content);
        opacity: .65; line-height: 1.6;
    }
    .back-home-link {
        display: inline-flex; align-items: center;
        padding: 11px 28px; border-radius: 8px; width: fit-content;
        background: var(--color-primary); color: var(--color-primary-content);
        font-size: .9rem; font-weight: 700; text-decoration: none;
        transition: opacity .15s;
    }
    .back-home-link:hover { opacity: .85; }
    .not-found-left img { width: clamp(160px, 28vw, 340px); }
    @media (max-width: 640px) {
        .not-found-layout { gap: 32px; padding: 100px 24px 40px; }
        .not-found-main-text { font-size: 1.3rem; }
    }
    </style>
</head>
<body>
    <a class="company-logo-box" href="/web" aria-label="Ir al inicio">
        <img src="{{ company_logo_url or '/templates/imagenes/icon.png' }}" alt="Logo empresa">
    </a>
    <main class="not-found-layout">
        <section class="not-found-right">
            <div class="not-found-copy">
                <p class="not-found-kicker">Error 404</p>
                <p class="not-found-main-text"><span class="highlight">Lo sentimos,</span> la página que buscas no existe o fue movida.</p>
                <p class="not-found-subtext">Puedes volver al inicio dando clic en el logo o usando el botón.</p>
                <a class="back-home-link" href="/web">Volver al inicio</a>
            </div>
        </section>
        <section class="not-found-left">
            <img src="/templates/icon/404.png" alt="404">
        </section>
    </main>
</body>
</html>
