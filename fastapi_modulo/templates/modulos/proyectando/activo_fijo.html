<link rel="stylesheet" href="/modulos/proyectando/proyectando.css">
<section class="proy-shell">
  <div class="titulo proy-title-card">
    <div class="proy-title-layout">
      <img
        src="/templates/icon/activo_fijo.svg"
        alt="Icono activo fijo"
        width="96"
        height="96"
        class="proy-title-icon"
      />
      <div class="proy-title-copy">
        <div class="proy-title-heading">Activo fijo</div>
        <div class="proy-title-description">Consulta de rubros de activo fijo, depreciación y vida útil promedio.</div>
      </div>
    </div>
  </div>

  <div class="tabs tabs-lifted proy-tabs" role="tablist" aria-label="Activo fijo">
    <button type="button" class="tab tab-active rounded-t-lg whitespace-nowrap" data-af-tab="compras">Compras de activo fijo</button>
    <button type="button" class="tab rounded-t-lg whitespace-nowrap" data-af-tab="saldos">Saldos de activo fijo</button>
    <button type="button" class="tab rounded-t-lg whitespace-nowrap" data-af-tab="revaluaciones">Revaluaciones</button>
    <button type="button" class="tab rounded-t-lg whitespace-nowrap" data-af-tab="depreciacion">Depreciación</button>
  </div>

  <div class="proy-notebook-body">
    <section class="af-panel card bg-base-100 border border-base-300 p-8" data-af-panel="compras">
      <div class="space-y-4">
        <div class="flex flex-wrap items-center gap-2">
          <button type="button" id="af-compras-save-btn" class="btn btn-primary">Guardar</button>
          <span id="af-compras-msg" class="text-sm text-base-content/70"></span>
        </div>
        <div class="af-purchases-wrap rounded-box border border-base-300 bg-base-100">
          <table class="table table-zebra text-sm af-purchases-table">
            <thead id="af-compras-thead"></thead>
            <tbody id="af-compras-tbody">
              <tr><td class="text-base-content/60">Cargando compras de activo fijo...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pt-2">
          <button type="button" class="btn btn-outline">Compras por unidad</button>
        </div>
        <div class="pt-4">
          <div class="af-section-title">Depreciación de compras</div>
          <div class="af-purchases-wrap rounded-box border border-base-300 bg-base-100">
            <table class="table table-zebra text-sm af-fin-table">
              <thead id="af-depreciacion-compras-thead"></thead>
              <tbody id="af-depreciacion-compras-tbody">
                <tr><td class="text-base-content/60">Cargando depreciación de compras...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
    <section class="af-panel card bg-base-100 border border-base-300 p-8" data-af-panel="saldos" hidden>
      <div class="af-purchases-wrap rounded-box border border-base-300 bg-base-100">
        <table class="table table-zebra text-sm af-fin-table">
          <thead id="af-saldos-thead"></thead>
          <tbody id="af-saldos-tbody">
            <tr><td class="text-base-content/60">Cargando saldos de activo fijo...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    <section class="af-panel card bg-base-100 border border-base-300 p-8" data-af-panel="revaluaciones" hidden>
      <div class="af-purchases-wrap rounded-box border border-base-300 bg-base-100">
        <table class="table table-zebra text-sm af-fin-table">
          <thead id="af-reval-thead"></thead>
          <tbody id="af-reval-tbody">
            <tr><td class="text-base-content/60">Cargando revaluaciones...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    <section class="af-panel card bg-base-100 border border-base-300 p-8" data-af-panel="depreciacion" hidden>
      <div class="af-purchases-wrap rounded-box border border-base-300 bg-base-100">
        <table class="table table-zebra text-sm af-fin-table">
          <thead id="af-dep-thead"></thead>
          <tbody id="af-dep-tbody">
            <tr><td class="text-base-content/60">Cargando depreciación...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</section>

<script src="/modulos/proyectando/activo_fijo.js"></script>
