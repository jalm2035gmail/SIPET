<section id="percepcion-builder" class="grid gap-4 w-full max-w-6xl">
    <div class="titulo bg-base-200 rounded-box border border-base-300 p-4 sm:p-6">
        <div class="w-full flex flex-col md:flex-row items-center gap-10">
            <img
                src="/templates/icon/plan.svg"
                alt="Icono percepción del cliente"
                width="96"
                height="96"
                class="shrink-0 rounded-box border border-base-300 bg-base-100 p-3 object-contain"
            />
            <div class="w-full grid gap-2 content-center">
                <div class="block w-full text-3xl sm:text-4xl lg:text-5xl font-bold leading-tight text-[color:var(--sidebar-bottom)]">Percepción del cliente</div>
                <div class="block w-full text-base sm:text-lg text-base-content/70">Monitorea feedback para detectar fortalezas y brechas del servicio.</div>
            </div>
        </div>
    </div>
    <article class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body gap-4">
            <h2 class="card-title text-base-content">Percepción del cliente</h2>
            <p class="text-sm text-base-content/70">Registra percepciones y clasifícalas para orientar mejoras del servicio.</p>
            <div class="grid grid-cols-1 lg:grid-cols-[1.8fr_1fr_1fr] gap-3">
                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Comentario</span></div>
                    <textarea id="percepcion-description" class="textarea textarea-bordered campo w-full min-h-24" placeholder="Describe la percepción detectada"></textarea>
                </label>
                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Categoría</span></div>
                    <select id="percepcion-category" class="select select-bordered campo w-full">
                        <option value="positive">Percepción positiva</option>
                        <option value="neutral">Percepción neutral</option>
                        <option value="negative">Percepción negativa</option>
                    </select>
                </label>
                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Prioridad</span></div>
                    <select id="percepcion-priority" class="select select-bordered campo w-full">
                        <option value="high">Alta</option>
                        <option value="medium">Media</option>
                        <option value="low">Baja</option>
                    </select>
                </label>
            </div>
            <div class="flex justify-end">
                <button type="button" id="percepcion-add" class="btn btn-primary btn-sm">Agregar percepción</button>
            </div>
        </div>
    </article>
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Positivas</h3>
                    <span id="percepcion-count-positive" class="badge badge-outline">0</span>
                </header>
                <ul id="percepcion-list-positive" class="grid gap-2"></ul>
            </div>
        </article>
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Neutrales</h3>
                    <span id="percepcion-count-neutral" class="badge badge-outline">0</span>
                </header>
                <ul id="percepcion-list-neutral" class="grid gap-2"></ul>
            </div>
        </article>
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Negativas</h3>
                    <span id="percepcion-count-negative" class="badge badge-outline">0</span>
                </header>
                <ul id="percepcion-list-negative" class="grid gap-2"></ul>
            </div>
        </article>
    </section>
</section>
