<section id="foda-builder" class="grid gap-4 w-full max-w-6xl">
    <div class="titulo bg-base-200 rounded-box border border-base-300 p-4 sm:p-6">
        <div class="w-full flex flex-col md:flex-row items-center gap-10">
            <img
                src="/templates/icon/plan.svg"
                alt="Icono estrategia y táctica"
                width="96"
                height="96"
                class="shrink-0 rounded-box border border-base-300 bg-base-100 p-3 object-contain"
            />
            <div class="w-full grid gap-2 content-center">
                <div class="block w-full text-3xl sm:text-4xl lg:text-5xl font-bold leading-tight text-[color:var(--sidebar-bottom)]">FODA</div>
                <div class="block w-full text-base sm:text-lg text-base-content/70">Identifica factores internos y externos para el diagnóstico estratégico.</div>
            </div>
        </div>
    </div>
    <article class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body gap-4">
            <h2 class="card-title text-base-content">Matriz FODA</h2>
            <p class="text-sm text-base-content/70">Registra factores y clasifícalos como fortalezas, debilidades, oportunidades o amenazas.</p>
            <div class="grid grid-cols-1 lg:grid-cols-[1.8fr_1fr_1fr] gap-3">
                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Descripción</span></div>
                    <textarea id="foda-description" class="textarea textarea-bordered w-full min-h-24" placeholder="Describe el factor"></textarea>
                </label>
                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Categoría</span></div>
                    <select id="foda-category" class="select select-bordered w-full">
                        <option value="strengths">Fortalezas</option>
                        <option value="weaknesses">Debilidades</option>
                        <option value="opportunities">Oportunidades</option>
                        <option value="threats">Amenazas</option>
                    </select>
                </label>
                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Impacto</span></div>
                    <select id="foda-impact" class="select select-bordered w-full">
                        <option value="high">Alto</option>
                        <option value="medium">Medio</option>
                        <option value="low">Bajo</option>
                    </select>
                </label>
            </div>
            <div class="flex justify-end">
                <button type="button" id="foda-add" class="btn btn-primary btn-sm">Agregar factor</button>
            </div>
        </div>
    </article>
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Fortalezas</h3>
                    <span id="foda-count-strengths" class="badge badge-success badge-outline">0</span>
                </header>
                <ul id="foda-list-strengths" class="grid gap-2"></ul>
            </div>
        </article>
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Debilidades</h3>
                    <span id="foda-count-weaknesses" class="badge badge-warning badge-outline">0</span>
                </header>
                <ul id="foda-list-weaknesses" class="grid gap-2"></ul>
            </div>
        </article>
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Oportunidades</h3>
                    <span id="foda-count-opportunities" class="badge badge-info badge-outline">0</span>
                </header>
                <ul id="foda-list-opportunities" class="grid gap-2"></ul>
            </div>
        </article>
        <article class="card bg-base-100 border border-base-300 shadow-sm">
            <div class="card-body gap-3">
                <header class="flex items-center justify-between">
                    <h3 class="font-semibold text-base-content">Amenazas</h3>
                    <span id="foda-count-threats" class="badge badge-error badge-outline">0</span>
                </header>
                <ul id="foda-list-threats" class="grid gap-2"></ul>
            </div>
        </article>
    </section>
</section>
