<section id="empresa-usuarios-module" class="w-full space-y-4">
  <style>
    .access-module-block {
      display: grid;
      gap: 1.5rem;
    }

    .access-module-block__header {
      border-bottom: 1px solid oklch(var(--bc) / 0.2);
      padding-bottom: 0.25rem;
    }

    .access-module-block__eyebrow {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: oklch(var(--bc) / 0.7);
    }

    .access-module-block__row {
      display: grid;
      gap: 1rem;
    }

    .access-module-block__name {
      padding-top: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: oklch(var(--bc) / 1);
    }

    .access-module-block__name-line {
      margin-top: 0.75rem;
      width: 100%;
      border-bottom: 1px solid oklch(var(--bc) / 0.18);
    }

    .access-module-block__content {
      display: grid;
      gap: 0.75rem;
      padding-left: 1.5rem;
    }

    .access-module-block__hint {
      font-size: 0.75rem;
      color: oklch(var(--bc) / 0.6);
    }

    .access-module-block__panel {
      border-radius: 20px;
      background: #f6ebeb;
      padding: 1rem 1.25rem;
    }

    .access-module-block__options {
      display: grid;
      gap: 0.75rem;
      padding-left: 0;
      margin-top: 0;
    }

    .access-module-block__option-control {
      display: inline-flex;
      width: 1.25rem;
      min-width: 1.25rem;
      justify-content: center;
      align-items: center;
    }

    .access-module-block__note {
      font-size: 0.75rem;
      color: oklch(var(--bc) / 0.7);
    }

    .access-module-grid {
      display: grid;
      gap: 1rem;
    }

    .access-module-card {
      display: grid;
      gap: 0.875rem;
      border: 1px solid oklch(var(--bc) / 0.12);
      border-radius: 20px;
      background: var(--b1, #fff);
      padding: 1rem 1.125rem;
    }

    .access-module-card__title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: oklch(var(--bc) / 0.85);
    }

    .access-module-card__divider {
      width: 100%;
      border-top: 1px solid oklch(var(--bc) / 0.14);
    }

    .access-module-card__fields {
      display: grid;
      gap: 0.65rem;
    }

    .access-module-card__panel {
      border: 1px solid oklch(var(--bc) / 0.12);
      border-radius: 20px;
      background: color-mix(in srgb, var(--b1, #ffffff) 86%, var(--b2, #f3f4f6) 14%);
      padding: 1rem;
    }

    .access-module-card__control {
      display: grid;
      gap: 0.5rem;
    }

    .access-module-card__control-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: oklch(var(--bc) / 0.92);
    }

    .access-module-card__select {
      width: 100%;
    }

    .access-module-card__toggle {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.75rem;
      min-height: 0;
      border: 1px solid oklch(var(--bc) / 0.1);
      border-radius: 999px;
      background: color-mix(in srgb, var(--b1, #ffffff) 88%, var(--b2, #f3f4f6) 12%);
      padding: 0.75rem 1rem;
      cursor: pointer;
    }

    .access-module-card__toggle-label {
      font-size: 0.95rem;
      font-weight: 400;
      color: oklch(var(--bc) / 0.92);
    }

    @media (min-width: 768px) {
      .access-module-block__row {
        grid-template-columns: 220px minmax(0, 1fr);
        align-items: start;
      }

      .access-module-block__content {
        padding-left: 2rem;
      }

      .access-module-block__options {
        padding-left: 2rem;
      }

      .access-module-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
  <div class="titulo bg-MAIN-200 rounded-box border border-MAIN-300 p-4 sm:p-6">
    <div class="w-full flex flex-col md:flex-row items-center gap-10">
      <img
        src="/templates/icon/usuarios.svg"
        alt="Icono usuarios"
        width="96"
        height="96"
        class="shrink-0 rounded-box border border-MAIN-300 bg-MAIN-100 p-3 object-contain"
      />
      <div class="w-full grid gap-2 content-center">
        <div class="block w-full text-3xl sm:text-4xl lg:text-5xl font-bold leading-tight text-[color:var(--sidebar-bottom)]">Usuarios</div>
        <div class="block w-full text-MAIN sm:text-lg text-MAIN-content/70">Administra roles y permisos de acceso de los usuarios del sistema.</div>
      </div>
    </div>
  </div>

  <template id="usuarios-create-template">
    <div class="grid gap-4">
      <div>
        <h3 class="card-title" id="usuarios-create-title">Alta de usuario</h3>
        <p class="text-sm text-MAIN-content/70" id="usuarios-create-description">Crea un nuevo colaborador del sistema y define su acceso inicial.</p>
      </div>
      <form id="usuarios-create-form" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        <label class="form-control">
          <div class="label"><span class="label-text font-semibold">Nombre</span></div>
          <input type="text" name="nombre" class="input input-bordered" placeholder="Nombre completo" required>
        </label>
        <label class="form-control">
          <div class="label"><span class="label-text font-semibold">Usuario</span></div>
          <input type="text" name="usuario" class="input input-bordered" placeholder="usuario" required>
        </label>
        <label class="form-control">
          <div class="label"><span class="label-text font-semibold">Correo</span></div>
          <input type="email" name="correo" class="input input-bordered" placeholder="correo@empresa.com">
        </label>
        <label class="form-control">
          <div class="label"><span class="label-text font-semibold">Contraseña</span></div>
          <input type="password" name="contrasena" class="input input-bordered" placeholder="Mínimo 8 caracteres" required>
        </label>
        <label class="label justify-start gap-3 cursor-pointer rounded-box border border-MAIN-300 bg-MAIN-100 px-4 py-3">
          <input type="checkbox" name="empleado" class="checkbox">
          <span class="label-text font-semibold">Empleado</span>
        </label>
        <label class="label justify-start gap-3 cursor-pointer rounded-box border border-MAIN-300 bg-MAIN-100 px-4 py-3">
          <input type="checkbox" name="totp_enabled" class="checkbox">
          <span class="label-text font-semibold">Habilitar doble autenticación</span>
        </label>
        <div class="md:col-span-2 xl:col-span-2 flex items-end">
          <button type="submit" class="btn btn-primary" id="usuarios-create-submit">Dar de alta</button>
        </div>
      </form>
      <div class="pt-2 grid gap-4" id="usuarios-create-notebook-host"></div>
    </div>
  </template>

  <article class="card bg-MAIN-100 border border-MAIN-300 shadow-sm">
    <div class="card-body gap-4">
      <div class="view-buttons page-view-buttons">
        <button class="view-pill boton_vista active" type="button" data-usuarios-view="list" data-tooltip="Lista" aria-label="Lista">
          <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/grid.svg')"></span>
          <span class="view-pill-label boton_vista-label">Lista</span>
        </button>
        <button class="view-pill boton_vista" type="button" data-usuarios-view="kanban" data-tooltip="Kanban" aria-label="Kanban">
          <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/kanban.svg')"></span>
          <span class="view-pill-label boton_vista-label">Kanban</span>
        </button>
        <button class="view-pill boton_vista" type="button" data-usuarios-view="organigrama" data-tooltip="Organigrama" aria-label="Organigrama">
          <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/organigrama.svg')"></span>
          <span class="view-pill-label boton_vista-label">Organigrama</span>
        </button>
        <button class="view-pill boton_vista" type="button" data-usuarios-view="form" data-tooltip="Formulario" aria-label="Formulario">
          <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/formulario.svg')"></span>
          <span class="view-pill-label boton_vista-label">Formulario</span>
        </button>
        <button class="view-pill boton_vista" type="button" id="usuarios-new-btn" data-tooltip="Nuevo" aria-label="Nuevo">
          <span class="boton_vista-icono view-pill-icon-mask" aria-hidden="true" style="--view-pill-icon-url:url('/icon/boton/nuevo.svg')"></span>
          <span class="view-pill-label boton_vista-label">Nuevo</span>
        </button>
      </div>
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <h3 class="card-title">Usuarios del sistema</h3>
        <label class="input input-bordered flex items-center gap-2 w-full md:max-w-sm">
          <input id="usuarios-search" type="text" class="grow" placeholder="Buscar por nombre, usuario, correo, rol o puesto">
        </label>
      </div>
      <div id="usuarios-view"></div>
    </div>
  </article>

</section>

<script>
(function () {
  var viewHost = document.getElementById('usuarios-view');
  var searchInput = document.getElementById('usuarios-search');
  var viewButtons = Array.from(document.querySelectorAll('#empresa-usuarios-module .view-buttons .view-pill[data-usuarios-view]'));
  var newBtn = document.getElementById('usuarios-new-btn');
  var initialPayloadNode = document.getElementById('usuarios-initial-data');
  var createTemplate = document.getElementById('usuarios-create-template');
  var createForm = null;
  var createSubmitBtn = null;
  var createNotebookHost = null;
  var createTitle = null;
  var createDescription = null;
  if (!viewHost) return;

  var usuarios = [];
  var selectedKey = '';
  var searchTerm = '';
  var assignableRoles = [];
  var currentView = 'list';
  var currentCreateTab = 'roles';
  var createProfileState = null;
  var orgLibPromise = null;
  var usuariosOrgChart = null;
  var orgExpandedUsuarioId = '';

  function cacheCreateElements() {
    createForm = document.getElementById('usuarios-create-form');
    createSubmitBtn = document.getElementById('usuarios-create-submit');
    createNotebookHost = document.getElementById('usuarios-create-notebook-host');
    createTitle = document.getElementById('usuarios-create-title');
    createDescription = document.getElementById('usuarios-create-description');
  }

  function setActiveViewButton(view) {
    viewButtons.forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-usuarios-view') === view);
    });
  }

  var ACCESS_APP_OPTIONS = ['Mi tablero', 'Conversaciones', 'BSC', 'Organización', 'Estrategia y táctica', 'Datos financieros', 'Mesa de control', 'Cartera de préstamos', 'MKT', 'PLD', 'Control y seguimiento', 'KPIs', 'Reportes', 'Empresa', 'Intelicoop', 'Brújula', 'CRM', 'Encuestas', 'Auditoria', 'ActivoFijo', 'Multiempresa', 'Capacitacion'];
  var ACCESS_LEVEL_OPTIONS = [
    { key: 'full_access', label: 'Acceso total' },
    { key: 'read_only', label: 'Solo lectura' },
    { key: 'department_only', label: 'Solo departamento' },
    { key: 'user_only', label: 'Solo usuario' },
    { key: 'special_permissions', label: 'Permisos especiales' }
  ];
  var ACCESS_POA_OPTIONS = [
    { value: 'mis_tareas', label: 'Mis tareas (sin vista Gantt)' },
    { value: 'todas_tareas', label: 'Todas las tareas (incluye Gantt)' }
  ];
  var STRATEGY_SUBMENU_OPTIONS = ['Diagnóstico', 'Plan estratégico', 'POA', 'Tablero de control', 'IA estrategia'];
  var ACCESS_backend_ROLE_OPTIONS = [
    { value: 'editor', label: 'Editor' },
    { value: 'designer', label: 'Diseñador' }
  ];
  var CONVERSATION_ACCESS_CONFIG = {
    title: 'Conversaciones',
    help_badge: '?',
    role_label: 'Nivel de acceso',
    roles: [
      { value: '', label: 'Sin acceso' },
      { value: 'usuario', label: 'Usuario' },
      { value: 'administrador', label: 'Administrador' }
    ],
    toggles: [
      { key: 'can_create_groups', label: 'Puede crear grupos', data_attr: 'create-groups', enabled_when_role: ['usuario', 'administrador'] },
      { key: 'can_send_notifications', label: 'Puede enviar notificaciones', data_attr: 'send-notifications', enabled_when_role: ['administrador'] }
    ],
    scope_label: 'Alcance de notificaciones',
    scopes: [
      { value: '', label: 'Solo conversación' },
      { value: 'department', label: 'Mi departamento' },
      { value: 'company', label: 'Toda la empresa' }
    ]
  };

  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeAccessRole(raw) {
    var role = String(raw || '').trim().toLowerCase();
    if (role === 'admin') role = 'administrador';
    if (role === 'super_admin' || role === 'superadmin' || role === 'superadministrdor') role = 'superadministrador';
    if (!role) role = 'usuario';
    return role;
  }

  function normalizePoaAccess(raw) {
    return String(raw || '').trim().toLowerCase() === 'todas_tareas' ? 'todas_tareas' : 'mis_tareas';
  }

  function normalizeAccessMatrix(appAccessLevels, fallbackAppAccess) {
    var normalized = {};
    ACCESS_APP_OPTIONS.forEach(function (appName) {
      normalized[appName] = {
        full_access: false,
        read_only: false,
        department_only: false,
        user_only: false,
        special_permissions: false
      };
      var rawEntry = appAccessLevels && typeof appAccessLevels === 'object' ? appAccessLevels[appName] : null;
      if (rawEntry && typeof rawEntry === 'object') {
        ACCESS_LEVEL_OPTIONS.forEach(function (level) {
          normalized[appName][level.key] = Boolean(rawEntry[level.key]);
        });
        var selectedKeys = ACCESS_LEVEL_OPTIONS
          .filter(function (level) { return normalized[appName][level.key]; })
          .map(function (level) { return level.key; });
        if (selectedKeys.length > 1) {
          ACCESS_LEVEL_OPTIONS.forEach(function (level, index) {
            normalized[appName][level.key] = index === 0 ? normalized[appName][level.key] : false;
          });
        }
      }
    });
    if (Array.isArray(fallbackAppAccess)) {
      fallbackAppAccess.forEach(function (appName) {
        var key = String(appName || '').trim();
        if (!normalized[key]) return;
        if (!ACCESS_LEVEL_OPTIONS.some(function (level) { return normalized[key][level.key]; })) {
          normalized[key].full_access = true;
        }
      });
    }
    return normalized;
  }

  function deriveAppAccessFromMatrix(matrix) {
    return ACCESS_APP_OPTIONS.filter(function (appName) {
      var entry = matrix && typeof matrix === 'object' ? matrix[appName] : null;
      return !!entry && ACCESS_LEVEL_OPTIONS.some(function (level) { return Boolean(entry[level.key]); });
    });
  }

  function roleLabel(role) {
    return role === 'superadministrador' ? 'Superadministrador'
      : role === 'administrador' ? 'Administrador'
      : role === 'autoridades' ? 'Autoridades'
      : role === 'departamento' ? 'Departamento'
      : role === 'administrador_multiempresa' ? 'Administrador multiempresa'
      : 'Usuario';
  }

  function normalizeConversationAccess(raw) {
    var entry = raw && typeof raw === 'object' ? raw : {};
    var role = String(entry.role || entry.rol || '').trim().toLowerCase();
    if (role === 'sin_acceso') role = '';
    if (role !== 'usuario' && role !== 'administrador') role = '';
    var notificationScope = String(entry.notification_scope || entry.scope || '').trim().toLowerCase();
    if (notificationScope !== 'department' && notificationScope !== 'company') notificationScope = '';
    if (role !== 'administrador' && notificationScope === 'company') notificationScope = 'department';
    if (!Boolean(entry.can_send_notifications)) notificationScope = '';
    return {
      role: role,
      can_create_groups: Boolean(entry.can_create_groups),
      can_send_notifications: role === 'administrador' && Boolean(entry.can_send_notifications),
      notification_scope: notificationScope
    };
  }

  function renderConversationAccessConfigurator(namePrefix, accessState, dataPrefix) {
    var state = normalizeConversationAccess(accessState);
    var attr = dataPrefix ? String(dataPrefix) : 'conversation-access';
    var config = CONVERSATION_ACCESS_CONFIG || {};
    var roleOptions = Array.isArray(config.roles) && config.roles.length ? config.roles : [];
    var toggleOptions = Array.isArray(config.toggles) ? config.toggles : [];
    var scopeOptions = Array.isArray(config.scopes) ? config.scopes : [];
    return '' +
      '<section class="access-module-card">' +
        '<h5 class="access-module-card__title">' + esc(config.title || 'Conversaciones') + ' <span class="text-info normal-case">' + esc(config.help_badge || '?') + '</span></h5>' +
        '<div class="access-module-card__divider"></div>' +
        '<div class="access-module-card__fields">' +
          '<div class="access-module-card__panel">' +
            '<label class="access-module-card__control">' +
              '<span class="access-module-card__control-label">' + esc(config.role_label || 'Nivel de acceso') + '</span>' +
              '<select class="select select-bordered access-module-card__select" name="' + esc(namePrefix + '-role') + '" data-' + attr + '-role="1">' +
                roleOptions.map(function (opt) {
                  var selected = String(opt.value || '').trim().toLowerCase() === String(state.role || '').trim().toLowerCase();
                  return '<option value="' + esc(opt.value || '') + '"' + (selected ? ' selected' : '') + '>' + esc(opt.label || '') + '</option>';
                }).join('') +
              '</select>' +
            '</label>' +
          '</div>' +
          toggleOptions.map(function (toggle) {
            var key = String(toggle.key || '').trim();
            var dataAttr = String(toggle.data_attr || '').trim();
            var enabledRoles = Array.isArray(toggle.enabled_when_role) ? toggle.enabled_when_role.map(function (value) { return String(value || '').trim().toLowerCase(); }) : [];
            var isEnabled = enabledRoles.length ? enabledRoles.indexOf(String(state.role || '').trim().toLowerCase()) !== -1 : !!state.role;
            return '<label class="access-module-card__toggle">' +
              '<span class="access-module-block__option-control"><input type="checkbox" class="checkbox checkbox-sm" data-' + attr + '-' + esc(dataAttr) + '="1"' + (state[key] ? ' checked' : '') + (isEnabled ? '' : ' disabled') + '></span>' +
              '<span class="access-module-card__toggle-label">' + esc(toggle.label || key) + '</span>' +
            '</label>';
          }).join('') +
          '<div class="access-module-card__panel">' +
            '<label class="access-module-card__control">' +
              '<span class="access-module-card__control-label">' + esc(config.scope_label || 'Alcance de notificaciones') + '</span>' +
              '<select class="select select-bordered access-module-card__select" name="' + esc(namePrefix + '-scope') + '" data-' + attr + '-scope="1"' + (state.can_send_notifications ? '' : ' disabled') + '>' +
                scopeOptions.map(function (opt) {
                  var selected = String(opt.value || '').trim().toLowerCase() === String(state.notification_scope || '').trim().toLowerCase();
                  return '<option value="' + esc(opt.value || '') + '"' + (selected ? ' selected' : '') + '>' + esc(opt.label || '') + '</option>';
                }).join('') +
              '</select>' +
            '</label>' +
          '</div>' +
        '</div>' +
      '</section>';
  }

  function resetCreateProfileState() {
    createProfileState = {
      rol: 'usuario',
      conversation_access: normalizeConversationAccess(null),
      app_access_levels: normalizeAccessMatrix(null, [])
    };
  }

  function syncCreateProfileFromUser(user) {
    createProfileState = {
      rol: normalizeAccessRole(user && (user.rol || user.role) || 'usuario'),
      conversation_access: normalizeConversationAccess(user && user.conversation_access),
      app_access_levels: normalizeAccessMatrix(user && user.app_access_levels, user && user.app_access)
    };
  }

  function renderAccessRadioGroup(name, options, selectedValue, dataAttrName, textClass) {
    var dataAttr = dataAttrName ? (' ' + dataAttrName + '="1"') : '';
    var labelClass = textClass ? String(textClass) : 'text-sm';
    return '<div class="grid gap-2">' +
      (options || []).map(function (opt) {
        var checked = String(opt.value || '').trim().toLowerCase() === String(selectedValue || '').trim().toLowerCase();
        return '<label class="label justify-start gap-3 cursor-pointer p-0 min-h-0">' +
          '<span class="access-module-block__option-control"><input type="radio" class="radio radio-sm" name="' + esc(name) + '" value="' + esc(opt.value || '') + '"' + dataAttr + (checked ? ' checked' : '') + '></span>' +
          '<span class="label-text ' + labelClass + ' text-MAIN-content font-normal">' + esc(opt.label || '') + '</span>' +
        '</label>';
      }).join('') +
      '</div>';
  }

  function renderAccessCheckboxGroup(options, selectedValues, dataAttrName) {
    var selected = Array.isArray(selectedValues) ? selectedValues.map(function (v) { return String(v || '').trim().toLowerCase(); }) : [];
    var dataAttr = dataAttrName ? (' ' + dataAttrName + '="1"') : '';
    return '<div class="grid gap-2">' +
      (options || []).map(function (opt) {
        var value = typeof opt === 'string' ? opt : (opt && opt.value) || '';
        var label = typeof opt === 'string' ? opt : (opt && opt.label) || '';
        var checked = selected.indexOf(String(value || '').trim().toLowerCase()) !== -1;
        return '<label class="label justify-start gap-3 cursor-pointer p-0 min-h-0">' +
          '<input type="checkbox" class="checkbox checkbox-sm" value="' + esc(value) + '"' + dataAttr + (checked ? ' checked' : '') + '>' +
          '<span class="label-text text-MAIN-content font-semibold">' + esc(label) + '</span>' +
        '</label>';
      }).join('') +
      '</div>';
  }

  function renderAccessModuleCards(selectedMatrix, conversationAccess) {
    var matrix = normalizeAccessMatrix(selectedMatrix, []);
    var moduleNames = ACCESS_APP_OPTIONS.filter(function (appName) {
      return appName !== 'Conversaciones';
    });
    return '<div class="access-module-grid">' +
      moduleNames.map(function (appName) {
        return '<section class="access-module-card">' +
          '<h5 class="access-module-card__title">' + esc(appName) + '</h5>' +
          '<div class="access-module-card__divider"></div>' +
          '<div class="access-module-card__fields">' +
            ACCESS_LEVEL_OPTIONS.map(function (level) {
              return '<label class="label justify-start gap-3 cursor-pointer p-0 min-h-0">' +
                '<span class="access-module-block__option-control"><input type="checkbox" class="checkbox checkbox-sm" data-access-app-level="1" data-menu-name="' + esc(appName) + '" data-level-key="' + esc(level.key) + '"' + (matrix[appName][level.key] ? ' checked' : '') + '></span>' +
                '<span class="label-text text-sm text-MAIN-content font-normal">' + esc(level.label) + '</span>' +
              '</label>';
            }).join('') +
          '</div>' +
        '</section>';

  function bindAccessMatrixExclusive(rootEl) {

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      if (document.querySelector('script[src="' + src + '"]')) {
        resolve();
        return;
      }
      var script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = function () { resolve(); };
      script.onerror = function () { reject(new Error('No se pudo cargar ' + src)); };
      document.head.appendChild(script);
    });
  }

  async function ensureOrgLibrary() {
    if (window.d3 && window.d3.OrgChart) return true;
    if (!orgLibPromise) {
      orgLibPromise = (async function () {
        await loadScript('/static/vendor/d3.min.js');
        await loadScript('/static/vendor/d3-flextree.min.js');
        await loadScript('/static/vendor/d3-org-chart.min.js');
      })().catch(function () { return false; });
    }
    var result = await orgLibPromise;
    return result !== false && !!(window.d3 && window.d3.OrgChart);
  }

  function getOrgPathToRoot(id, mapById) {
    var path = [];
    var current = mapById[id];
    var guard = 0;
    while (current && guard < 200) {
      path.push(current.id);
      if (!current.parentId) break;
      current = mapById[current.parentId];
      guard += 1;
    }
    return path;
  }

  async function renderOrganigrama() {
    viewHost.innerHTML = '' +
      '<article class="card bg-MAIN-100 border border-MAIN-300 shadow-sm">' +
        '<div class="card-body gap-4">' +
          '<h3 class="card-title">Organigrama de usuarios</h3>' +

            '<p class="text-sm text-MAIN-content/70">Cargando organigrama...</p>' +
          '</div>' +
        '</div>' +
      '</article>';
    var orgChartEl = viewHost.querySelector('[data-usuarios-org-chart]');
    if (!(orgChartEl instanceof HTMLElement)) return;

    try {
      var data = getVisibleUsuarios();
      if (!data.length) {
        orgChartEl.innerHTML = '<p class="text-sm text-MAIN-content/70">Sin datos para organigrama.</p>';
        return;
      }
      var libOk = await ensureOrgLibrary();
      if (!libOk) {
        orgChartEl.innerHTML = '<p class="text-sm text-MAIN-content/70">No se pudo cargar la librería de organigrama.</p>';
        return;
      }

      var byId = {};
      data.forEach(function (row) {
        var rowId = String(row.id || '').trim();
        if (rowId) byId[rowId] = row;
      });

      var nodes = data.map(function (row) {
        var rowId = String(row.id || '').trim() || Math.random().toString(36).slice(2);
        var bossId = row.jefe_inmediato_id !== null && row.jefe_inmediato_id !== undefined ? String(row.jefe_inmediato_id).trim() : '';
        return {
          id: rowId,
          parentId: bossId && byId[bossId] ? bossId : '',
          name: String(row.nombre || 'Usuario'),
          role: String(row.rol || 'usuario'),
          user: String(row.usuario || ''),
          department: String(row.departamento || 'Sin departamento'),
          position: String(row.puesto || 'Sin puesto'),
          image: String(row.imagen || '').trim()
        };
      });

      var roots = nodes.filter(function (n) { return !n.parentId; });
      if (roots.length > 1) {
        nodes.push({ id: '__ROOT__', parentId: '', name: 'Usuarios', role: '', user: '', department: '', position: '', image: '' });
        nodes = nodes.map(function (n) {
          if (!n.parentId && n.id !== '__ROOT__') n.parentId = '__ROOT__';
          return n;
        });
      }

      var nodeMap = {};
      nodes.forEach(function (node) { nodeMap[node.id] = node; });
      var MAINRootId = nodeMap.__ROOT__ ? '__ROOT__' : (roots[0] ? roots[0].id : '');
      if (!orgExpandedUsuarioId) orgExpandedUsuarioId = MAINRootId;
      var expandedPath = new Set(getOrgPathToRoot(orgExpandedUsuarioId, nodeMap));
      nodes = nodes.map(function (node) {
        node._expanded = expandedPath.has(node.id);
        return node;
      });

      orgChartEl.innerHTML = '';
      usuariosOrgChart = new window.d3.OrgChart()
        .container(orgChartEl)
        .data(nodes)
        .nodeWidth(function () { return 340; })
        .nodeHeight(function () { return 156; })
        .childrenMargin(function () { return 48; })
        .compact(true)
        .initialExpandLevel(0)
        .setActiveNodeCentered(true)
        .nodeButtonWidth(function () { return 36; })
        .nodeButtonHeight(function () { return 36; })
        .nodeButtonX(function () { return -18; })
        .nodeButtonY(function () { return -18; })
        .buttonContent(function (ctx) {
          var node = ctx && ctx.node ? ctx.node : null;
          var expanded = !!(node && node.children);
          var sign = expanded ? '−' : '+';
          var count = Number(node && node.data ? node.data._directSubordinates || 0 : 0);
          return '<div style="width:36px;height:36px;border-radius:9999px;background:#0f172a;color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;border:2px solid #fff;box-shadow:0 4px 10px rgba(15,23,42,.22);">' + sign + (count > 0 ? '<span style="font-size:10px;margin-left:2px;">' + count + '</span>' : '') + '</div>';
        })
        .nodeContent(function (d) {
          var item = d && d.data ? d.data : {};
          var imageHtml = item.image
            ? '<img src="' + esc(item.image) + '" alt="' + esc(item.name || 'Usuario') + '" style="width:100%;height:100%;object-fit:cover;display:block;">'
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:800;color:#ffffff;">' + esc((item.name || '?').charAt(0).toUpperCase()) + '</div>';
          return ''
            + '<div style="display:grid;grid-template-columns:92px 1fr;height:152px;border:1px solid #dbe2ea;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 6px 14px rgba(15,23,42,.12);font-family:inherit;">'
            +   '<div style="background:#0f172a;display:flex;align-items:center;justify-content:center;overflow:hidden;">' + imageHtml + '</div>'
            +   '<div style="padding:12px;display:grid;gap:5px;align-content:start;">'
            +     '<div style="font-size:22px;font-weight:800;color:#0f172a;line-height:1.08;">' + esc(item.name || 'Usuario') + '</div>'
            +     '<div style="font-size:14px;color:#334155;"><strong>Puesto:</strong> ' + esc(item.position || 'Sin puesto') + '</div>'
            +     '<div style="font-size:14px;color:#334155;"><strong>Departamento:</strong> ' + esc(item.department || 'Sin departamento') + '</div>'
            +     '<div style="font-size:14px;color:#334155;"><strong>Usuario:</strong> ' + esc(item.user || '—') + '</div>'
            +   '</div>'

          var clickedId = d && d.data ? d.data.id : '';

        '<button type="button" class="tab tab-lifted text-sm font-normal' + (currentCreateTab === 'acceso' ? ' tab-active' : '') + '" data-create-tab="acceso" aria-selected="' + (currentCreateTab === 'acceso' ? 'true' : 'false') + '">Acceso</button>' +
      '</div>' +
      '<div class="rounded-box border border-MAIN-300 bg-MAIN-200 p-4 sm:p-5">' +
        (currentCreateTab === 'roles'
          ? '<div class="grid gap-4">' +
              '<h4 class="text-MAIN font-normal text-MAIN-content">Roles</h4>' +
              renderAccessRadioGroup('create-rol', roleOptions, selectedRole, 'data-create-role') +
            '</div>'
          : '<div class="grid gap-5">' +
              '<div class="rounded-box border border-dashed border-MAIN-300 bg-MAIN-100 p-4">' +
                '<div class="grid gap-3">' +
                  '<div class="grid gap-2 pt-2">' +
                    '<h4 class="text-MAIN font-semibold text-MAIN-content">Permisos de módulos</h4>' +
                    '<p class="text-sm text-MAIN-content/70">Selecciona un nivel de acceso por módulo.</p>' +
                  '</div>' +
                  renderAccessModuleCards(appAccessLevels, conversationAccess) +
                '</div>' +
              '</div>' +
            '</div>') +
      '</div>';

    Array.from(createNotebookHost.querySelectorAll('[data-create-tab]')).forEach(function (btn) {
      btn.addEventListener('click', function () {
        syncCreateProfileFromDom();
        currentCreateTab = btn.getAttribute('data-create-tab') || 'roles';
        renderCreateNotebook();
      });
    });

    bindAccessMatrixExclusive(createNotebookHost);
  }

  viewHost.addEventListener('click', function (event) {
    var target = event.target;
    if (!(target instanceof HTMLElement)) return;
    var row = target.closest('[data-usuario-key]');
    if (!(row instanceof HTMLElement)) return;
    openUserFormByKey(row.getAttribute('data-usuario-key') || '');
  });

  viewHost.addEventListener('keydown', function (event) {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    var target = event.target;
    if (!(target instanceof HTMLElement)) return;
    var row = target.closest('[data-usuario-key]');
    if (!(row instanceof HTMLElement)) return;
    event.preventDefault();
    openUserFormByKey(row.getAttribute('data-usuario-key') || '');
  });

  if (searchInput) {
    searchInput.addEventListener('input', function () {
      searchTerm = String(searchInput.value || '').trim();
      renderCurrentView();
    });
  }

  viewButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      currentView = btn.getAttribute('data-usuarios-view') || 'list';
      renderCurrentView();
    });
  });

  if (newBtn) {
    newBtn.addEventListener('click', function () {
      selectedKey = '';
      resetCreateProfileState();
      currentCreateTab = 'roles';
      currentView = 'form';
      renderCurrentView();
      var firstInput = createForm ? createForm.querySelector('input[name="nombre"]') : null;
      if (viewHost && typeof viewHost.scrollIntoView === 'function') {
        viewHost.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (firstInput && typeof firstInput.focus === 'function') {
        window.setTimeout(function () { firstInput.focus(); }, 180);
      }
    });
  }

  function applyUsuariosPayload(payload) {
    if (!payload || payload.success === false) {
      throw new Error((payload && payload.error) || 'No se pudieron cargar usuarios');
    }
    usuarios = Array.isArray(payload.data) ? payload.data : [];
    assignableRoles = Array.isArray(payload.assignable_roles) ? payload.assignable_roles : [];
    renderCreateNotebook();
    renderCurrentView();
  }

  function upsertUsuario(item) {
    var key = getKey(item);
    var index = usuarios.findIndex(function (row) { return getKey(row) === key; });
    if (index >= 0) {
      usuarios[index] = Object.assign({}, usuarios[index], item);
    } else {
      usuarios.unshift(item);
    }
  }

  function showUsuariosError(error) {
    viewHost.innerHTML = '<article class="card bg-MAIN-100 border border-MAIN-300 shadow-sm"><div class="card-body"><p class="text-sm text-error">' + esc(error && error.message ? error.message : 'No se pudieron cargar usuarios.') + '</p></div></article>';
  }

  try {
    var initialPayload = initialPayloadNode ? JSON.parse(initialPayloadNode.textContent || '{}') : null;
    if (initialPayload && initialPayload.success) {
      applyUsuariosPayload(initialPayload);
    }
  } catch (error) {}

  fetch('/api/v1/conversaciones/access-config', { headers: { Accept: 'application/json' } })
    .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
    .then(function (result) {
      if (!result.ok || !result.data || result.data.success === false || !result.data.data) return;
      CONVERSATION_ACCESS_CONFIG = Object.assign({}, CONVERSATION_ACCESS_CONFIG, result.data.data);
      renderCreateNotebook();
    })
    .catch(function () {});

  function bindCreateForm() {
    if (!createForm || createForm.getAttribute('data-bound') === '1') return;
    createForm.setAttribute('data-bound', '1');
    createForm.addEventListener('submit', function (event) {
      event.preventDefault();
      if (!createSubmitBtn) return;
      var formData = new window.FormData(createForm);
      syncCreateProfileFromDom();
      var current = getCurrent();
      var payload = {
        id: current && current.id != null ? current.id : undefined,
        nombre: String(formData.get('nombre') || '').trim(),
        usuario: String(formData.get('usuario') || '').trim(),
        correo: String(formData.get('correo') || '').trim(),
        contrasena: String(formData.get('contrasena') || ''),
        empleado: formData.get('empleado') === 'on',
        colaborador: formData.get('empleado') === 'on',
        totp_enabled: formData.get('totp_enabled') === 'on',
        rol: normalizeAccessRole(createProfileState.rol || 'usuario'),
        conversation_access: normalizeConversationAccess(createProfileState.conversation_access),
        app_access_levels: normalizeAccessMatrix(createProfileState.app_access_levels, []),
        app_access: deriveAppAccessFromMatrix(createProfileState.app_access_levels)
      };
      if (current) {
        payload.departamento = String(current.departamento || '').trim();
        payload.puesto = String(current.puesto || '').trim();
        payload.jefe_inmediato_id = current.jefe_inmediato_id || null;
        payload.celular = String(current.celular || '').trim();
        payload.nivel_organizacional = String(current.nivel_organizacional || current.coach || '').trim();
        payload.imagen = String(current.imagen || '').trim();
        payload.eficiencia = current.eficiencia;
        payload.menu_blocks = Array.isArray(current.menu_blocks) ? current.menu_blocks : [];
        payload.cv_contacto = current.cv_contacto || {};
        payload.cv_perfil_profesional = current.cv_perfil_profesional || '';
        payload.cv_experiencia = Array.isArray(current.cv_experiencia) ? current.cv_experiencia : [];
        payload.cv_educacion = Array.isArray(current.cv_educacion) ? current.cv_educacion : [];
        payload.cv_habilidades = current.cv_habilidades || { tecnicas: [], blandas: [] };
        payload.cv_idiomas = Array.isArray(current.cv_idiomas) ? current.cv_idiomas : [];
        payload.cv_formacion = Array.isArray(current.cv_formacion) ? current.cv_formacion : [];
        payload.cv_logros = Array.isArray(current.cv_logros) ? current.cv_logros : [];
        payload.cv_voluntariado = Array.isArray(current.cv_voluntariado) ? current.cv_voluntariado : [];
        payload.cv_info_adicional = current.cv_info_adicional || {};
        payload.identidad_mision = String(current.identidad_mision || '').trim();
        payload.identidad_vision = String(current.identidad_vision || '').trim();
      }
      if (!payload.contrasena) delete payload.contrasena;

      createSubmitBtn.disabled = true;
      createSubmitBtn.textContent = 'Guardando...';

      fetch('/api/colaboradores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(async function (res) {
          var raw = await res.text();
          var json = null;
          try { json = raw ? JSON.parse(raw) : {}; } catch (err) {}
          return { ok: res.ok, json: json, raw: raw };
        })
        .then(function (result) {
          if (!result.ok || !result.json || result.json.success === false) {
            throw new Error((result.json && (result.json.error || result.json.detail)) || 'No se pudo guardar el usuario');
          }
          if (result.json && result.json.data) {
            upsertUsuario(result.json.data);
            selectedKey = getKey(result.json.data);
            renderCurrentView();
          }
          if (!current) {
            createForm.reset();
            resetCreateProfileState();
            currentCreateTab = 'roles';
            renderCreateNotebook();
          }
          window.alert(current ? 'Usuario actualizado correctamente.' : 'Usuario dado de alta correctamente.');
        })
        .catch(function (error) {
          window.alert(error && error.message ? error.message : 'No se pudo guardar el usuario');
        })
        .finally(function () {
          createSubmitBtn.disabled = false;
          createSubmitBtn.textContent = getCurrent() ? 'Guardar cambios' : 'Dar de alta';
        });
    });
  }

  resetCreateProfileState();
  cacheCreateElements();
  renderCreateNotebook();
  bindCreateForm();

  if (!usuarios.length) {
    fetch('/api/colaboradores', { credentials: 'same-origin', headers: { Accept: 'application/json' } })
      .then(async function (res) {
        const raw = await res.text();
        let json = null;
        try { json = raw ? JSON.parse(raw) : {}; } catch (err) {}
        return { ok: res.ok, json: json, raw: raw };
      })
      .then(function (result) {
        if (!result.ok || !result.json || result.json.success === false) {
          throw new Error((result.json && result.json.error) || 'No se pudieron cargar usuarios');
        }
        applyUsuariosPayload(result.json);
      })
      .catch(showUsuariosError);
  }
})();
</script>
