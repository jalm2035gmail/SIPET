<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Colaboradores</title>
    <style>
        #empleados-module {
            display: grid;
            gap: 14px;
        }
        .emp-card { 
            background: #fff; 
            border: 1px solid #dbe3ef; 
            border-radius: 14px; 
            padding: 14px; 
        }
        .emp-head { 
            margin: 0 0 10px; 
            font-size: 1.02rem; 
            color: #0f172a; 
        }
        .emp-table-wrap {
            width: 100%;
            min-height: 240px;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 12px;
        }
        .emp-table { 
            width: 100%; 
            border-collapse: collapse; 
            border: 1px solid rgba(15,23,42,.16); 
            border-radius: 12px; 
            overflow: hidden; 
            background: #fff; 
        }
        .emp-table th { 
            text-align: left; 
            font-size: 12px; 
            letter-spacing: .06em; 
            text-transform: uppercase; 
            color: rgba(15,23,42,.82); 
            background: linear-gradient(180deg, rgba(239,246,255,.96), rgba(219,234,254,.90)); 
            border: 1px solid rgba(15,23,42,.14); 
            padding: 10px 12px; 
            white-space: nowrap; 
        }
        .emp-table td { 
            border: 1px solid rgba(15,23,42,.10); 
            padding: 10px 12px; 
            color: #0f172a; 
            background: #fff; 
        }
        .emp-list-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .emp-list-btn {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #0f172a;
            padding: 4px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emp-list-btn img {
            width: 16px;
            height: 16px;
            object-fit: contain;
            display: block;
        }
        .emp-list-btn.delete {
            border-color: #ef4444;
            color: #ef4444;
        }
        .emp-table tbody tr:nth-child(even) td { 
            background: #f3f4f6; 
        }
        .emp-empty { 
            color: #64748b; 
        }
        .field {
            display: grid;
            gap: 4px;
            margin-bottom: 10px;
        }
        .field input, .field select {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        .emp-form-shell {
            display: grid;
            gap: 14px;
            max-width: 980px;
        }
        .emp-form-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 180px;
            gap: 16px;
            align-items: start;
        }
        .emp-form-header-left {
            display: grid;
            gap: 10px;
        }
        .emp-photo-box {
            border: 1px solid color-mix(in srgb, var(--button-bg, #0f172a) 16%, #ffffff 84%);
            border-radius: 14px;
            background: var(--field-color, #ffffff);
            min-height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--sidebar-bottom, #0f172a);
            font-weight: 700;
            font-size: 2rem;
            overflow: hidden;
            position: relative;
        }
        .emp-photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .emp-photo-action {
            position: absolute;
            bottom: 8px;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid color-mix(in srgb, var(--button-bg, #0f172a) 24%, #ffffff 76%);
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }
        .emp-photo-action img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }
        .emp-photo-action.edit {
            left: 8px;
        }
        .emp-photo-action.delete {
            right: 8px;
        }
        .emp-form-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .emp-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .emp-field label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--sidebar-bottom, #0f172a);
        }
        .emp-field input,
        .emp-field select,
        .emp-field textarea {
            width: 100%;
            border: 1px solid color-mix(in srgb, var(--button-bg, #0f172a) 20%, #ffffff 80%);
            border-radius: 10px;
            padding: 10px;
            color: var(--navbar-text, #1f172a);
            background: var(--field-color, #ffffff);
            font-size: 0.95rem;
        }
        .emp-password-wrap {
            position: relative;
        }
        .emp-password-wrap input {
            padding-right: 44px;
        }
        .emp-password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            transform: translateY(-50%);
            border: 1px solid color-mix(in srgb, var(--button-bg, #0f172a) 24%, #ffffff 76%);
            border-radius: 8px;
            background: #ffffff;
            color: #0f172a;
            width: 28px;
            height: 28px;
            padding: 0;
            cursor: pointer;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .emp-password-toggle img {
            width: 16px;
            height: 16px;
            display: block;
        }
        .emp-password-toggle[data-visible="true"] {
            background: #0f172a;
            color: #ffffff;
        }
        @media (max-width: 900px) {
            .emp-form-header {
                grid-template-columns: 1fr;
            }
            .emp-form-grid {
                grid-template-columns: 1fr;
            }
        }
        .emp-notebook {
            margin-top: 8px;
            border: 1px solid color-mix(in srgb, var(--sidebar-bottom, #0f172a) 16%, #ffffff 84%);
            border-radius: 12px;
            background: #ffffff;
            overflow: hidden;
        }
        .emp-notebook-tabs {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            border-bottom: 1px solid color-mix(in srgb, var(--sidebar-bottom, #0f172a) 28%, #ffffff 72%);
            background: #ffffff;
            scrollbar-width: thin;
            scrollbar-color: color-mix(in srgb, var(--sidebar-bottom, #0f172a) 30%, transparent) transparent;
            -webkit-overflow-scrolling: touch;
        }
        .emp-notebook-tabs::-webkit-scrollbar {
            height: 4px;
        }
        .emp-notebook-tabs::-webkit-scrollbar-track {
            background: transparent;
        }
        .emp-notebook-tabs::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--sidebar-bottom, #0f172a) 30%, transparent);
            border-radius: 2px;
        }
        .emp-notebook-tab {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
            border: 0;
            background: transparent;
            color: #1f2937;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 16px 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .emp-notebook-tab::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -1px;
            height: 4px;
            background: transparent;
            transition: background 0.18s ease;
        }
        .emp-notebook-tab.active {
            color: var(--sidebar-bottom, #0f172a);
            background: transparent;
        }
        .emp-notebook-tab.active::after {
            background: var(--sidebar-bottom, #0f172a);
        }
        .emp-notebook-tab .tab-icon {
            width: 18px;
            height: 18px;
            display: inline-block;
            flex: 0 0 auto;
        }
        .emp-notebook-tab .tab-label {
            display: inline;
        }
        .emp-notebook-tab.collapsed .tab-label {
            display: none;
        }
        .tab-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            font-size: 0.7rem;
            font-weight: 700;
            line-height: 1;
            color: inherit;
            opacity: 0.45;
            margin-left: 4px;
            flex: 0 0 auto;
            transition: opacity 0.15s;
        }
        .emp-notebook-tab:hover .tab-toggle {
            opacity: 0.9;
        }
        /* Tooltip de pestaña */
        .emp-notebook-tab[data-tooltip] {
            overflow: visible;
        }
        .emp-notebook-tab[data-tooltip]::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f1f5f9;
            font-size: 0.74rem;
            font-weight: 500;
            white-space: nowrap;
            padding: 4px 9px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.15s ease;
            transform: translateX(-50%) translateY(4px);
            z-index: 999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .emp-notebook-tab[data-tooltip]:hover::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .emp-notebook-panel {
            min-height: 180px;
            padding: 14px 16px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-align: center;
        }
        /* Acordeón CV */
        .cv-accordion {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }
        .cv-block {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 1px 3px rgba(15,23,42,.05);
            transition: box-shadow 0.15s;
        }
        .cv-block[open] {
            box-shadow: 0 3px 10px rgba(15,23,42,.09);
        }
        .cv-block > summary {
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.92rem;
            color: #1e293b;
            user-select: none;
            gap: 8px;
        }
        .cv-block > summary::-webkit-details-marker { display: none; }
        .cv-block > summary::after {
            content: '+';
            font-size: 1rem;
            font-weight: 700;
            color: #94a3b8;
            transition: transform 0.2s, color 0.15s;
            flex: 0 0 auto;
        }
        .cv-block[open] > summary::after {
            content: '\2212';
            color: #475569;
        }
        .cv-block > summary:hover {
            background: #f8fafc;
        }
        .cv-block-body {
            padding: 10px 16px 14px;
            border-top: 1px solid #f1f5f9;
            color: #64748b;
            font-size: 0.88rem;
            min-height: 36px;
        }
        /* Campos de formulario dentro del acordeón CV */
        .cv-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
        }
        .cv-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cv-field label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .cv-field input {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 0.88rem;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        .cv-field input:focus {
            border-color: #94a3b8;
            background: #fff;
        }
        @media (max-width: 620px) {
            .cv-fields { grid-template-columns: 1fr; }
        }
        /* Editor de texto enriquecido (perfil profesional) */
        .cv-rte-toolbar {
            display: flex;
            gap: 3px;
            padding: 0 0 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .cv-rte-btn {
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 5px;
            padding: 3px 9px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            color: #475569;
            transition: background 0.12s, border-color 0.12s;
            line-height: 1.4;
            font-family: inherit;
        }
        .cv-rte-btn:hover { background: #e2e8f0; border-color: #cbd5e1; }
        .cv-rte-sep { width: 1px; height: 18px; background: #e2e8f0; margin: 0 3px; display: inline-block; }
        .cv-rte-editor {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 10px 12px;
            min-height: 130px;
            font-size: 0.88rem;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            line-height: 1.7;
            cursor: text;
            transition: border-color 0.15s, background 0.15s;
        }
        .cv-rte-editor:focus { border-color: #94a3b8; background: #fff; }
        .cv-rte-editor:empty::before {
            content: attr(data-placeholder);
            color: #94a3b8;
            font-style: italic;
            pointer-events: none;
        }
        /* Experiencia Laboral */
        .cv-exp-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .cv-exp-entry { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #fff; }
        .cv-exp-entry-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
        .cv-exp-entry-label { font-weight: 700; font-size: 0.82rem; color: #475569; }
        .cv-exp-del-btn { border: none; background: none; cursor: pointer; color: #94a3b8; font-size: 1rem; padding: 0 4px; transition: color 0.15s; line-height: 1; }
        .cv-exp-del-btn:hover { color: #ef4444; }
        .cv-exp-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }
        .cv-exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
        .cv-date-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .cv-date-row select { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px; font-size: 0.85rem; color: #1e293b; background: #f8fafc; outline: none; font-family: inherit; }
        .cv-date-row input[type="number"] { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px; font-size: 0.85rem; color: #1e293b; background: #f8fafc; outline: none; font-family: inherit; width: 78px; }
        .cv-date-row select:focus, .cv-date-row input:focus { border-color: #94a3b8; background: #fff; }
        .cv-actual-label { font-size: 0.8rem; color: #475569; display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap; }
        .cv-exp-logros { min-height: 80px; }
        .cv-exp-add-btn { border: 2px dashed #cbd5e1; border-radius: 8px; background: transparent; color: #64748b; font-size: 0.86rem; font-weight: 600; padding: 8px 0; cursor: pointer; width: 100%; transition: border-color 0.15s, color 0.15s; font-family: inherit; }
        .cv-exp-add-btn:hover { border-color: #94a3b8; color: #334155; }
        @media (max-width: 620px) { .cv-exp-grid { grid-template-columns: 1fr; } }
        /* Habilidades - skills tags */
        .cv-skills-section { margin-bottom: 14px; }
        .cv-skills-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .cv-skills-section-title span { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
        .cv-skills-hard-dot { background: #3b82f6; }
        .cv-skills-soft-dot { background: #10b981; }
        .cv-skills-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 32px; margin-bottom: 8px; }
        .cv-skill-tag { display: inline-flex; align-items: center; gap: 5px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; padding: 3px 10px 3px 12px; font-size: 0.8rem; color: #1e293b; font-weight: 500; }
        .cv-skill-tag .cv-skill-level { font-size: 0.7rem; color: #64748b; font-weight: 400; }
        .cv-skill-tag .cv-skill-del { border: none; background: none; cursor: pointer; color: #94a3b8; font-size: 0.72rem; padding: 0; line-height: 1; margin-left: 2px; transition: color 0.12s; }
        .cv-skill-tag .cv-skill-del:hover { color: #ef4444; }
        .cv-skill-input-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .cv-skill-input-row input { flex: 1; min-width: 120px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; color: #1e293b; background: #f8fafc; outline: none; font-family: inherit; }
        .cv-skill-input-row input:focus { border-color: #94a3b8; background: #fff; }
        .cv-skill-input-row select { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px; font-size: 0.85rem; color: #1e293b; background: #f8fafc; outline: none; font-family: inherit; }
        .cv-skill-input-row select:focus { border-color: #94a3b8; background: #fff; }
        .cv-skill-add-btn { border: none; border-radius: 6px; background: #e2e8f0; color: #334155; font-size: 0.82rem; font-weight: 700; padding: 6px 12px; cursor: pointer; white-space: nowrap; transition: background 0.12s; font-family: inherit; }
        .cv-skill-add-btn:hover { background: #cbd5e1; }
        /* Idiomas - lang tags */
        .cv-lang-tag { display: inline-flex; align-items: center; gap: 6px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; padding: 4px 10px 4px 12px; font-size: 0.82rem; color: #1e293b; font-weight: 500; }
        .cv-lang-badge { font-size: 0.68rem; font-weight: 700; border-radius: 10px; padding: 2px 7px; }
        .cv-lang-badge.cefr-a { background: #dbeafe; color: #1d4ed8; }
        .cv-lang-badge.cefr-b { background: #fef3c7; color: #92400e; }
        .cv-lang-badge.cefr-c { background: #dcfce7; color: #166534; }
        .cv-lang-badge.cefr-n { background: #f3e8ff; color: #6b21a8; }
        .cv-lang-tag .cv-lang-del { border: none; background: none; cursor: pointer; color: #94a3b8; font-size: 0.72rem; padding: 0; line-height: 1; margin-left: 2px; transition: color 0.12s; }
        .cv-lang-tag .cv-lang-del:hover { color: #ef4444; }
        /* Información Adicional */
        .cv-field textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 7px 10px; font-size: 0.88rem; color: #1e293b; background: #f8fafc; outline: none; resize: vertical; min-height: 72px; width: 100%; box-sizing: border-box; font-family: inherit; transition: border-color 0.15s, background 0.15s; }
        .cv-field textarea:focus { border-color: #94a3b8; background: #fff; }
        .cv-field select { border: 1px solid #e2e8f0; border-radius: 6px; padding: 7px 10px; font-size: 0.88rem; color: #1e293b; background: #f8fafc; outline: none; width: 100%; box-sizing: border-box; font-family: inherit; transition: border-color 0.15s, background 0.15s; }
        .cv-field select:focus { border-color: #94a3b8; background: #fff; }
        .cv-check-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 6px; background: #f8fafc; cursor: pointer; font-size: 0.88rem; color: #1e293b; font-family: inherit; }
        .cv-check-row input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #3b82f6; flex: 0 0 auto; }
        .cv-adicional-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
        .cv-adicional-full { grid-column: 1 / -1; }
        @media (max-width: 620px) { .cv-adicional-grid { grid-template-columns: 1fr; } .cv-adicional-full { grid-column: 1; } }
        .emp-kanban-board {
            display: grid;
            gap: 12px;
        }
        #empleados-module{
            --bg:#f6f8fb;
            --card:#ffffff;
            --border:#e7edf5;
            --text:#0f172a;
            --muted:#64748b;
            --shadow: 0 14px 32px rgba(15,23,42,.10);
            --radius:16px;
        }
        .oc-card{
            width: 320px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .oc-card:hover{
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(15,23,42,.14);
        }
        .oc-top{
            padding: 12px 14px;
            display:flex;
            justify-content:space-between;
            gap:10px;
            background: linear-gradient(180deg,#fff,#fbfdff);
        }
        .oc-name{
            font-weight: 700;
            font-size: 14px;
            letter-spacing: -.01em;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .oc-sub{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-top: 8px;
        }
        .oc-pill{
            font-size: 11px;
            color:#334155;
            background:#f8fafc;
            border:1px solid var(--border);
            border-radius:999px;
            padding: 6px 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .oc-score{
            font-weight: 800;
            font-size: 13px;
            background:#0f172a;
            color:#fff;
            border-radius:12px;
            padding: 8px 10px;
            height: fit-content;
            flex: 0 0 auto;
        }
        .oc-progress{
            height: 10px;
            background:#e2e8f0;
            border-top:1px solid var(--border);
            border-bottom:1px solid var(--border);
        }
        .oc-fill{ height:100%; width:0%; }
        .oc-bottom{
            padding: 12px 14px 14px;
            display:flex;
            justify-content:space-between;
            align-items:flex-end;

        .emp-kanban-status-dot {

            right: 14px;
            width: 16px;
            height: 16px;
            border-radius: 999px;

        }
        .emp-kanban-status-dot.activo { background: #22c55e; }
        .emp-kanban-status-dot.inactivo { background: #ef4444; }
        .emp-kanban-status-dot.pendiente { background: #f59e0b; }
        .emp-kanban-avatar {
            background: color-mix(in srgb, var(--sidebar-bottom, #0f172a) 78%, #34d399 22%);

            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 3rem;
            font-weight: 700;

            width: 100%;
            height: 100%;

            margin: 0;

            margin: 0;
            font-size: 0.96rem;
            line-height: 1.3;
            color: #46505a;
            font-weight: 500;

        .emp-kanban-email {
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #46505a;
            font-size: 0.9rem;
            font-weight: 500;

        .emp-kanban-email a {
            color: inherit;
            text-decoration: none;
        }
        .emp-kanban-email a:hover {
            text-decoration: underline;

        .emp-kanban-mail-icon {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            background: #2f3f4e;

            flex: 0 0 auto;

            height: 42px;
            border-radius: 10px;

            font-size: 1.4rem;
            font-weight: 700;

        .emp-kanban-action.clock {
            width: 32px;
            height: 32px;
            border-radius: 999px;

            align-items: center;
            justify-content: center;

        @media (max-width: 1200px) {
            .emp-kanban-card {
                grid-template-columns: 130px minmax(0, 1fr);

            .emp-kanban-name { font-size: 1.02rem; }

            .emp-kanban-email { font-size: 0.84rem; }

            .emp-kanban-card {
                grid-template-columns: 1fr;
            }
            .emp-kanban-avatar {
                min-height: 120px;
                font-size: 3rem;
            }
            .emp-kanban-name {
                font-size: 1.38rem;
                max-width: 100%;
            }
            .emp-kanban-puesto {
                font-size: 1.06rem;
            }
            .emp-kanban-email {
                font-size: 0.95rem;
            }
            .emp-kanban-mail-icon {
                width: 30px;
                height: 30px;
                font-size: 1rem;

    </style>
</head>
<body>
    <section id="empleados-module">
        <!-- Botones de vista eliminados para evitar duplicación -->
        
        <article class="emp-card">

    </section>

    <script>
    (function() {
        // Obtener elementos
        var tbody = document.getElementById('empleados-tbody');
        var viewButtons = document.querySelectorAll('.view-pill[data-view]');
        var empCard = document.querySelector('.emp-card');
        
        if (!tbody || !viewButtons.length || !empCard) return;
        
        var empleadosData = [];
        var orgChartInstance = null;
        var orgLibPromise = null;
        var viewerCanViewAll = false;
        var viewerCanManageAccess = false;
        var viewerAssignableRoles = [];
        var currentAccessState = { rol: 'usuario', menu_blocks: [], poa_access_level: 'mis_tareas', app_access: [], web_roles: [] };
        var lastSelectedColabId = 0;
        var currentCvContacto = {};
        var currentCvPerfil = '';
        var currentCvExperiencia = [];
        var currentCvEducacion = [];
        var currentCvHabilidades = { tecnicas: [], blandas: [] };
        var currentCvIdiomas = [];
        var currentCvFormacion = [];
        var currentCvLogros = [];
        var currentCvPublicaciones = [];
        var currentCvVoluntariado = [];
        var currentCvInfoAdicional = {};
        var currentIdentidadMision = '';
        var currentIdentidadVision = '';
        var _cvExpCounter = 0;
        var _cvEduCounter = 0;
        var _cvFormaCounter = 0;
        var _cvLogrosCounter = 0;
        var _cvPubCounter = 0;
        var _cvVolCounter = 0;
        
        // Función para escapar caracteres HTML
        function esc(v) {
            if (v === null || v === undefined) return '';
            return String(v)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        function initialsFrom(name) {
            var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
            if (!parts.length) return 'U';
            if (parts.length === 1) return parts[0].slice(0, 1).toUpperCase();
            return (parts[0].slice(0, 1) + parts[1].slice(0, 1)).toUpperCase();
        }
        function estadoClassName(estado) {
            var key = String(estado || 'pendiente').trim().toLowerCase();
            if (key === 'activo') return 'activo';
            if (key === 'inactivo') return 'inactivo';
            return 'pendiente';
        }
        function renderJefeOptions(selectEl, selectedId, currentId) {
            if (!selectEl) return;
            var options = ['<option value="">Sin jefe inmediato</option>'];
            for (var i = 0; i < empleadosData.length; i++) {
                var emp = empleadosData[i] || {};
                var id = emp.id;
                if (!id) continue;
                if (currentId && Number(id) === Number(currentId)) continue;
                var selected = (selectedId && Number(id) === Number(selectedId)) ? ' selected' : '';
                options.push('<option value="' + esc(id) + '"' + selected + '>' + esc(emp.nombre || emp.usuario || ('#' + id)) + '</option>');
            }
            selectEl.innerHTML = options.join('');
        }
        function detectMenuBlocks() {
            var nodes = document.querySelectorAll('.sidebar-menu > details > summary .sidebar-item-label, .sidebar-menu > .sidebar-link .sidebar-item-label');
            var labels = [];
            for (var i = 0; i < nodes.length; i++) {
                var txt = (nodes[i].textContent || '').trim();
                if (txt && labels.indexOf(txt) === -1) labels.push(txt);
            }
            return labels;
        }
        function labelFromRole(role) {
            var normalized = String(role || '').trim().toLowerCase();
            if (normalized === 'superadministrador') return 'Superadministrador';
            if (normalized === 'administrador') return 'Administrador';
            if (normalized === 'autoridades') return 'Autoridades';
            if (normalized === 'departamento') return 'Departamento';
            return 'Usuario';
        }
        function _expMonthOptions(sel) {
            var months = [null,'Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            var h = '<option value="">Mes</option>';
            for (var mi = 1; mi <= 12; mi++) {
                h += '<option value="' + mi + '"' + (String(sel) === String(mi) ? ' selected' : '') + '>' + months[mi] + '</option>';
            }
            return h;
        }
        function _renderSkillTag(nombre, nivel, type, listEl) {
            var tag = document.createElement('span');
            tag.className = 'cv-skill-tag';
            tag.innerHTML = esc(nombre) + (nivel ? ' <span class="cv-skill-level">(' + esc(nivel) + ')</span>' : '') + '<button type="button" class="cv-skill-del" title="Eliminar">&#x2715;</button>';
            tag.querySelector('.cv-skill-del').addEventListener('click', function() { tag.remove(); });
            tag.dataset.nombre = nombre;
            tag.dataset.nivel  = nivel;
            tag.dataset.type   = type;
            listEl.appendChild(tag);
        }
        function _initCvHabilidades() {
            ['hard','soft'].forEach(function(type) {
                var listEl  = document.getElementById('cv-skills-' + type + '-list');
                var nameIn  = document.getElementById('cv-skills-' + type + '-name');
                var levelIn = document.getElementById('cv-skills-' + type + '-level');
                var addBtn  = document.getElementById('cv-skills-' + type + '-add');
                if (!listEl || !addBtn) return;
                var arr = type === 'hard' ? (currentCvHabilidades.tecnicas || []) : (currentCvHabilidades.blandas || []);
                for (var si = 0; si < arr.length; si++) {
                    _renderSkillTag(arr[si].nombre || '', arr[si].nivel || '', type, listEl);
                }
                addBtn.addEventListener('click', function() {
                    var nm = (nameIn.value || '').trim();
                    if (!nm) { nameIn.focus(); return; }
                    _renderSkillTag(nm, levelIn.value, type, listEl);
                    nameIn.value = '';
                    levelIn.value = '';
                    nameIn.focus();
                });
                nameIn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
                });
            });
        }
        function _getCvHabilidadesData() {
            var result = { tecnicas: [], blandas: [] };
            ['hard','soft'].forEach(function(type) {
                var listEl = document.getElementById('cv-skills-' + type + '-list');
                if (!listEl) return;
                listEl.querySelectorAll('.cv-skill-tag').forEach(function(tag) {
                    var key = type === 'hard' ? 'tecnicas' : 'blandas';
                    result[key].push({ nombre: tag.dataset.nombre || '', nivel: tag.dataset.nivel || '' });
                });
            });
            return result;
        }
        function _cefrClass(nivel) {
            var n = String(nivel || '').toUpperCase();
            if (n.indexOf('NATIVO') !== -1 || n.indexOf('BILING') !== -1) return 'cefr-n';
            if (n.charAt(0) === 'C') return 'cefr-c';
            if (n.charAt(0) === 'B') return 'cefr-b';
            return 'cefr-a';
        }
        function _renderLangTag(nombre, nivel, listEl) {
            var tag = document.createElement('span');
            tag.className = 'cv-lang-tag';
            var badge = nivel ? '<span class="cv-lang-badge ' + _cefrClass(nivel) + '">' + esc(nivel) + '</span>' : '';
            tag.innerHTML = esc(nombre) + badge + '<button type="button" class="cv-lang-del" title="Eliminar">&#x2715;</button>';
            tag.querySelector('.cv-lang-del').addEventListener('click', function() { tag.remove(); });
            tag.dataset.nombre = nombre;
            tag.dataset.nivel  = nivel || '';
            listEl.appendChild(tag);
        }
        function _initCvIdiomas() {
            var listEl  = document.getElementById('cv-lang-list');
            var nameIn  = document.getElementById('cv-lang-name');
            var levelIn = document.getElementById('cv-lang-level');
            var addBtn  = document.getElementById('cv-lang-add');
            if (!listEl || !addBtn) return;
            for (var li = 0; li < currentCvIdiomas.length; li++) {
                _renderLangTag(currentCvIdiomas[li].nombre || '', currentCvIdiomas[li].nivel || '', listEl);
            }
            addBtn.addEventListener('click', function() {
                var nm = (nameIn.value || '').trim();
                if (!nm) { nameIn.focus(); return; }
                _renderLangTag(nm, levelIn.value, listEl);
                nameIn.value = '';
                levelIn.selectedIndex = 0;
                nameIn.focus();
            });
            nameIn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
            });
        }
        function _getCvIdiomasData() {
            var result = [];
            var listEl = document.getElementById('cv-lang-list');
            if (!listEl) return result;
            listEl.querySelectorAll('.cv-lang-tag').forEach(function(tag) {
                result.push({ nombre: tag.dataset.nombre || '', nivel: tag.dataset.nivel || '' });
            });
            return result;
        }
        function _addCvFormaEntry(d, container) {
            if (!container) return;
            _cvFormaCounter++;
            var idx = _cvFormaCounter;
            var data = d || {};
            var el = document.createElement('div');
            el.className = 'cv-exp-entry';
            el.innerHTML =
                '<div class="cv-exp-entry-header">' +
                '<span class="cv-exp-entry-label">Curso / Certificaci\u00f3n #' + idx + '</span>' +
                '<button type="button" class="cv-exp-del-btn" title="Eliminar">&#x2715;</button>' +
                '</div>' +
                '<div class="cv-exp-body">' +
                '<div class="cv-exp-grid">' +
                '<div class="cv-field"><label>Nombre del curso / certificaci\u00f3n</label><input class="cv-forma-nombre" type="text" placeholder="Ej. Certificaci\u00f3n PMP, Curso de Python..." value="' + esc(data.nombre||'') + '" autocomplete="off"></div>' +
                '<div class="cv-field"><label>Entidad / Institución que lo imparti\u00f3</label><input class="cv-forma-entidad" type="text" placeholder="Ej. Coursera, PMI, UNAM..." value="' + esc(data.entidad||'') + '" autocomplete="off"></div>' +
                '</div>' +
                '<div class="cv-exp-grid">' +
                '<div class="cv-field"><label>Fecha de obtenci\u00f3n</label><div class="cv-date-row"><select class="cv-forma-mes">' + _expMonthOptions(data.mes||'') + '</select><input class="cv-forma-anio" type="number" placeholder="A\u00f1o" min="1950" max="2099" value="' + esc(data.anio||'') + '"></div></div>' +
                '<div class="cv-field"><label>Descripci\u00f3n breve <span style="font-weight:400;color:#94a3b8">(opcional)</span></label><input class="cv-forma-desc" type="text" placeholder="Tema principal, horas, modalidad..." value="' + esc(data.descripcion||'') + '" autocomplete="off"></div>' +
                '</div>' +
                '</div>';
            el.querySelector('.cv-exp-del-btn').addEventListener('click', function() { el.remove(); });
            container.appendChild(el);
        }
        function _getCvFormacionData() {
            var result = [];
            var container = document.getElementById('cv-forma-list');
            if (!container) return result;
            container.querySelectorAll('.cv-exp-entry').forEach(function(el) {
                result.push({
                    nombre:      (el.querySelector('.cv-forma-nombre')  ? el.querySelector('.cv-forma-nombre').value  : '').trim(),
                    entidad:     (el.querySelector('.cv-forma-entidad') ? el.querySelector('.cv-forma-entidad').value : '').trim(),
                    mes:         (el.querySelector('.cv-forma-mes')     ? el.querySelector('.cv-forma-mes').value     : '').trim(),
                    anio:        (el.querySelector('.cv-forma-anio')    ? el.querySelector('.cv-forma-anio').value    : '').trim(),
                    descripcion: (el.querySelector('.cv-forma-desc')    ? el.querySelector('.cv-forma-desc').value    : '').trim(),
                });
            });
            return result;
        }
        function _initCvFormacion() {
            _cvFormaCounter = 0;
            var container = document.getElementById('cv-forma-list');
            var addBtn    = document.getElementById('cv-forma-add');
            if (!container || !addBtn) return;
            for (var fi = 0; fi < currentCvFormacion.length; fi++) {
                _addCvFormaEntry(currentCvFormacion[fi], container);
            }
            addBtn.addEventListener('click', function() { _addCvFormaEntry({}, container); });
        }
        function _addCvLogroEntry(d, container) {
            if (!container) return;
            _cvLogrosCounter++;
            var idx = _cvLogrosCounter;
            var data = d || {};
            var el = document.createElement('div');
            el.className = 'cv-exp-entry';
            el.innerHTML =
                '<div class="cv-exp-entry-header">' +
                '<span class="cv-exp-entry-label">Logro / Reconocimiento #' + idx + '</span>' +
                '<button type="button" class="cv-exp-del-btn" title="Eliminar">&#x2715;</button>' +
                '</div>' +
                '<div class="cv-exp-body">' +
                '<div class="cv-exp-grid">' +
                '<div class="cv-field"><label>T\u00edtulo / Premio / Reconocimiento</label><input class="cv-logro-titulo" type="text" placeholder="Ej. Empleado del A\u00f1o, Premio de Innovaci\u00f3n..." value="' + esc(data.titulo||'') + '" autocomplete="off"></div>' +
                '<div class="cv-field"><label>Org. / Entidad que lo otorg\u00f3</label><input class="cv-logro-entidad" type="text" placeholder="Ej. Empresa XYZ, Asociaci\u00f3n ABC..." value="' + esc(data.entidad||'') + '" autocomplete="off"></div>' +
                '</div>' +
                '<div class="cv-exp-grid">' +
                '<div class="cv-field"><label>Fecha</label><div class="cv-date-row"><select class="cv-logro-mes">' + _expMonthOptions(data.mes||'') + '</select><input class="cv-logro-anio" type="number" placeholder="A\u00f1o" min="1950" max="2099" value="' + esc(data.anio||'') + '"></div></div>' +
                '<div class="cv-field"><label>Descripci\u00f3n <span style="font-weight:400;color:#94a3b8">(opcional)</span></label><input class="cv-logro-desc" type="text" placeholder="Breve descripci\u00f3n o contexto del logro..." value="' + esc(data.descripcion||'') + '" autocomplete="off"></div>' +
                '</div>' +
                '</div>';
            el.querySelector('.cv-exp-del-btn').addEventListener('click', function() { el.remove(); });
            container.appendChild(el);
        }
        function _getCvLogrosData() {
            var result = [];
            var container = document.getElementById('cv-logros-list');
            if (!container) return result;
            container.querySelectorAll('.cv-exp-entry').forEach(function(el) {
                result.push({
                    titulo:      (el.querySelector('.cv-logro-titulo')  ? el.querySelector('.cv-logro-titulo').value  : '').trim(),
                    entidad:     (el.querySelector('.cv-logro-entidad') ? el.querySelector('.cv-logro-entidad').value : '').trim(),
                    mes:         (el.querySelector('.cv-logro-mes')     ? el.querySelector('.cv-logro-mes').value     : '').trim(),
                    anio:        (el.querySelector('.cv-logro-anio')    ? el.querySelector('.cv-logro-anio').value    : '').trim(),
                    descripcion: (el.querySelector('.cv-logro-desc')    ? el.querySelector('.cv-logro-desc').value    : '').trim(),
                });
            });
            return result;
        }
        function _initCvLogros() {
            _cvLogrosCounter = 0;
            var container = document.getElementById('cv-logros-list');
            var addBtn    = document.getElementById('cv-logros-add');
            if (!container || !addBtn) return;
            for (var gi = 0; gi < currentCvLogros.length; gi++) {
                _addCvLogroEntry(currentCvLogros[gi], container);
            }
            addBtn.addEventListener('click', function() { _addCvLogroEntry({}, container); });
        }
        function _addCvPubEntry(d, container) {
            if (!container) return;
            _cvPubCounter++;
            var idx = _cvPubCounter;
            var data = d || {};
            var _tipoOpts = '<option value="">Tipo</option>' +

        function collaboratorProgress(data) {
            var n = Number(data && data.progress);

            if (estado === 'activo') return 90;

        function loadScript(src) {
            return new Promise(function(resolve, reject) {
                if (document.querySelector('script[src="' + src + '"]')) {
                    resolve();
                    return;
                }
                var script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.onload = function() { resolve(); };
                script.onerror = function() { reject(new Error('No se pudo cargar ' + src)); };
                document.head.appendChild(script);
            });
        }
        async function ensureOrgChartLibrary() {

                        await loadScript('https://cdn.jsdelivr.net/npm/d3-org-chart@3');

            }
            var result = await orgLibPromise;
            return result !== false && !!(window.d3 && window.d3.OrgChart);
        }
        function buildOrgNodes(rows) {
            var nodes = [];
            var byId = {};
            var idByKey = {};
            for (var i = 0; i < rows.length; i++) {
                var row = rows[i] || {};
                var id = Number(row.id || 0);
                if (!id) continue;
                byId[id] = row;
                var nameKey = normalizeText(row.nombre);
                var userKey = normalizeText(row.usuario);
                if (nameKey) idByKey[nameKey] = id;
                if (userKey) idByKey[userKey] = id;
            }
            for (var j = 0; j < rows.length; j++) {
                var r = rows[j] || {};
                var rowId = Number(r.id || 0);
                if (!rowId) continue;
                var parentId = Number(r.jefe_inmediato_id || 0);
                if (!parentId || !byId[parentId] || parentId === rowId) {
                    var bossKey = normalizeText(r.jefe);
                    parentId = bossKey ? Number(idByKey[bossKey] || 0) : 0;
                }
                if (parentId === rowId || !byId[parentId]) parentId = 0;
                nodes.push({
                    id: String(rowId),
                    parentId: parentId ? String(parentId) : null,
                    nombre: String(r.nombre || '').trim(),
                    usuario: String(r.usuario || '').trim(),
                    puesto: String(r.puesto || '').trim(),
                    departamento: String(r.departamento || '').trim(),
                    imagen: String(r.imagen || '').trim(),
                    estado: String(r.estado || 'Activo').trim()
                });
            }
            var roots = nodes.filter(function(node) { return !node.parentId; });
            if (roots.length > 1) {
                var virtualRootId = '__root__colaboradores__';
                for (var k = 0; k < roots.length; k++) {
                    roots[k].parentId = virtualRootId;
                }
                nodes.unshift({
                    id: virtualRootId,
                    parentId: null,
                    nombre: 'Colaboradores',
                    usuario: '',
                    puesto: '',
                    departamento: '',
                    imagen: '/templates/icon/usuario.png',
                    estado: 'Activo'
                });
            }
            return nodes;
        }

                        if (formMsg) formMsg.textContent = 'Foto cargada.';
                    } catch (err) {
                        if (formMsg) formMsg.textContent = (err && err.message) ? err.message : 'Error al subir foto.';
                    }
                });
            }
            if (passToggleBtn && passInput) {
                passToggleBtn.addEventListener('click', function() {
                    var showing = passInput.type !== 'text';
                    setPasswordToggleState(showing);
                });
                setPasswordToggleState(false);
            }
            if (form) {
                form.onsubmit = async function(e) {
                    e.preventDefault();
                    _captureCvDataFromDom();
                    var rawId = (document.getElementById('colab-id')?.value || '').trim();
                    // Fallback: if the hidden ID was wiped by a form re-render, recover from the
                    // module-level lastSelectedColabId so edits are never treated as creates.
                    if (!rawId && lastSelectedColabId) rawId = String(lastSelectedColabId);
                    var payload = {
                        id: rawId,
                        nombre: (document.getElementById('colab-nombre')?.value || '').trim(),
                        puesto: (document.getElementById('colab-puesto')?.value || '').trim(),
                        eficiencia: (document.getElementById('colab-eficiencia')?.value || '').trim(),
                        celular: (document.getElementById('colab-celular')?.value || '').trim(),
                        usuario: (document.getElementById('colab-usuario')?.value || '').trim(),
                        correo: (document.getElementById('colab-correo')?.value || '').trim(),
                        contrasena: (document.getElementById('colab-contrasena')?.value || ''),
                        departamento: (document.getElementById('departamento-select')?.value || '').trim(),
                        jefe_inmediato_id: (document.getElementById('colab-jefe-inmediato')?.value || '').trim(),
                        nivel_organizacional: (document.getElementById('colab-nivel')?.value || '').trim(),
                        imagen: (document.getElementById('colab-imagen-url')?.value || '').trim(),
                        colaborador: !!document.getElementById('colab-colaborador-check')?.checked,
                        rol: (currentAccessState.rol || 'usuario'),
                        menu_blocks: Array.isArray(currentAccessState.menu_blocks) ? currentAccessState.menu_blocks : [],
                        poa_access_level: (currentAccessState.poa_access_level === 'todas_tareas' ? 'todas_tareas' : 'mis_tareas'),
                        app_access: Array.isArray(currentAccessState.app_access) ? currentAccessState.app_access : [],
                        web_roles: Array.isArray(currentAccessState.web_roles) ? currentAccessState.web_roles : [],
                        cv_contacto: currentCvContacto,
                        cv_perfil_profesional: currentCvPerfil,
                        cv_experiencia: currentCvExperiencia,
                        cv_educacion: currentCvEducacion,
                        cv_habilidades: currentCvHabilidades,
                        cv_idiomas: currentCvIdiomas,
                        cv_formacion: currentCvFormacion,
                        cv_logros: currentCvLogros,
                        cv_publicaciones: currentCvPublicaciones,
                        cv_voluntariado: currentCvVoluntariado,
                        cv_info_adicional: currentCvInfoAdicional,
                        identidad_mision: currentIdentidadMision,
                        identidad_vision: currentIdentidadVision
                    };
                    if (!payload.nombre || !payload.usuario) {
                        if (formMsg) formMsg.textContent = 'Nombre y usuario son obligatorios.';
                        return;
                    }
                    if (!payload.id && !payload.contrasena) {
                        if (formMsg) formMsg.textContent = 'La contraseña es obligatoria para crear colaborador.';
                        return;
                    }
                    if (payload.contrasena && payload.contrasena.length < 8) {
                        if (formMsg) formMsg.textContent = 'La contraseña debe tener al menos 8 caracteres.';
                        return;
                    }
                    if (formMsg) formMsg.textContent = 'Guardando...';
                    try {
                        var res = await fetch('/api/colaboradores', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        var json = await res.json().catch(function() { return {}; });

                        if ((res.status === 404 || res.status === 405)) {
                            // Fallback para entornos con endpoint legacy de usuarios.
                            res = await fetch('/api/usuarios/registro-seguro', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    nombre: payload.nombre,
                                    usuario: payload.usuario,
                                    correo: payload.correo,
                                    imagen: payload.imagen,
                                    rol: 'usuario',
                                    contrasena: payload.contrasena
                                })
                            });
                            json = await res.json().catch(function() { return {}; });
                        }

                        if (!res.ok || json?.success === false) {
                            throw new Error((json && (json.error || json.detail)) || 'No se pudo guardar');
                        }
                        if (formMsg) formMsg.textContent = (json && (json.message || json.detail)) ? (json.message || json.detail) : 'Guardado correctamente.';
                        await load();
                        setView('form');
                    } catch (err) {
                        if (formMsg) formMsg.textContent = (err && err.message) ? err.message : 'Error al guardar.';
                    }
                };
            }
        }
        
        // Renderizar vista kanban
        function renderKanban() {
            var kanbanHtml = '<h3 class="emp-head">Kanban de colaboradores</h3>';
            if (!empleadosData.length) {
                empCard.innerHTML = kanbanHtml + '<p class="emp-empty">Sin colaboradores.</p>';
                return;
            }
            kanbanHtml += '<div class="emp-kanban-board">';
            for (var i = 0; i < empleadosData.length; i++) {
                var u = empleadosData[i];
                var nombre = esc(u.nombre || 'Sin nombre');
                var puesto = esc(u.puesto || u.nivel_organizacional || 'Sin puesto');
                var correo = esc(u.correo || 'sin-correo@sipet.local');
                var estadoClass = estadoClassName(u.estado);
                var avatarUrl = String(u.imagen || '').trim();
                var avatarHtml = avatarUrl
                    ? '<img src="' + esc(avatarUrl) + '" alt="' + nombre + '" loading="lazy" onerror="this.parentElement.textContent=\'' + esc(initialsFrom(u.nombre)) + '\'">'
                    : esc(initialsFrom(u.nombre));
                kanbanHtml +=
                    '<article class="emp-kanban-card" data-colab-index="' + i + '">' +
                        '<span class="emp-kanban-status-dot ' + estadoClass + '" aria-hidden="true"></span>' +
                        '<div class="emp-kanban-avatar">' + avatarHtml + '</div>' +
                        '<div class="emp-kanban-body">' +
                            '<h4 class="emp-kanban-name">' + nombre + '</h4>' +
                            '<p class="emp-kanban-puesto">' + puesto + '</p>' +
                            '<div class="emp-kanban-email">' +
                                '<span class="emp-kanban-mail-icon" aria-hidden="true">✉</span>' +
                                '<a href="mailto:' + correo + '">' + correo + '</a>' +
                            '</div>' +
                            '<div class="emp-kanban-actions">' +
                                '<button type="button" class="emp-kanban-action main" data-action="edit" data-index="' + i + '" title="Editar colaborador">' + esc(initialsFrom(u.nombre).slice(0, 1)) + '</button>' +
                                '<button type="button" class="emp-kanban-action clock" data-action="history" data-index="' + i + '" title="Ver actividad">◷</button>' +
                            '</div>' +
                        '</div>' +
                    '</article>';
            }
            kanbanHtml += '</div>';
            empCard.innerHTML = kanbanHtml;
            empCard.querySelectorAll('.emp-kanban-action[data-action="edit"]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    openColaboradorFromKanban(btn.getAttribute('data-index'));
                });
            });
            empCard.querySelectorAll('.emp-kanban-action[data-action="history"]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var idx = Number(btn.getAttribute('data-index'));
                    var user = empleadosData[idx] || {};
                    alert('Actividad de ' + (user.nombre || 'colaborador') + ': funcionalidad en construcción.');
                });
            });
        }

        function renderOrganigrama() {
            empCard.innerHTML = '<h3 class="emp-head">Organigrama de colaboradores</h3><p class="emp-empty">Cargando...</p>';
            fetch('/api/colaboradores/organigrama')
                .then(function(r) { return r.json().then(function(j){ return { ok: r.ok, j: j }; }); })
                .then(async function(res) {
                    if (!res.ok || !res.j || res.j.success === false) throw new Error();
                    var rows = Array.isArray(res.j.data) ? res.j.data : [];
                    if (!rows.length) {
                        empCard.innerHTML = '<h3 class="emp-head">Organigrama de colaboradores</h3><p class="emp-empty">Sin colaboradores visibles.</p>';
                        return;
                    }
                    var available = await ensureOrgChartLibrary();
                    if (!available) {
                        empCard.innerHTML = '<h3 class="emp-head">Organigrama de colaboradores</h3><p class="emp-empty">No se pudo cargar la librería de organigrama.</p>';
                        return;
                    }
                    var nodes = buildOrgNodes(rows);
                    if (!nodes.length) {
                        empCard.innerHTML = '<h3 class="emp-head">Organigrama de colaboradores</h3><p class="emp-empty">Sin colaboradores visibles.</p>';
                        return;
                    }
                    empCard.innerHTML =
                        '<h3 class="emp-head">Organigrama de colaboradores</h3>' +
                        '<div class="emp-org-toolbar">' +
                            '<span class="emp-empty">Mismo formato visual de departamentos.</span>' +
                            '<div class="emp-org-zoom">' +
                                '<button type="button" data-org-zoom="expand" title="Expandir todo">▾▾</button>' +
                                '<button type="button" data-org-zoom="collapse" title="Contraer todo">▸▸</button>' +
                                '<button type="button" data-org-zoom="out" title="Alejar">-</button>' +
                                '<button type="button" data-org-zoom="in" title="Acercar">+</button>' +
                                '<button type="button" class="emp-org-fit" data-org-zoom="fit">Ajustar</button>' +
                            '</div>' +
                        '</div>' +
                        '<div id="emp-org-chart" class="emp-org-chart-wrap"></div>';
                    var chartEl = empCard.querySelector('#emp-org-chart');
                    orgChartInstance = new window.d3.OrgChart()
                        .container(chartEl)
                        .data(nodes)
                        .nodeWidth(function() { return 340; })
                        .nodeHeight(function() { return 160; })
                        .childrenMargin(function() { return 60; })
                        .compactMarginBetween(function() { return 25; })
                        .compactMarginPair(function() { return 80; })
                        .pagingStep(function() { return 999999; })
                        .minPagingVisibleNodes(function() { return 999999; })
                        .linkYOffset(18)
                        .setActiveNodeCentered(false)
                        .initialExpandLevel(99)
                        .compact(false)
                        .onNodeClick(function(d) {
                            var nodeId = String(d && d.data && d.data.id ? d.data.id : '').trim();
                            if (!nodeId || nodeId === '__root__colaboradores__') return;
                            openColaboradorFromId(nodeId);
                        })
                        .linkUpdate(function() {
                            window.d3.select(this)
                                .attr('stroke-width', 1.1)
                                .attr('stroke', 'rgba(15, 23, 42, 0.35)');
                        })
                        .nodeContent(function(d) {
                            var data = d && d.data ? d.data : {};
                            var name = esc(data.nombre || data.usuario || 'Área / Puesto');
                            var puesto = esc(data.puesto || data.nivel_organizacional || 'Colaborador');
                            var owner = data.jefe ? '<span class="oc-pill">👤 ' + esc(data.jefe) + '</span>' : '';
                            var typeRaw = normalizeText(data.nivel_organizacional || data.rol || '');
                            var typeBadge = typeRaw === 'direccion' ? '🧭 Dirección'
                                : typeRaw === 'jefatura' ? '🛡 Control'
                                : typeRaw === 'coordinacion' ? '⚙ Operación'
                                : typeRaw === 'staff' ? '🏷 Área'
                                : '🏷 Área';
                            var progress = collaboratorProgress(data);
                            var status = String(data.status || '').trim() || statusFromProgress(progress);
                            var kpi1 = '<div class="oc-kpi"><span>Departamento</span><strong>' + esc(data.departamento || 'Sin área') + '</strong></div>';
                            var kpi2 = '<div class="oc-kpi"><span>Usuario</span><strong>' + esc(data.usuario || '-') + '</strong></div>';
                            var grad = status === 'danger'
                                ? 'linear-gradient(90deg,#ef4444,#fb7185)'
                                : status === 'warning'
                                    ? 'linear-gradient(90deg,#f59e0b,#fbbf24)'
                                    : 'linear-gradient(90deg,#16a34a,#22c55e)';
                            return '' +
                                '<div class="oc-card" data-status="' + esc(status) + '">' +
                                    '<div class="oc-top">' +
                                        '<div class="oc-title">' +
                                            '<div class="oc-name">' + name + '</div>' +
                                            '<div class="oc-sub">' +
                                                '<span class="oc-pill">' + typeBadge + '</span>' +
                                                owner +
                                            '</div>' +
                                        '</div>' +
                                        '<div class="oc-score">' + Math.round(progress) + '%</div>' +
                                    '</div>' +
                                    '<div class="oc-progress"><div class="oc-fill" style="width:' + progress + '%; background:' + grad + ';"></div></div>' +
                                    '<div class="oc-bottom">' +
                                        '<div class="oc-status">' + statusLabel(status) + '</div>' +
                                        '<div class="oc-kpis">' + kpi1 + kpi2 + '</div>' +
                                    '</div>' +
                                '</div>';
                        })
                        .render();
                    if (orgChartInstance && typeof orgChartInstance.expandAll === 'function') orgChartInstance.expandAll();
                    bindOrgToolbar(empCard.querySelector('.emp-org-toolbar'));
                    if (orgChartInstance && typeof orgChartInstance.fit === 'function') orgChartInstance.fit();
                })
                .catch(function() {
                    empCard.innerHTML = '<h3 class="emp-head">Organigrama de colaboradores</h3><p class="emp-empty">No se pudo cargar organigrama.</p>';
                });
        }
        
        // Cambiar vista
        function setView(view) {
            for (var i = 0; i < viewButtons.length; i++) {
                var btn = viewButtons[i];
                if (btn.getAttribute('data-view') === view) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            }
            
            if (view === 'list') {
                empCard.innerHTML = 
                    '<h3 class="emp-head">Colaboradores</h3>' +
                    '<div class="emp-table-wrap">' +
                        '<table class="emp-table">' +
                            '<thead>' +
                                '<tr>' +
                                    '<th>Nombre</th>' +
                                    '<th>Usuario</th>' +
                                    '<th>Correo</th>' +
                                    '<th>Rol</th>' +
                                    '<th>Departamento</th>' +
                                    '<th>Org</th>' +
                                    '<th>Estado</th>' +
                                    '<th>Acciones</th>' +
                                '</tr>' +
                            '</thead>' +
                            '<tbody id="empleados-tbody"></tbody>' +
                        '</table>' +
                    '</div>';
                tbody = document.getElementById('empleados-tbody');
                renderList(empleadosData);
            } else if (view === 'form') {
                renderForm();
            } else if (view === 'kanban') {
                renderKanban();
            } else if (view === 'organigrama') {
                renderOrganigrama();
            }
        }
        
        // Agregar event listeners a los botones de vista
        for (var i = 0; i < viewButtons.length; i++) {
            var btn = viewButtons[i];
            btn.onclick = (function(v) {
                return function() {
                    setView(v);
                };
            })(btn.getAttribute('data-view'));
        }
        
        // Funciones globales para los botones del formulario
        window.nuevoColaborador = function() {
            var form = document.getElementById('colaborador-form');
            var msg = document.getElementById('colaborador-form-msg');
            if (form) form.reset();
            var idInput = document.getElementById('colab-id');
            var foto = document.getElementById('colab-photo-preview');
            var fotoUrl = document.getElementById('colab-imagen-url');
            if (idInput) idInput.value = '';
            lastSelectedColabId = 0;
            var jefeInmediato = document.getElementById('colab-jefe-inmediato');
            if (jefeInmediato) renderJefeOptions(jefeInmediato, '', '');
            if (fotoUrl) fotoUrl.value = '';
            if (foto) foto.src = '/templates/icon/usuario.png';
            currentAccessState = { rol: 'usuario', menu_blocks: [], poa_access_level: 'mis_tareas', app_access: [], web_roles: [] };
            var panel = document.getElementById('colaborador-notebook-panel');
            var activeTab = document.querySelector('.emp-notebook-tab.active');
            renderNotebookPanel(activeTab ? activeTab.getAttribute('data-tab') : 'cv', panel);
            if (msg) msg.textContent = 'Formulario limpio.';
        };
        
        window.editarColaborador = function() {
            var idInput = document.getElementById('colab-id');
            var msg = document.getElementById('colaborador-form-msg');
            var currentId = Number((idInput && idInput.value) ? idInput.value : 0) || 0;
            if (currentId) {
                var nameInput = document.getElementById('colab-nombre');
                if (nameInput) nameInput.focus();
                if (msg) msg.textContent = 'Modo edición activo.';
                return;
            }
            if (lastSelectedColabId) {
                openColaboradorFromId(lastSelectedColabId);
                return;
            }
            if (empleadosData.length === 1) {
                openColaboradorFromId(empleadosData[0].id);
                return;
            }
            setView('list');
        };

        window.eliminarColaborador = async function() {
            var idInput = document.getElementById('colab-id');
            var msg = document.getElementById('colaborador-form-msg');
            var colabId = (idInput && idInput.value) ? String(idInput.value).trim() : '';
            if (!colabId) {
                if (msg) msg.textContent = 'Selecciona un colaborador para eliminar.';
                return;
            }
            if (!confirm('¿Eliminar este colaborador?')) return;
            if (msg) msg.textContent = 'Eliminando...';
            try {
                var res = await fetch('/api/colaboradores/' + encodeURIComponent(colabId), { method: 'DELETE' });
                var json = await res.json().catch(function() { return {}; });
                if (!res.ok || json?.success === false) {
                    throw new Error((json && (json.error || json.detail)) || 'No se pudo eliminar');
                }
                if (msg) msg.textContent = (json && (json.message || json.detail)) ? (json.message || json.detail) : 'Colaborador eliminado.';
                await load();
                setView('form');
                setTimeout(function() {
                    var form = document.getElementById('colaborador-form');
                    if (form) form.reset();
                    var photo = document.getElementById('colab-photo-preview');
                    if (photo) photo.src = '/templates/icon/usuario.png';
                    var idEl = document.getElementById('colab-id');
                    if (idEl) idEl.value = '';
                }, 80);
            } catch (err) {
                if (msg) msg.textContent = (err && err.message) ? err.message : 'Error al eliminar.';
            }
        };
        
        // Cargar datos
        async function load() {
            try {
                var res = await fetch('/api/colaboradores');
                var json = await res.json();
                if (!res.ok || json?.success === false) throw new Error();
                empleadosData = Array.isArray(json?.data) ? json.data : [];
                viewerCanViewAll = !!json?.can_view_all;
                viewerCanManageAccess = !!json?.can_manage_access;
                viewerAssignableRoles = Array.isArray(json?.assignable_roles) ? json.assignable_roles : [];
                setView('list');
            } catch (e) {
                empCard.innerHTML = '<p class="emp-empty">No se pudo cargar colaboradores.</p>';
            }
        }
        
        load();
    })();
    </script>
</body>
