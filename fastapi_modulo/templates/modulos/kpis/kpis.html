<section class="w-full">
  <div class="titulo bg-base-200 rounded-box border border-base-300 p-4 sm:p-6 mb-4">
    <div class="w-full flex flex-col md:flex-row items-center gap-10">
      <img
        src="/icon/kpi.svg"
        alt="Icono KPIs"
        width="96"
        height="96"
        class="shrink-0 rounded-box border border-base-300 bg-base-100 p-3 object-contain"
      />
      <div class="w-full grid gap-2 content-center">
        <div class="block w-full text-3xl sm:text-4xl lg:text-5xl font-bold leading-tight text-[color:var(--sidebar-bottom)]">KPIs</div>
        <div class="block w-full text-base sm:text-lg text-base-content/70">Gestión y seguimiento de indicadores clave de desempeño.</div>
      </div>
    </div>
  </div>
  <!-- ── KPI Tracking UI ────────────────────────────────────────────────── -->
  <article class="card border border-base-300 bg-base-100 shadow-sm">
    <header class="flex items-center justify-between gap-2 flex-wrap p-4 pb-2">
      <h2 class="text-lg font-semibold">Panel KPI</h2>
      <button id="btn-abrir-registro" class="btn btn-sm btn-primary" type="button">+ Registrar medición</button>
    </header>
    <div class="p-4 pt-2 space-y-4">

      <!-- ── Estado global de carga ──────────────────────────────────────── -->
      <div id="kpi-loading" class="flex items-center gap-2 text-base-content/50 text-sm py-4">
        <span class="loading loading-spinner loading-sm"></span> Cargando KPIs…
      </div>

      <!-- ── Tarjetas de estado ──────────────────────────────────────────── -->
      <div id="kpi-cards-grid" class="hidden grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mb-6">
        <!-- generado por JS -->
      </div>

      <!-- ── Historial del KPI seleccionado ─────────────────────────────── -->
      <div id="kpi-historial-section" class="hidden card border border-base-300 bg-base-100 shadow-sm">
        <header class="flex items-center justify-between gap-2 flex-wrap p-4 pb-2">
          <h3 class="text-base font-semibold" id="kpi-historial-titulo">Historial</h3>
          <button id="btn-cerrar-historial" class="btn btn-xs btn-ghost" type="button">✕ Cerrar</button>
        </header>
        <div class="p-4 pt-2">
          <div class="overflow-x-auto rounded-box border border-base-300 bg-base-100">
            <table class="table table-zebra w-full text-sm">
              <thead>
                <tr>
                  <th>Periodo</th>
                  <th class="text-right">Valor (%)</th>
                  <th>Notas</th>
                  <th>Registrado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="kpi-historial-tbody">
                <tr><td colspan="5" class="text-center text-base-content/40 py-4">Sin mediciones</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ── Modal registro de medición ────────────────────────────────── -->
      <div id="kpi-registro-modal" class="fixed inset-0 z-[2500] hidden items-center justify-center bg-base-content/45">
        <div class="card bg-base-100 shadow-xl w-full max-w-md mx-4">
          <div class="card-body gap-4">
            <h3 class="card-title text-base">Registrar medición</h3>
            <div class="form-control">
              <label class="label"><span class="label-text">Indicador</span></label>
              <select id="reg-kpi-id" class="select select-bordered select-sm w-full">
                <option value="">-- Selecciona un KPI --</option>
              </select>
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text">Valor (%)</span></label>
              <input id="reg-valor" type="number" step="0.01" class="input input-bordered input-sm w-full" placeholder="Ej: 7.5">
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text">Periodo</span></label>
              <input id="reg-periodo" type="text" class="input input-bordered input-sm w-full" placeholder="Ej: Enero 2025 / Q1-2025">
            </div>
            <div class="form-control">
              <label class="label"><span class="label-text">Notas <span class="text-base-content/40">(opcional)</span></span></label>
              <textarea id="reg-notas" class="textarea textarea-bordered textarea-sm w-full" rows="2" placeholder="Observaciones…"></textarea>
            </div>
            <div id="reg-error" class="text-error text-xs hidden"></div>
            <div class="flex gap-2 justify-end pt-2">
              <button id="btn-reg-cancelar" class="btn btn-sm btn-ghost" type="button">Cancelar</button>
              <button id="btn-reg-guardar" class="btn btn-sm btn-primary" type="button">Guardar</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Sugerencia IA (debajo de tarjetas, legacy) ────────────────── -->
      <div id="sugerencia-kpi-ia" class="mt-2"></div>
      <script>
      /* ── KPI Tracking – estado global ──────────────────────────────── */
      let _kpiDefs = [];
      const _kpiStatusIcon = { ok: '🟢', warning: '🟡', alert: '🔴', sin_meta: '⚪' };
      const _kpiStatusLabel = { ok: 'En meta', warning: 'Advertencia', alert: 'Fuera de meta', sin_meta: 'Sin medición' };
      const _kpiStatusClass = { ok: 'badge-success', warning: 'badge-warning', alert: 'badge-error', sin_meta: 'badge-ghost' };

      const _kpiEscHtml = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

      /* Convierte referencia "8%", "5-8%", "5%8%" → número display */
      const _kpiMetaDisplay = (referencia) => {
        if (!referencia) return '—';
        const s = referencia.trim();
        const range = s.match(/^([\d.]+)%?[-–]([\d.]+)%?$/);
        if (range) return `${range[1]}% – ${range[2]}%`;
        return s;
      };

      /* ── Render de tarjetas ─────────────────────────────────────────── */
      const _kpiRenderCards = (defs) => {
        const grid = document.getElementById('kpi-cards-grid');
        const loading = document.getElementById('kpi-loading');
        if (!grid) return;
        if (!defs.length) {
          if (loading) {
            loading.classList.remove('hidden');
            loading.innerHTML = '<span class="text-base-content/40 text-sm">No hay KPIs definidos.</span>';
          }
          return;
        }
        if (loading) loading.classList.add('hidden');
        grid.classList.remove('hidden');
        grid.innerHTML = defs.map((k) => {
          const st = k.status || 'sin_meta';
          const icon = _kpiStatusIcon[st] || '⚪';
          const badge = _kpiStatusClass[st] || 'badge-ghost';
          const label = _kpiStatusLabel[st] || st;
          const val = k.ultimo_valor != null ? `${Number(k.ultimo_valor).toFixed(1)}%` : '—';
          const meta = _kpiMetaDisplay(k.referencia);
          const fecha = k.ultima_fecha ? k.ultima_fecha.slice(0,10) : '—';
          let bar = '';
          if (k.ultimo_valor != null && k.referencia) {
            const ref = parseFloat(String(k.referencia).replace('%',''));
            if (!isNaN(ref) && ref > 0) {
              const pct = Math.min(100, Math.round((k.ultimo_valor / ref) * 100));
              const barColor = st === 'ok' ? 'bg-success' : st === 'warning' ? 'bg-warning' : 'bg-error';
              bar = `<progress class="progress ${barColor} w-full mt-2" value="${pct}" max="100"></progress>`;
            }
          }
          return `<div class="card bg-base-100 border border-base-300 shadow-sm hover:shadow-md transition-shadow cursor-pointer kpi-card" data-kpi-id="${k.id}" title="Ver historial">
            <div class="card-body p-4 gap-1">
              <div class="flex items-start justify-between gap-2">
                <p class="font-semibold text-sm leading-tight">${_kpiEscHtml(k.nombre)}</p>
                <span class="badge ${badge} badge-sm shrink-0">${icon} ${_kpiEscHtml(label)}</span>
              </div>
              <p class="text-xs text-base-content/50 truncate">${_kpiEscHtml(k.proposito || '')}</p>
              <div class="flex items-end justify-between gap-2 mt-2">
                <div>
                  <span class="text-2xl font-bold">${_kpiEscHtml(val)}</span>
                  <span class="text-xs text-base-content/40 ml-1">actual</span>
                </div>
                <div class="text-right">
                  <span class="text-xs text-base-content/40">meta</span><br>
                  <span class="text-sm font-medium">${_kpiEscHtml(meta)}</span>
                </div>
              </div>
              ${bar}
              <p class="text-xs text-base-content/40 mt-1">Última medición: ${_kpiEscHtml(fecha)}</p>
            </div>
          </div>`;
        }).join('');

        /* click → historial */
        grid.querySelectorAll('.kpi-card').forEach((card) => {
          card.addEventListener('click', () => _kpiLoadHistorial(Number(card.dataset.kpiId)));
        });
      };

      /* ── Historial ──────────────────────────────────────────────────── */
      const _kpiLoadHistorial = async (kpiId) => {
        const sec = document.getElementById('kpi-historial-section');
        const tbody = document.getElementById('kpi-historial-tbody');
        const titulo = document.getElementById('kpi-historial-titulo');
        const kpi = _kpiDefs.find((k) => k.id === kpiId);
        if (titulo) titulo.textContent = `Historial — ${kpi ? kpi.nombre : kpiId}`;
        if (sec) sec.classList.remove('hidden');
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="text-center text-base-content/40 py-4"><span class="loading loading-dots loading-xs"></span></td></tr>';
        try {
          const res = await fetch(`/api/kpis/mediciones?kpi_id=${kpiId}`, { credentials: 'same-origin' });
          const data = await res.json().catch(() => ({}));
          const rows = (data.items || []);
          if (!rows.length) {
            if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="text-center text-base-content/40 py-4">Sin mediciones registradas</td></tr>';
            return;
          }
          if (tbody) tbody.innerHTML = rows.map((r) => `
            <tr>
              <td>${_kpiEscHtml(r.periodo || '—')}</td>
              <td class="text-right font-mono">${_kpiEscHtml(r.valor != null ? Number(r.valor).toFixed(2) : '—')}</td>
              <td class="text-xs text-base-content/60">${_kpiEscHtml(r.notas || '')}</td>
              <td class="text-xs text-base-content/40">${_kpiEscHtml((r.created_at || '').slice(0,16).replace('T',' '))}</td>
              <td><button type="button" class="btn btn-xs btn-ghost text-error" data-del-id="${r.id}" title="Eliminar">✕</button></td>
            </tr>`).join('');
          /* delete handlers */
          (tbody || document).querySelectorAll('[data-del-id]').forEach((btn) => {
            btn.addEventListener('click', () => _kpiDeleteMedicion(Number(btn.dataset.delId), kpiId));
          });
        } catch (_) {
          if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="text-error text-sm py-4">Error al cargar historial</td></tr>';
        }
        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const _kpiDeleteMedicion = async (medicionId, kpiId) => {
        if (!confirm('¿Eliminar esta medición?')) return;
        try {
          await fetch(`/api/kpis/medicion/${medicionId}`, { method: 'DELETE', credentials: 'same-origin' });
          await _kpiLoadHistorial(kpiId);
          _kpiLoadDefs();
        } catch (_) {}
      };

      /* ── Cargar definiciones ────────────────────────────────────────── */
      const _kpiLoadDefs = async () => {
        const loading = document.getElementById('kpi-loading');
        const grid = document.getElementById('kpi-cards-grid');
        if (loading) loading.classList.remove('hidden');
        if (grid) grid.classList.add('hidden');
        try {
          const res = await fetch('/api/kpis/definiciones', { credentials: 'same-origin' });
          const data = await res.json().catch(() => ({}));
          _kpiDefs = data.items || [];
          /* populate select */
          const sel = document.getElementById('reg-kpi-id');
          if (sel) {
            sel.innerHTML = '<option value="">-- Selecciona un KPI --</option>' +
              _kpiDefs.map((k) => `<option value="${k.id}">${_kpiEscHtml(k.nombre)}</option>`).join('');
          }
          _kpiRenderCards(_kpiDefs);
        } catch (_) {
          if (loading) {
            loading.classList.remove('hidden');
            loading.innerHTML = '<span class="text-error text-sm">Error al cargar KPIs</span>';
          }
        }
      };

      /* ── Modal registro ─────────────────────────────────────────────── */
      const _kpiOpenModal = (kpiId = null) => {
        const modal = document.getElementById('kpi-registro-modal');
        const errEl = document.getElementById('reg-error');
        if (errEl) errEl.classList.add('hidden');
        if (kpiId) {
          const sel = document.getElementById('reg-kpi-id');
          if (sel) sel.value = String(kpiId);
        }
        if (modal) {
          modal.classList.remove('hidden');
          modal.classList.add('flex');
        }
      };
      const _kpiCloseModal = () => {
        const modal = document.getElementById('kpi-registro-modal');
        if (modal) {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
        }
      };

      document.getElementById('btn-abrir-registro')?.addEventListener('click', () => _kpiOpenModal());
      document.getElementById('btn-reg-cancelar')?.addEventListener('click', _kpiCloseModal);
      document.getElementById('kpi-registro-modal')?.addEventListener('click', (e) => {
        if (e.target === e.currentTarget) _kpiCloseModal();
      });
      document.getElementById('btn-cerrar-historial')?.addEventListener('click', () => {
        const sec = document.getElementById('kpi-historial-section');
        if (sec) sec.classList.add('hidden');
      });

      document.getElementById('btn-reg-guardar')?.addEventListener('click', async () => {
        const kpiId = document.getElementById('reg-kpi-id')?.value;
        const valor = document.getElementById('reg-valor')?.value;
        const periodo = document.getElementById('reg-periodo')?.value?.trim();
        const notas = document.getElementById('reg-notas')?.value?.trim();
        const errEl = document.getElementById('reg-error');
        if (!kpiId) { if (errEl) { errEl.textContent = 'Selecciona un indicador'; errEl.classList.remove('hidden'); } return; }
        if (valor === '' || isNaN(Number(valor))) { if (errEl) { errEl.textContent = 'Ingresa un valor numérico'; errEl.classList.remove('hidden'); } return; }
        if (!periodo) { if (errEl) { errEl.textContent = 'Ingresa el periodo'; errEl.classList.remove('hidden'); } return; }
        if (errEl) errEl.classList.add('hidden');
        const btn = document.getElementById('btn-reg-guardar');
        if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
        try {
          const res = await fetch('/api/kpis/medicion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ kpi_id: Number(kpiId), valor: Number(valor), periodo, notas: notas || null }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data.success === false) throw new Error(data.error || 'Error al guardar');
          _kpiCloseModal();
          document.getElementById('reg-valor').value = '';
          document.getElementById('reg-periodo').value = '';
          document.getElementById('reg-notas').value = '';
          await _kpiLoadDefs();
          _kpiLoadHistorial(Number(kpiId));
        } catch (err) {
          if (errEl) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
        } finally {
          if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
        }
      });

      /* ── IA editor (preservado) ─────────────────────────────────────── */
      const openKpiIaEditor = ({ title = 'Sugerencia IA', suggestion = '' } = {}) => new Promise((resolve) => {
        let overlay = document.getElementById('kpi-ia-overlay');
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.id = 'kpi-ia-overlay';
          overlay.className = 'fixed inset-0 z-[2600] hidden items-center justify-center bg-base-content/40';
          overlay.innerHTML = `
            <div class="w-[min(760px,92vw)] max-h-[86vh] overflow-auto card bg-base-100 border border-base-300 shadow-2xl">
              <div class="card-body gap-3">
                <div class="flex items-center justify-between gap-2">
                  <h4 id="kpi-ia-title" class="m-0 text-lg font-semibold text-base-content">Sugerencia IA</h4>
                  <button type="button" id="kpi-ia-close" class="btn btn-sm btn-outline">Cerrar</button>
                </div>
                <p class="m-0 text-sm text-base-content/60">Edita el texto antes de aplicarlo.</p>
                <textarea id="kpi-ia-text" class="textarea textarea-bordered w-full min-h-[220px]"></textarea>
                <div class="mt-1 flex gap-2 justify-end">
                  <button type="button" id="kpi-ia-discard" class="btn btn-sm btn-outline btn-error">Descartar</button>
                  <button type="button" id="kpi-ia-apply" class="btn btn-sm btn-primary">Aplicar</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
        }
        const titleEl = document.getElementById('kpi-ia-title');
        const textEl = document.getElementById('kpi-ia-text');
        const closeEl = document.getElementById('kpi-ia-close');
        const discardEl = document.getElementById('kpi-ia-discard');
        const applyEl = document.getElementById('kpi-ia-apply');
        if (titleEl) titleEl.textContent = title;
        if (textEl) textEl.value = String(suggestion || '');
        const finish = (result) => {
          overlay.classList.add('hidden');
          overlay.classList.remove('flex');
          document.body.style.overflow = '';
          resolve(result);
        };
        if (closeEl) closeEl.onclick = () => finish({ action: 'close', text: textEl ? textEl.value : '' });
        if (discardEl) discardEl.onclick = () => finish({ action: 'discard', text: textEl ? textEl.value : '' });
        if (applyEl) applyEl.onclick = () => finish({ action: 'apply', text: textEl ? textEl.value : '' });
        overlay.onclick = (e) => { if (e.target === overlay) finish({ action: 'close', text: textEl ? textEl.value : '' }); };
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');
        document.body.style.overflow = 'hidden';
        if (textEl) textEl.focus();
      });

      const isIaEnabledForKpi = async () => {
        try {
          const res = await fetch('/api/ia/flags?module=kpis&feature_key=suggest_objective_text', { headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' });
          const data = await res.json().catch(() => ({}));
          return !!(res.ok && data?.success === true && data?.data?.enabled);
        } catch (_) { return false; }
      };

      /* ── Init ───────────────────────────────────────────────────────── */
      _kpiLoadDefs();
      </script>
    </div>
  </article>
</section>
