<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ app_favicon_url | default('/templates/icon/icon.png') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ app_favicon_url | default('/templates/icon/icon.png') }}">
    <link rel="stylesheet" href="/static/dist/output.css?v={{ asset_version | default('dev', true) }}">
    <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        height: 100%; width: 100%;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, sans-serif;
    }

    /* ── Two-column shell ───────────────────────────────────── */
    body {
        display: flex;
        min-height: 100dvh;
        background: var(--color-MAIN-100);
        color: var(--color-MAIN-content);
    }

    /* ── Left panel — logo + company name ───────────────────── */
    .logo-left {
        width: 320px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 48px 36px;
        background: var(--color-neutral);
        color: var(--color-neutral-content);
        position: relative;
    }
    .logo-left::after {
        content: '';
        position: absolute;
        inset-y: 10%;
        right: 0;
        width: 2px;
        background: linear-gradient(
            to bottom,
            transparent,
            var(--color-MAIN-300) 30%,
            var(--color-MAIN-300) 70%,
            transparent
        );
        opacity: .35;
    }
    .logo-left img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        border-radius: 16px;
        background: rgba(255,255,255,.08);
        padding: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .company-name {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
        color: var(--color-neutral-content);
        opacity: .85;
        text-align: center;
    }

    /* ── Right panel — main content ─────────────────────────── */
    .right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 48px 40px;
        text-align: center;
    }
    .brand {
        font-size: .8rem;
        font-weight: 800;
        letter-spacing: .2em;
        text-transform: uppercase;
        color: var(--color-primary);
        padding: 4px 14px;
        border: 1.5px solid var(--color-primary);
        border-radius: 999px;
        display: inline-block;
    }
    .title {
        font-size: clamp(1.5rem, 3vw, 2.4rem);
        font-weight: 800;
        line-height: 1.2;
        color: var(--color-MAIN-content);
        max-width: 520px;
    }
    .actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: .95rem;
        font-weight: 700;
        text-decoration: none;
        border: 2px solid transparent;
        cursor: pointer;
        transition: background .18s, border-color .18s, transform .1s;
        white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
        background: var(--color-primary);
        color: var(--color-primary-content);
        border-color: var(--color-primary);
    }
    .btn-primary:hover {
        background: color-mix(in oklch, var(--color-primary) 83%, black);
        border-color: color-mix(in oklch, var(--color-primary) 83%, black);
    }
    .btn-secondary {
        background: transparent;
        color: var(--color-MAIN-content);
        border-color: var(--color-MAIN-300);
    }
    .btn-secondary:hover {
        background: var(--color-MAIN-200);
        border-color: var(--color-MAIN-content);
    }

    /* ── Footer credit ───────────────────────────────────────── */
    .footer-credit {
        position: fixed;
        bottom: 18px;
        right: 24px;
        font-size: .72rem;
        color: var(--color-MAIN-content);
        opacity: .35;
        letter-spacing: .04em;
    }

    /* ── Mobile: stack vertically ────────────────────────────── */
    @media (max-width: 640px) {
        body { flex-direction: column; overflow: auto; }
        .logo-left {
            width: 100%;
            flex-direction: row;
            padding: 20px 24px;
            gap: 14px;
        }
        .logo-left::after { display: none; }
        .logo-left img { width: 52px; height: 52px; padding: 6px; }
        .company-name { font-size: .9rem; }
        .right-panel { padding: 36px 24px; gap: 22px; }
        .footer-credit { position: static; text-align: center; padding: 16px 0 20px; }
    }
    </style>
</head>
<body class="{% if menu_position == 'abajo' %}sipet-menu-bottom{% endif %}">
    {% if menu_position == 'abajo' %}
    <style>
        body.sipet-menu-bottom { padding-bottom: 76px; }
        .sipet-mobile-bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; display: flex; z-index: 2000;
            background: #fff; border-top: 1px solid #e2e8f0; box-shadow: 0 -4px 16px rgba(0,0,0,.08);
        }
        .sipet-mobile-bottom-nav a {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; padding: 10px 4px; text-decoration: none; color: #94a3b8;
        }
        .sipet-mobile-bottom-nav a.is-active { color: #3b82f6; }
        .sipet-mobile-bottom-nav__icon { font-size: 1.3rem; line-height: 1; }
        .sipet-mobile-bottom-nav__label { font-size: .65rem; font-weight: 600; line-height: 1.1; }
    }
    @media (min-width: 901px) {
        body.sipet-menu-bottom { padding-bottom: 96px; }
        .sipet-mobile-bottom-nav {
            left: 50%; right: auto; bottom: 20px; transform: translateX(-50%);
            width: min(680px, calc(100vw - 32px)); border: 1px solid #e2e8f0; border-radius: 18px;
            box-shadow: 0 20px 50px rgba(15,23,42,.18);
        }
        .sipet-mobile-bottom-nav a { padding: 12px 8px; }
    }
    </style>
    {% endif %}
    <div class="logo-left">
        <img
            src="{{ company_logo_url | default(app_favicon_url | default('/templates/icon/icon.png')) }}"
            alt="Logo de la empresa"
        >
        <p class="company-name">{{ login_company_short_name | default('AVAN') }}</p>
    </div>
    <section class="right-panel" aria-label="Acciones principales">
        <p class="brand">SIPET</p>
        <h1 class="title">Sistema de Plan Estratégico y Táctico</h1>
        <div class="actions">
            <a class="btn btn-primary" href="/backend/login">Ingresar</a>
            <a class="btn btn-secondary" href="/backend/descripcion">Conocer más</a>
        </div>
    </section>
    <p class="footer-credit">Desarrollado por AVANCOOP</p>
    {% if menu_position == 'abajo' %}
    <nav class="sipet-mobile-bottom-nav" aria-label="Menú móvil inferior">
      <a href="/backend/inicio" class="is-active"><span class="sipet-mobile-bottom-nav__icon">🏠</span><span class="sipet-mobile-bottom-nav__label">Inicio</span></a>
      <a href="/backend/funcionalidades"><span class="sipet-mobile-bottom-nav__icon">💳</span><span class="sipet-mobile-bottom-nav__label">Servicios</span></a>
      <a href="/backend/descripcion"><span class="sipet-mobile-bottom-nav__icon">🔍</span><span class="sipet-mobile-bottom-nav__label">Buscar</span></a>
      <a href="/backend/login"><span class="sipet-mobile-bottom-nav__icon">👤</span><span class="sipet-mobile-bottom-nav__label">Perfil</span></a>
    </nav>
    {% endif %}

    <!-- ── Admin bar (superadmin / editor / designer only) ── -->
    <div id="sipet-admin-bar" style="display:none;position:fixed;top:0;left:0;right:0;height:44px;background:#0f172a;color:#e2e8f0;z-index:99999;display:none;align-items:center;gap:0;font-family:system-ui,sans-serif;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.35);">
      <a id="sab-home" href="/avan/inicio" title="Ir al panel" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;color:#94a3b8;text-decoration:none;font-size:20px;transition:background .15s;flex-shrink:0;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background='transparent'">&#9776;</a>
      <span style="flex:1;padding:0 10px;font-size:12px;font-weight:600;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">SIPET &rsaquo; <span id="sab-role"></span></span>
      <a id="sab-edit" href="/frontend/builder" title="Abrir constructor" style="display:inline-flex;align-items:center;gap:6px;padding:0 18px;height:44px;color:#e2e8f0;text-decoration:none;font-weight:700;font-size:13px;background:#2563eb;transition:background .15s;flex-shrink:0;" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">&#9998; Editar p&aacute;gina</a>
    </div>
    <script>
    (function(){
      fetch('/api/backend/me',{credentials:'include'})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(d){
          if(!d||!d.authenticated) return;
          var bar=document.getElementById('sipet-admin-bar');
          if(!bar) return;
          bar.style.background=d.bar_color||'#0f172a';
          bar.style.display='flex';
          var rl=document.getElementById('sab-role');
          if(rl) rl.textContent=d.is_superadmin?'Superadministrador':(d.backend_roles||[]).join(' · ');
          document.body.style.paddingTop='44px';
        })
        .catch(function(){});
    })();
    </script>
</body>
</html>
